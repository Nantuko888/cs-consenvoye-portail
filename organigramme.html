<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Organigramme — CS Consenvoye</title>

  <style>
    :root{
      --glass: rgba(20,20,20,.55);
      --stroke: rgba(255,255,255,.12);
      --text: #f3f3f3;
      --muted: rgba(255,255,255,.75);
      --shadow: 0 18px 45px rgba(0,0,0,.45);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }

    html, body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:#000;
      min-height:100svh;
      display:flex;
      justify-content:center;
      padding:14px;
      overflow:auto;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url("background.png") center top / cover no-repeat;
      transform: translateZ(0);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 30% 10%, rgba(255,255,255,.10), transparent 45%),
        linear-gradient(to bottom, rgba(0,0,0,.30), rgba(0,0,0,.60));
      z-index:-1;
    }

    .page{
      width:min(520px, 100%);
      border-radius:28px;
      overflow:visible;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.08);
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin: 10px 12px 8px;
      padding: 10px 12px;
      min-height: 46px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.58));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 14px 34px rgba(0,0,0,.40);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .title{
      font-weight:950;
      letter-spacing:.8px;
      text-transform: uppercase;
      font-size: 18px;
      margin:0;
      white-space:nowrap;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color:var(--text);
      padding: 9px 12px;
      border-radius: 14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active{transform: translateY(1px)}

    .topBtns{
      display:flex;
      gap:10px;
      flex: 0 0 auto;
    }

    .card{
      margin: 8px 12px 10px;
      padding: 12px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(0,0,0,.42), rgba(0,0,0,.24));
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 16px 40px rgba(0,0,0,.32);
    }

    .directionWrap{ display:grid; gap:10px; }
    .chefRow{ display:flex; justify-content:center; }

    .adjRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .badge{
      width:100%;
      border-radius: 18px;
      padding: 12px 12px;
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 14px 28px rgba(0,0,0,.22);
      text-align:center;
      min-height: 72px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .badge .role{
      font-weight:1000;
      letter-spacing:.6px;
      text-transform:uppercase;
      font-size:12px;
      opacity:.95;
      line-height:1.05;
    }

    .badge .name{
      margin-top:5px;
      font-weight:900;
      font-size:15px;
      text-shadow: 0 10px 16px rgba(0,0,0,.55);
      line-height:1.15;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .chef{
      background: linear-gradient(180deg, rgba(250,190,80,.42), rgba(220,140,35,.22));
      color:#fff4df;
    }

    .adj1{
      background: linear-gradient(180deg, rgba(95,150,210,.38), rgba(55,100,155,.18));
      color:#eef6ff;
    }

    .adj2{
      background: linear-gradient(180deg, rgba(140,120,190,.38), rgba(95,75,150,.18));
      color:#f3ecff;
    }

    .sectionTitle{
      margin: 6px 14px 8px;
      font-weight: 1000;
      letter-spacing:.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,.78);
      text-shadow: 0 10px 16px rgba(0,0,0,.55);
      text-align:center;
    }

    .polesGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 0 12px 16px;
    }

    .poleBtn{
      width:100%;
      border:none;
      border-radius:18px;
      padding: 16px 18px;
      min-height: 64px;
      cursor:pointer;
      color:#fff;
      font-weight:1000;
      letter-spacing:.6px;
      text-transform:uppercase;
      box-shadow: 0 14px 28px rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.1;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
    }
    .poleBtn:active{ transform: translateY(1px); }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      background: rgba(0,0,0,.60);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 9999;
      padding: 14px;
    }
    .modal.show{ display:block; }

    .modalBox{
      max-width: 560px;
      margin: 0 auto;
      border-radius: 22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 25px 70px rgba(0,0,0,.55);
      background: rgba(18,18,18,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .modalHead{
      padding: 14px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      color:#fff;
    }

    .modalTitle{
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .closeBtn{
      border:none;
      cursor:pointer;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 1000;
      color:#fff;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
      -webkit-tap-highlight-color: transparent;
    }

    .modalBody{ padding: 12px 14px 16px; }

    .sub{
      margin-top: 10px;
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.20);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .subBar{
      padding: 10px 12px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing:.6px;
      color:#fff;
    }

    .subBody{
      padding: 10px 12px 12px;
      background: rgba(0,0,0,.18);
    }

    ul{ margin:0; padding-left: 18px; }

    li{
      margin: 6px 0;
      color: rgba(255,255,255,.92);
      font-weight:650;
      line-height:1.25;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .hint{
      color: rgba(255,255,255,.70);
      font-size: 13px;
      margin-top: 10px;
    }

    .roleU{
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 1000;
    }

    .err{
      margin: 8px 12px 12px;
      padding: 10px 12px;
      border-radius: 14px;
      border:1px dashed rgba(255,170,60,.35);
      background: rgba(0,0,0,.25);
      color:#ffd19a;
      display:none;
    }

    .syncPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
      font-weight: 950;
      font-size: 12px;
      letter-spacing: .2px;
      box-shadow: 0 10px 26px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="title">Organigramme</div>
      <div class="topBtns">
        <span class="syncPill" id="syncPill" style="display:none;">Synchronisation…</span>
        <button class="btn" id="btnBack">Retour</button>
      </div>
    </header>

    <div class="card">
      <div class="directionWrap">
        <div class="chefRow">
          <div class="badge chef">
            <div class="role">Chef de centre</div>
            <div class="name" id="chefName">—</div>
          </div>
        </div>

        <div class="adjRow">
          <div class="badge adj1">
            <div class="role">1er adjoint</div>
            <div class="name" id="adj1Name">—</div>
          </div>
          <div class="badge adj2">
            <div class="role">2ème adjoint</div>
            <div class="name" id="adj2Name">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="err" id="errBox"></div>

    <div class="sectionTitle">Pôles</div>
    <div class="polesGrid" id="polesGrid"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modalBox">
      <div class="modalHead" id="modalHead">
        <div class="modalTitle" id="modalTitle">—</div>
        <button class="closeBtn" onclick="closeModal()">Fermer</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";

    const CACHE_KEY = "CS_ORGA_CACHE_V2";
    const CACHE_TS_KEY = "CS_ORGA_CACHE_TS_V2";
    const CACHE_MAX_AGE_MS = 24 * 60 * 60 * 1000;

    const $chefName = document.getElementById("chefName");
    const $adj1Name = document.getElementById("adj1Name");
    const $adj2Name = document.getElementById("adj2Name");
    const $grid = document.getElementById("polesGrid");
    const $err = document.getElementById("errBox");

    const $modal = document.getElementById("modal");
    const $modalHead = document.getElementById("modalHead");
    const $modalTitle = document.getElementById("modalTitle");
    const $modalBody = document.getElementById("modalBody");

    let DATA = { direction:{chef:"—",adj1:"—",adj2:"—"}, poles:[] };

    function showErr(msg){
      if(!$err) return;
      $err.style.display = "block";
      $err.textContent = msg;
    }

    function hideErr(){
      if(!$err) return;
      $err.style.display = "none";
      $err.textContent = "";
    }

    function jsonp(url, cbName){
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("Timeout JSONP"));
        }, 12000);

        function cleanup(){
          clearTimeout(timer);
          script.remove();
          try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
        }

        window[cbName] = (data) => { cleanup(); resolve(data); };
        script.onerror = () => { cleanup(); reject(new Error("Erreur JSONP")); };
        script.src = url;
        document.head.appendChild(script);
      });
    }

    function hexToRgba(hex, a){
      const h = (hex || "").replace("#","");
      if(h.length !== 6) return `rgba(255,255,255,${a})`;
      const r = parseInt(h.slice(0,2),16);
      const g = parseInt(h.slice(2,4),16);
      const b = parseInt(h.slice(4,6),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function normalizeOrgPayload(apiData){
      const direction = apiData?.direction || {};
      const polesIn = Array.isArray(apiData?.poles) ? apiData.poles : [];

      const poles = polesIn.map(p => ({
        id: p.id || "",
        label: p.libelle || p.label || "",
        color: p.couleur || p.color || "#888888",
        subpoles: (p.sousPoles || p.subpoles || []).map(sp => ({
          label: sp.libelle || sp.label || "",
          membres: (sp.membres || []).map(m => {
            if (typeof m === "string") return m;
            const f = (m.fonction || "").trim();
            const n = (m.nom || "").trim();
            if (f && n) return `${f} : ${n}`;
            return n || f || "—";
          })
        }))
      })).filter(p => p.label);

      return {
        direction: {
          chef: direction.chef || "—",
          adj1: direction.adj1 || "—",
          adj2: direction.adj2 || "—"
        },
        poles
      };
    }

    function getPolePalette(label){
      const s = String(label || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

      if (s.includes("technique") || s.includes("logistique")) {
        return { main: "#d38a1a", sub: "#f0a52a" };
      }

      if (s.includes("operationnel") || s.includes("operation")) {
        return { main: "#d9b019", sub: "#f1c93a" };
      }

      if (s.includes("formation") || s.includes("sport")) {
        return { main: "#7f68d8", sub: "#9a84f0" };
      }

      if (s.includes("jsp")) {
        return { main: "#1faa7c", sub: "#39c794" };
      }

      if (s.includes("recrutement")) {
        return { main: "#a64fd5", sub: "#c46cf0" };
      }

      if (s.includes("amicale")) {
        return { main: "#4f8fd5", sub: "#71aef0" };
      }

      if (s.includes("soutien")) {
        return { main: "#3a9fc0", sub: "#63bedc" };
      }

      return { main: "#777777", sub: "#9b9b9b" };
    }

    function render(){
      $chefName.textContent = DATA.direction.chef || "—";
      $adj1Name.textContent = DATA.direction.adj1 || "—";
      $adj2Name.textContent = DATA.direction.adj2 || "—";

      $grid.innerHTML = "";

      DATA.poles.forEach(p => {
        const palette = getPolePalette(p.label);

        const btn = document.createElement("button");
        btn.className = "poleBtn";
        btn.style.background = `linear-gradient(180deg, ${hexToRgba(palette.main, .34)}, ${hexToRgba(palette.main, .16)})`;
        btn.textContent = p.label;
        btn.onclick = () => openPole(p, palette);
        $grid.appendChild(btn);
      });
    }

    function openPole(p, palette){
      $modalHead.style.background = `linear-gradient(180deg, ${hexToRgba(palette.main, .42)}, ${hexToRgba(palette.main, .18)})`;
      $modalTitle.textContent = p.label;
      $modalBody.innerHTML = "";

      (p.subpoles || []).forEach(sp => {
        const box = document.createElement("div");
        box.className = "sub";

        const bar = document.createElement("div");
        bar.className = "subBar";
        bar.style.background = `linear-gradient(180deg, ${hexToRgba(palette.sub, .36)}, ${hexToRgba(palette.sub, .16)})`;
        bar.textContent = sp.label;

        const body = document.createElement("div");
        body.className = "subBody";

        const ul = document.createElement("ul");

        (sp.membres || []).forEach(m => {
          const li = document.createElement("li");
          const s = String(m ?? "");

          if ((p.id === "amicale") && /bureau/i.test(sp.label || "") && s.includes(":")){
            const [rolePart, ...rest] = s.split(":");
            const namePart = rest.join(":").trim();
            li.innerHTML = `<span class="roleU">${escapeHtml(rolePart.trim())} :</span> ${escapeHtml(namePart)}`;
          } else {
            li.textContent = s;
          }
          ul.appendChild(li);
        });

        body.appendChild(ul);
        box.appendChild(bar);
        box.appendChild(body);
        $modalBody.appendChild(box);
      });

      const hint = document.createElement("div");
      hint.className = "hint";
      hint.textContent = "Clique sur Fermer pour revenir aux pôles.";
      $modalBody.appendChild(hint);

      $modal.classList.add("show");
    }

    function closeModal(){ $modal.classList.remove("show"); }
    $modal.addEventListener("click", (e)=>{ if(e.target === $modal) closeModal(); });

    function loadCache(){
      try{
        const ts = Number(localStorage.getItem(CACHE_TS_KEY) || "0");
        const raw = localStorage.getItem(CACHE_KEY);
        if(!raw) return null;
        if(!ts) return null;
        if(Date.now() - ts > CACHE_MAX_AGE_MS) return null;
        return JSON.parse(raw);
      }catch(e){
        return null;
      }
    }

    function saveCache(payload){
      try{
        localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
        localStorage.setItem(CACHE_TS_KEY, String(Date.now()));
      }catch(e){}
    }

    window.forceReloadOrg = async function(){
      localStorage.removeItem(CACHE_KEY);
      localStorage.removeItem(CACHE_TS_KEY);
      await loadFromSheets();
    };

    function setSync(on, text){
      const el = document.getElementById("syncPill");
      if(!el) return;
      if(on){
        el.textContent = text || "Synchronisation…";
        el.style.display = "inline-flex";
      }else{
        el.style.display = "none";
      }
    }

    async function loadFromSheets(){
      hideErr();

      const cached = loadCache();
      if(cached && cached.direction && Array.isArray(cached.poles)){
        DATA = cached;
        render();
        setSync(true, "Synchronisation…");
      }else{
        setSync(true, "Chargement…");
      }

      try{
        const cb = "cb_org_" + Math.random().toString(36).slice(2);
        const url = `${API}?view=org&callback=${cb}`;
        const apiData = await jsonp(url, cb);

        if(!apiData || apiData.ok === false){
          throw new Error(apiData?.error || "Réponse org invalide");
        }

        const fresh = normalizeOrgPayload(apiData);
        DATA = fresh;
        saveCache(DATA);
        render();

        setSync(false);

      }catch(err){
        console.error(err);

        if(cached && cached.direction && Array.isArray(cached.poles)){
          setSync(false);
          return;
        }

        setSync(false);
        showErr("Erreur de chargement depuis Sheets (API).");
      }
    }

    document.getElementById("btnBack").addEventListener("click", () => {
      location.replace("index.html?portal=1");
    });

    loadFromSheets();
  </script>
</body>
</html>
