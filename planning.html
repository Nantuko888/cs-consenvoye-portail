<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Planning — CS Consenvoye</title>
  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.70);
      --shadow: 0 14px 34px rgba(0,0,0,.40);
      --radius: 22px;
      --stroke: rgba(255,255,255,.10);
      --orange:#d46a00;
      --orange2:#b95800;
      --today:#fff200;
      --note:#fff200;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }
    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.52)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
      transform:translateZ(0);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background:radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.64) 62%);
      z-index:-1;
    }

    .wrap{
      height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:10px;
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.58));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      min-height:46px;
    }
    .topbar .title{
      font-weight:950; letter-spacing:.8px; text-transform:uppercase;
      font-size:18px; margin:0; white-space:nowrap;
    }
    .btn{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:9px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active{transform:translateY(1px)}

    .monthbar{
      display:grid;
      grid-template-columns:52px 1fr 52px;
      align-items:center;
      gap:10px;
      padding:8px 10px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(212,106,0,.62), rgba(185,88,0,.45));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      min-height:50px;
    }
    .navbtn{
      height:42px;
      border-radius:16px;
      font-size:22px;
      font-weight:950;
      display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .navbtn:active{transform:translateY(1px)}
    .navbtn:disabled{opacity:.35; cursor:default}

    .monthname{
      text-align:center;
      font-weight:950;
      font-size:22px;
      letter-spacing:.4px;
      margin:0;
      white-space:nowrap;
    }

    .calCard{
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.30));
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      overflow:hidden;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
    }

    .dow{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:8px;
      padding:0 2px;
      color:rgba(255,255,255,.72);
      font-weight:900;
      letter-spacing:.5px;
      font-size:14px;
      user-select:none;
    }
    .dow div{text-align:center}

    .grid{
      flex:1;
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      grid-auto-rows:minmax(54px, 1fr);
      gap:8px;
      min-height:0;
    }

    .day{
      position:relative;
      border-radius:18px;
      background:rgba(0,0,0,.26);
      border:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:950;
      font-size:22px;
      color:rgba(255,255,255,.92);
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .day.is-empty{opacity:.12; pointer-events:none}
    .day.has-color::before{
      content:"";
      position:absolute; inset:0;
      border-radius:18px;
      background:var(--dayColor, transparent);
      opacity:.78;
      z-index:0;
    }
    .day span{position:relative; z-index:1}
    .day.is-today{
      box-shadow:inset 0 0 0 4px #ffffff, 0 0 8px rgba(0,0,0,.6);
      border-color:#ffffff;
    }
    .day.has-note{cursor:pointer}
    .day.has-note::after{
      content:"";
      position:absolute;
      top:8px; right:8px;
      width:8px; height:8px;
      border-radius:999px;
      background:rgba(255,242,0,.95);
      box-shadow:0 0 8px rgba(255,242,0,.45);
      z-index:2;
    }

    .legend{
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(0,0,0,.40), rgba(0,0,0,.28));
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      padding:10px;
      overflow:hidden;
      min-height:92px;
    }
    .legendGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 10px;
      align-items:center;
    }
    .legItem{
      display:flex; align-items:center; gap:10px;
      padding:8px 10px;
      border-radius:16px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      min-height:44px;
    }
    .sq{
      width:20px; height:20px;
      border-radius:5px;
      border:1px solid rgba(255,255,255,.18);
      flex:0 0 auto;
      background:rgba(255,255,255,.25);
    }
    .legTxt{
      font-weight:900;
      font-size:18px;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .status{
      position:fixed;
      left:12px; right:12px;
      bottom:calc(env(safe-area-inset-bottom) + 12px);
      z-index:80;
      display:none;
      max-width:980px;
      margin:0 auto;
      pointer-events:none;
    }
    .status .pill{
      pointer-events:auto;
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(0,0,0,.62);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow);
      color:rgba(255,255,255,.90);
      font-weight:900;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .status .small{font-weight:800; opacity:.85; font-size:13px}

    .noteOverlay, .editOverlay, .formOverlay{
      position:fixed; inset:0;
      display:none;
    }
    .noteOverlay{
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      z-index:120;
    }
    .editOverlay, .formOverlay{
      background:rgba(0,0,0,.62);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .editOverlay{z-index:140}
    .formOverlay{z-index:180}
    .noteOverlay.show, .editOverlay.show, .formOverlay.show{display:block}

    .noteSheet, .editSheet, .formSheet{
      position:absolute;
      left:12px; right:12px;
      bottom:calc(env(safe-area-inset-bottom) + 12px);
      max-width:980px;
      margin:0 auto;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(0,0,0,.78), rgba(0,0,0,.62));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .noteSheet{height:min(52vh, 520px)}
    .editSheet{height:min(62vh, 620px)}
    .formSheet{height:min(76vh, 700px)}

    .noteHead, .editHead, .formHead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.22);
    }

    .noteTitle, .editTitle, .formTitle{
      font-weight:950;
      font-size:16px;
      color:rgba(255,255,255,.92);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .noteClose, .iconBtn{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:8px 10px;
      border-radius:14px;
      font-weight:950;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      min-width:42px;
    }
    .noteClose:active, .iconBtn:active{transform:translateY(1px)}
    .iconBtn.danger{border-color:rgba(255,80,80,.35)}

    .noteBody, .editBody{
      padding:12px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .formBody{
      padding:10px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .evCard, .row, .formBlock, .timeSection{
      border-radius:18px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      padding:10px 12px;
    }

    .evTop, .rowTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:6px;
    }
    .evName, .rowName{
      font-weight:950;
      font-size:16px;
      line-height:1.1;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .evTime{
      font-weight:900;
      font-size:13px;
      color:rgba(255,255,255,.78);
      white-space:nowrap;
      flex:0 0 auto;
    }

    .evMeta, .rowSub{
      font-weight:850;
      font-size:13px;
      color:rgba(255,255,255,.78);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .chipDot{
      width:10px; height:10px;
      border-radius:3px;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(255,255,255,.25);
    }
    .evDetails{
      font-size:15px;
      font-weight:850;
      color:rgba(255,255,255,.92);
      line-height:1.25;
      white-space:pre-wrap;
    }

    .rowBtns, .editActions, .formActions{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    }

    .formLabel{
      display:block;
      margin:0 0 5px 0;
      font-size:12px;
      font-weight:900;
      color:rgba(255,255,255,.82);
      text-transform:uppercase;
      letter-spacing:.4px;
    }
    .fieldText, .fieldArea, .fieldSelect{
      width:100%;
      border:none;
      outline:none;
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:10px 12px;
      border-radius:14px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.10);
      font-family:inherit;
      font-size:14px;
    }
    .fieldArea{
      min-height:88px;
      resize:vertical;
      font-weight:800;
    }

    .timeSection{
      padding:10px;
    }
    .timeLabel{
      display:block;
      margin:0 0 6px 0;
      font-size:12px;
      font-weight:900;
      color:rgba(255,255,255,.82);
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .timePickerGroup{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .timePickerRow{
      display:grid;
      grid-template-columns:1fr 18px 1fr;
      gap:8px;
      align-items:center;
    }
    .timeColon{
      text-align:center;
      font-size:24px;
      font-weight:950;
      color:rgba(255,255,255,.92);
      transform:translateY(-1px);
      user-select:none;
    }

    .wheel{
      position:relative;
      height:128px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      overflow-y:auto;
      scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .wheel::-webkit-scrollbar{display:none}

    .wheelPad{
      height:42px;
      flex:0 0 auto;
    }
    .wheelInner{
      display:flex;
      flex-direction:column;
    }

    .wheelItem{
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      font-weight:900;
      color:rgba(255,255,255,.40);
      scroll-snap-align:center;
      transition:transform .12s ease, color .12s ease, opacity .12s ease;
      opacity:.65;
      user-select:none;
    }
    .wheelItem.active{
      color:rgba(255,255,255,.98);
      opacity:1;
      transform:scale(1.01);
    }

    .wheelFocus{
      position:absolute;
      left:6px; right:6px;
      top:42px;
      height:42px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.08);
      pointer-events:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .wheelFadeTop, .wheelFadeBottom{
      position:absolute;
      left:0; right:0;
      height:26px;
      pointer-events:none;
      z-index:2;
    }
    .wheelFadeTop{
      top:0;
      background:linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,0));
    }
    .wheelFadeBottom{
      bottom:0;
      background:linear-gradient(0deg, rgba(0,0,0,.46), rgba(0,0,0,0));
    }

    @media (max-width: 520px){
      .timePickerGroup{grid-template-columns:1fr}
    }

    @media (max-width: 360px){
      .monthname{font-size:20px}
      .day{font-size:20px; border-radius:16px}
      .day.has-color::before{border-radius:16px}
      .grid{grid-auto-rows:minmax(50px, 1fr);}
      .legTxt{font-size:16px}
      .sq{width:18px;height:18px}
      .noteSheet{height:min(56vh, 520px)}
      .editSheet{height:min(68vh, 680px)}
      .formSheet{height:min(80vh, 730px)}
      .wheel{height:118px}
      .wheelPad{height:38px}
      .wheelFocus{top:38px; height:42px}
      .wheelItem{font-size:17px}
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <h1 class="title" id="titleYear">PLANNING 2026</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <span id="editLabel" style="display:none;margin-right:6px;font-weight:700;font-size:12px;color:#fff200;">MODE ÉDITION</span>
        <button class="btn" id="btnLock" title="Mode édition" aria-pressed="false" style="display:none;">🔒</button>
        <button class="btn" id="btnBack">Retour</button>
      </div>
    </div>

    <div class="monthbar">
      <button class="navbtn" id="btnPrev" aria-label="Mois précédent">‹</button>
      <h2 class="monthname" id="monthName">—</h2>
      <button class="navbtn" id="btnNext" aria-label="Mois suivant">›</button>
    </div>

    <section class="calCard">
      <div class="dow">
        <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
      </div>
      <div class="grid" id="grid"></div>
    </section>

    <section class="legend">
      <div class="legendGrid" id="legendGrid"></div>
    </section>
  </div>

  <div class="status" id="status">
    <div class="pill">
      <span>⚠️</span>
      <div>
        <div id="statusTxt">Chargement…</div>
        <div class="small" id="statusSub">Si ça reste, l’URL API est mauvaise.</div>
      </div>
    </div>
  </div>

  <div class="noteOverlay" id="noteOverlay" aria-hidden="true">
    <div class="noteSheet" role="dialog" aria-modal="true" aria-label="Note du jour">
      <div class="noteHead">
        <div class="noteTitle" id="noteTitle">—</div>
        <button class="noteClose" id="noteClose">Fermer</button>
      </div>
      <div class="noteBody" id="noteBody"></div>
    </div>
  </div>

  <div class="editOverlay" id="editOverlay" aria-hidden="true">
    <div class="editSheet" role="dialog" aria-modal="true" aria-label="Gestion des événements">
      <div class="editHead">
        <div class="editTitle" id="editTitle">—</div>
        <div class="editActions">
          <button class="iconBtn" id="btnAddEvent" title="Ajouter">＋</button>
          <button class="iconBtn" id="btnCloseEdit" title="Fermer">✕</button>
        </div>
      </div>
      <div class="editBody" id="editBody"></div>
    </div>
  </div>

  <div class="formOverlay" id="formOverlay" aria-hidden="true">
    <div class="formSheet" role="dialog" aria-modal="true" aria-label="Formulaire événement">
      <div class="formHead">
        <div class="formTitle" id="formTitle">Événement</div>
        <div class="formActions">
          <button class="iconBtn" id="btnFormCancel">✕</button>
        </div>
      </div>

      <div class="formBody">
        <div class="formBlock">
          <label class="formLabel" for="fTitle">Titre</label>
          <input class="fieldText" id="fTitle" type="text" placeholder="Titre de l’événement" />
        </div>

        <div class="formBlock">
          <label class="formLabel" for="fCategory">Catégorie</label>
          <select class="fieldSelect" id="fCategory"></select>
        </div>

        <div class="timePickerGroup">
          <div class="timeSection">
            <label class="timeLabel">Heure début</label>
            <div class="timePickerRow">
              <div class="wheel" id="startHourWheel">
                <div class="wheelFadeTop"></div>
                <div class="wheelFadeBottom"></div>
                <div class="wheelFocus"></div>
                <div class="wheelInner" id="startHourInner"></div>
              </div>
              <div class="timeColon">:</div>
              <div class="wheel" id="startMinuteWheel">
                <div class="wheelFadeTop"></div>
                <div class="wheelFadeBottom"></div>
                <div class="wheelFocus"></div>
                <div class="wheelInner" id="startMinuteInner"></div>
              </div>
            </div>
          </div>

          <div class="timeSection">
            <label class="timeLabel">Heure fin</label>
            <div class="timePickerRow">
              <div class="wheel" id="endHourWheel">
                <div class="wheelFadeTop"></div>
                <div class="wheelFadeBottom"></div>
                <div class="wheelFocus"></div>
                <div class="wheelInner" id="endHourInner"></div>
              </div>
              <div class="timeColon">:</div>
              <div class="wheel" id="endMinuteWheel">
                <div class="wheelFadeTop"></div>
                <div class="wheelFadeBottom"></div>
                <div class="wheelFocus"></div>
                <div class="wheelInner" id="endMinuteInner"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="formBlock">
          <label class="formLabel" for="fLocation">Lieu</label>
          <input class="fieldText" id="fLocation" type="text" placeholder="Lieu (optionnel)" />
        </div>

        <div class="formBlock">
          <label class="formLabel" for="fDetails">Détails / note</label>
          <textarea class="fieldArea" id="fDetails" placeholder="Détails (optionnel)"></textarea>
        </div>

        <div class="formActions" style="justify-content:flex-end;padding-bottom:2px;">
          <button class="btn" id="btnFormClose">Annuler</button>
          <button class="btn" id="btnFormSave">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
  const BACK_URL = "index.html";
  const YEAR = 2026;
  const CACHE_KEY = `cs_planning_cache_v1_${YEAR}`;
  const CACHE_MAX_AGE_MS = 1000 * 60 * 60 * 24 * 7;
  const LS_EMAIL = "cs_portail_email_v1";

  const DEFAULT_CATEGORIES = [
    { category:"FMA centre", color:"#ff2d2d", order:1 },
    { category:"FMA équipe 1", color:"#24d36a", order:2 },
    { category:"FMA équipe 2", color:"#f6a000", order:3 },
    { category:"JSP", color:"#4aa8ff", order:4 },
    { category:"Navette", color:"#2f79ff", order:5 },
    { category:"RECSEC", color:"#a081ff", order:6 },
    { category:"Sainte Barbe", color:"#ff5a5a", order:7 }
  ];

  const OVERRIDE_COLORS = {
    "fma centre": "#ff2d2d"
  };

  const $ = (id)=>document.getElementById(id);
  const $grid = $("grid");
  const $monthName = $("monthName");
  const $legendGrid = $("legendGrid");
  const $btnPrev = $("btnPrev");
  const $btnNext = $("btnNext");
  const $status = $("status");
  const $statusTxt = $("statusTxt");
  const $statusSub = $("statusSub");
  const $btnLock = $("btnLock");
  const $editLabel = $("editLabel");

  const $noteOverlay = $("noteOverlay");
  const $noteTitle = $("noteTitle");

    endHour: { wheel: $("endHourWheel"), inner: $("endHourInner"), values: HOURS, value: "09", timer: null },

  function norm(s){
    return String(s||"").trim().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/['’]/g,"")
      .replace(/\s+/g," ");
  }

  function escapeHtml(s){
    return (s==null ? "" : String(s))
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function ymd(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${dd}`;
  }

  function firstMondayGrid(year, monthIndex){
    const d = new Date(year, monthIndex, 1);
    const js = d.getDay();
    const offset = (js === 0) ? 6 : (js - 1);
    d.setDate(d.getDate() - offset);
    d.setHours(12,0,0,0);
    return d;
  }

  function toFRDate(ymdStr){
    const [y,m,d] = String(ymdStr||"").split("-");
    if(!y||!m||!d) return ymdStr;
    const dt = new Date(Number(y), Number(m)-1, Number(d), 12,0,0,0);
    const dow = dowsFR[dt.getDay()];
    return `${dow} ${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${y}`;
  }

  function formatTimeRange(start,end){
    const s = String(start||"").trim();
    const e = String(end||"").trim();
    if(s && e) return `${s}–${e}`;
    if(s) return s;
    if(e) return e;
    return "";
  }

  function jsonp(url, cbName, timeoutMs=15000){
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      const cleanup = () => {
        script.remove();
        try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
      };
      const timer = setTimeout(() => { cleanup(); reject(new Error("Timeout JSONP")); }, timeoutMs);
      window[cbName] = (data) => { clearTimeout(timer); cleanup(); resolve(data); };
      const sep = url.includes("?") ? "&" : "?";
      script.src = url + sep + "t=" + Date.now();
      script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error("Erreur JSONP")); };
      document.head.appendChild(script);
    });
  }

  function rebuildMaps(){
    eventsByDate = new Map();
    hasNoteByDate = new Map();

    for(const ev of events){
      const date = String(ev.date||"").trim();
      if(!date) continue;
      if(!eventsByDate.has(date)) eventsByDate.set(date, []);
      eventsByDate.get(date).push(ev);
      if(String(ev.details||"").trim()) hasNoteByDate.set(date, true);
    }

    catColor = new Map();
    catLabel = new Map();
    catOrder = new Map();

    const cats = [...categoriesRaw]
      .map(c => ({
        category: String(c.category||"").trim(),
        color: String(c.color||"").trim(),
        order: Number(c.order||9999) || 9999
      }))
      .filter(c => c.category);

    cats.sort((a,b)=> (a.order-b.order) || a.category.localeCompare(b.category));

    for(const c of cats){
      const k = norm(c.category);
      if(catLabel.has(k)) continue;
      const forced = OVERRIDE_COLORS[k];
      const col = forced || c.color || "rgba(255,255,255,.25)";
      catLabel.set(k, c.category);
      catColor.set(k, col);
      catOrder.set(k, c.order);
    }

    firstCatByDate = new Map();
    for(const [date, arr] of eventsByDate.entries()){
      let best = null;
      let bestOrder = 9999;
      for(const ev of arr){
        const k = norm(ev.category || "");
        const o = catOrder.has(k) ? catOrder.get(k) : 9999;
        if(o < bestOrder){ bestOrder=o; best=k; }
      }
      if(!best) best = norm(arr[0]?.category || "");
      firstCatByDate.set(date, best);
    }
  }

  function getColorForCategory(catKey){
    const k = norm(catKey);
    if(OVERRIDE_COLORS[k]) return OVERRIDE_COLORS[k];
    return catColor.get(k) || "rgba(255,255,255,.25)";
  }

  function renderMonth(){
    $monthName.textContent = monthsFR[currentMonth];
    $btnPrev.disabled = (currentMonth === 0);
    $btnNext.disabled = (currentMonth === 11);

    const start = firstMondayGrid(YEAR, currentMonth);
    const todayStr = ymd(new Date());
    $grid.innerHTML = "";

    for(let i=0;i<42;i++){
      const d = new Date(start);
      d.setDate(start.getDate()+i);
      const inMonth = (d.getMonth()===currentMonth);
      const dateStr = ymd(d);

      const cell = document.createElement("div");
      cell.className = "day" + (inMonth ? "" : " is-empty");

      if(inMonth){
        cell.dataset.date = dateStr;
        const catKey = firstCatByDate.get(dateStr);
        if(catKey){
          cell.classList.add("has-color");
          cell.style.setProperty("--dayColor", getColorForCategory(catKey));
        }
        if(dateStr===todayStr) cell.classList.add("is-today");
        if(hasNoteByDate.get(dateStr)===true) cell.classList.add("has-note");
      }

      cell.innerHTML = `<span>${inMonth ? d.getDate() : ""}</span>`;
      $grid.appendChild(cell);
    }

  function buildWheel(pickerKey){
    const picker = TIME_PICKERS[pickerKey];
    picker.inner.innerHTML = "";

    const padTop = document.createElement("div");
    padTop.className = "wheelPad";
    picker.inner.appendChild(padTop);

    picker.values.forEach(v=>{
      const item = document.createElement("div");
      item.className = "wheelItem";
      item.dataset.value = v;
      item.textContent = v;
      item.addEventListener("click", ()=> setWheelValue(pickerKey, v, true));
      picker.inner.appendChild(item);
    });

    const padBottom = document.createElement("div");
    padBottom.className = "wheelPad";
    picker.inner.appendChild(padBottom);

    picker.wheel.addEventListener("scroll", ()=>{
      updateWheelActive(pickerKey);
      clearTimeout(picker.timer);
      picker.timer = setTimeout(()=> snapWheel(pickerKey), 90);
    });
  }

  function updateWheelActive(pickerKey){
    const picker = TIME_PICKERS[pickerKey];
    const center = picker.wheel.scrollTop + (picker.wheel.clientHeight / 2);
    let bestItem = null;
    let bestDist = Infinity;

    picker.inner.querySelectorAll(".wheelItem").forEach(item=>{
      const itemCenter = item.offsetTop + (item.offsetHeight / 2);
      const dist = Math.abs(center - itemCenter);
      if(dist < bestDist){
        bestDist = dist;
        bestItem = item;
      }
    });

    picker.inner.querySelectorAll(".wheelItem").forEach(i=>i.classList.remove("active"));
    if(bestItem){
      bestItem.classList.add("active");
      picker.value = bestItem.dataset.value;
    }
  }

  function setWheelValue(pickerKey, value, smooth){
    const picker = TIME_PICKERS[pickerKey];
    const item = picker.inner.querySelector(`.wheelItem[data-value="${CSS.escape(value)}"]`);
    if(!item) return;
    const target = item.offsetTop - ((picker.wheel.clientHeight - item.offsetHeight) / 2);
    picker.wheel.scrollTo({ top: target, behavior: smooth ? "smooth" : "auto" });
    picker.value = value;
    setTimeout(()=> updateWheelActive(pickerKey), smooth ? 160 : 0);
  }

  function snapWheel(pickerKey){
    const picker = TIME_PICKERS[pickerKey];
    setWheelValue(pickerKey, picker.value, true);
  }

  function getTimeValue(prefix){
    return `${TIME_PICKERS[prefix + "Hour"].value}:${TIME_PICKERS[prefix + "Minute"].value}`;
  }

  function setTimeValue(prefix, hhmm){
    const val = String(hhmm || "").trim();
    if(!val || !val.includes(":")){
      setWheelValue(prefix + "Hour", "00", false);
      setWheelValue(prefix + "Minute", "00", false);
      return;
    }
    const [hh, mm] = val.split(":");
    setWheelValue(prefix + "Hour", HOURS.includes(hh) ? hh : "00", false);
    setWheelValue(prefix + "Minute", MINUTES.includes(mm) ? mm : "00", false);
  }

  function initWheels(){
    buildWheel("startHour");
    buildWheel("startMinute");
    buildWheel("endHour");
    buildWheel("endMinute");
    setTimeout(()=>{
      setTimeValue("start", "08:00");
      setTimeValue("end", "09:00");
    }, 0);
  }

      $fCategory.value = "";

  async function saveEventForm(){
    const title = String($fTitle.value || "").trim();
    const category = String($fCategory.value || "").trim();
    const location = String($fLocation.value || "").trim();
    const details = String($fDetails.value || "").trim();
    const start = getTimeValue("start");
    const end = getTimeValue("end");

    if(!title){
      alert("Titre obligatoire.");
      return;
    }

    if(end < start){
      alert("Heure fin incorrecte.");
      return;
    }

    try{
      if(FORM_STATE.mode === "edit" && FORM_STATE.originalEvent){
        await apiDeleteEvent_(FORM_STATE.dateStr, FORM_STATE.originalEvent);
      }

      await apiAddEvent_(FORM_STATE.dateStr, {
        title, start, end, category, location, details
      });

      closeEventForm();
      await loadApi(true);
      if(_editDate){
        renderEditList(_editDate);
      }
    }catch(err){
      alert("Erreur : " + String(err && err.message ? err.message : err));
    }
  }

  function saveCache_(payload){
    try{
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        savedAt: Date.now(),
        payload
      }));
    }catch(e){}
  }

  function loadCache_(){
    try{
      const raw = localStorage.getItem(CACHE_KEY);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if(!obj || !obj.payload) return null;
      if(obj.savedAt && (Date.now() - obj.savedAt) > CACHE_MAX_AGE_MS) return null;
      return obj.payload;
    }catch(e){
      return null;
    }
  }

    renderMonth();

  async function loadApi(forceFresh = false){
    if(!API || API.includes("COLLE_ICI")){
      showStatus("API manquante", "Mets ton URL exec dans const API.");
      return;
    }

    const cached = loadCache_();

    if(!forceFresh && cached?.py && cached?.pc){
      applyPlanningData_(cached.py, cached.pc);
      showStatus("Synchronisation…", "Mise à jour en cours.");
    }else{
      showStatus("Chargement…", "Récupération des événements et catégories.");
    }

    const cb1 = "cb_py_" + Math.random().toString(36).slice(2);
    const cb2 = "cb_pc_" + Math.random().toString(36).slice(2);

    try{
      const planningUrl =
        `${API}?view=planning_year&year=${YEAR}` +
        `${forceFresh ? "&nocache=1" : ""}` +
        `&callback=${cb1}`;

      const catsUrl =
        `${API}?view=planning_categories` +
        `${forceFresh ? "&nocache=1" : ""}` +
        `&callback=${cb2}`;

      const [py, pc] = await Promise.all([
        jsonp(planningUrl, cb1),
        jsonp(catsUrl, cb2)
      ]);

      if(py?.ok===false) throw new Error(py?.error || "planning_year invalide");
      if(pc?.ok===false) throw new Error(pc?.error || "planning_categories invalide");

      applyPlanningData_(py, pc);
      saveCache_({ py, pc });
      hideStatus();
    }catch(e){
      if(!forceFresh && cached?.py && cached?.pc){
        showStatus("Hors ligne / lent", "Les données affichées sont en cache.");
        setTimeout(hideStatus, 2500);
        return;
      }

      categoriesRaw = DEFAULT_CATEGORIES.slice();
      events = [];
      rebuildMaps();
      renderLegend();
      renderMonth();
      showStatus("API HS / lente", "La légende reste, mais pas d’événements.");
    }
  }

  $("btnBack").addEventListener("click", ()=>location.href=BACK_URL);
  $btnPrev.addEventListener("click", ()=>{ if(currentMonth>0){ currentMonth--; renderMonth(); }});
  $btnNext.addEventListener("click", ()=>{ if(currentMonth<11){ currentMonth++; renderMonth(); }});

  $btnLock.addEventListener("click", ()=>{
    if(!IS_ADMIN) return;
    setEditMode(!EDIT_MODE);
  });

  (async function(){
    $("titleYear").textContent = `PLANNING ${YEAR}`;
    rebuildMaps();
    renderLegend();

    initWheels();

    const now = new Date();
    currentMonth = (now.getFullYear()===YEAR) ? now.getMonth() : 0;
    renderMonth();

    loadApi();

    try{
      await loadMyRole_();
    }catch(e){
      IS_ADMIN = false;
    }

    if(IS_ADMIN){
      $btnLock.style.display = "inline-block";
    }else{
      $btnLock.style.display = "none";
      setEditMode(false);
    }
  })();
</script>
</body>
</html>
