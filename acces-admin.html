<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Accès admin — CS Consenvoye</title>

  <link rel="stylesheet" href="cs-theme.css">

  <style>
    .adminWrap{
      max-width:980px;
      margin:0 auto;
      padding:14px;
    }

    .dashboard{
      padding:14px 16px;
      margin-bottom:16px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(47,158,91,.30), rgba(47,158,91,.16));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:rgba(255,255,255,.96);
    }

    .dashboardTitle{
      font-size:20px;
      font-weight:900;
      line-height:1.2;
    }

    .dashboardSmall{
      margin-top:8px;
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.78);
      line-height:1.35;
    }

    .status{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      line-height:1.4;
      border:1px solid rgba(255,255,255,.12);
    }

    .status.show{ display:block; }
    .status.ok{
      background:rgba(47,158,91,.18);
      color:#d9ffe7;
    }
    .status.err{
      background:rgba(220,70,70,.18);
      color:#ffe1e1;
    }
    .status.info{
      background:rgba(47,111,212,.18);
      color:#dde9ff;
    }

    .card{
      border-radius:20px;
      padding:14px;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.95);
    }

    .cardTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:12px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .btn2{
      border:none;
      border-radius:14px;
      min-height:44px;
      padding:12px 16px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      transition:background .22s ease, transform .12s ease, opacity .18s ease;
    }

    .btn2:active{
      transform:translateY(1px);
    }

    .btnPrimary{
      background:linear-gradient(180deg, rgba(255,140,40,.95), rgba(212,106,0,.95));
      color:#fff;
    }

    .btnPrimary.saving{
      background:linear-gradient(180deg, rgba(47,158,91,.95), rgba(34,128,73,.95));
      color:#fff;
    }

    .btnSecondary{
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .btnDanger{
      background:linear-gradient(180deg, rgba(220,70,70,.95), rgba(180,45,45,.95));
      color:#fff;
    }

    .btn2[disabled]{
      opacity:.7;
      cursor:default;
    }

    .collapsible{
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      margin-bottom:12px;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    .collapsibleHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .collapsibleHeader:active{
      transform:translateY(1px);
    }

    .collapsibleLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1 1 auto;
    }

    .chevron{
      width:18px;
      text-align:center;
      font-size:16px;
      color:rgba(255,255,255,.85);
      transition:transform .18s ease;
      flex:0 0 auto;
    }

    .collapsible.open .chevron{
      transform:rotate(90deg);
    }

    .agentName{
      font-size:16px;
      font-weight:900;
      color:rgba(255,255,255,.97);
      line-height:1.2;
      word-break:break-word;
    }

    .summarySwitches{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
    }

    .miniSwitch{
      display:flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;
      font-weight:900;
      color:#fff;
    }

    .miniSwitch input{
      width:18px;
      height:18px;
      accent-color:#ff8c00;
      margin:0;
    }

    .collapsibleContent{
      display:none;
      padding:0 14px 14px;
    }

    .collapsible.open .collapsibleContent{
      display:block;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .label{
      font-size:13px;
      font-weight:900;
      color:rgba(255,255,255,.80);
    }

    .input, .select{
      width:100%;
      min-height:44px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:15px;
    }

    .select option{
      color:#111;
    }

    .detailsGrid{
      display:grid;
      gap:10px;
      grid-template-columns:1fr;
    }

    .switchGrid{
      display:grid;
      gap:10px;
      grid-template-columns:1fr 1fr;
      margin-bottom:10px;
    }

    .switchBox{
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .switchLabel{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:14px;
      font-weight:900;
      color:rgba(255,255,255,.92);
    }

    .switchLabel input{
      width:20px;
      height:20px;
      accent-color:#ff8c00;
      margin:0;
    }

    .agentActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .hint{
      font-size:12px;
      line-height:1.35;
      color:rgba(255,255,255,.72);
      font-weight:800;
      margin-top:4px;
    }

    .empty{
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px dashed rgba(255,255,255,.10);
      color:rgba(255,255,255,.76);
      font-weight:800;
    }

    .loaderOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      z-index:99999;
    }

    .loaderOverlay.show{
      display:flex;
    }

    .loaderBox{
      width:52px;
      height:52px;
      border-radius:999px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 14px 34px rgba(0,0,0,.40);
    }

    .loaderSpinner{
      width:24px;
      height:24px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.25);
      border-top-color:#ff8c00;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @media (min-width:800px){
      .detailsGrid{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div id="loader" class="loaderOverlay">
    <div class="loaderBox">
      <div class="loaderSpinner"></div>
    </div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">🔑 Gestion des accès</div>
      <button class="btn" onclick="window.location.href='admin.html'">Retour</button>
    </div>

    <div class="adminWrap">
      <div class="dashboard">
        <div class="dashboardTitle">Accès global</div>
        <div class="dashboardSmall">
          Une seule liste d’agents. Les accès Portail et Amical sont visibles directement sur la ligne. Les détails restent repliés au départ.
        </div>
      </div>

      <div id="statusBox" class="status info"></div>

      <div class="card">
        <div class="cardTitle">Agents</div>

        <div class="toolbar">
          <button class="btn2 btnSecondary" type="button" onclick="loadData()">Actualiser</button>
        </div>

        <div id="accessList"></div>
      </div>

      <div class="card">
        <div class="cardTitle">Ajouter un agent</div>

        <div class="collapsible" id="addAgentBox">
          <div class="collapsibleHeader" onclick="toggleCollapseById('addAgentBox')">
            <div class="collapsibleLeft">
              <div class="chevron">▶</div>
              <div class="agentName">Nouvel agent</div>
            </div>
            <div class="summarySwitches">
              <div class="miniSwitch">Ajouter</div>
            </div>
          </div>

          <div class="collapsibleContent">
            <div class="detailsGrid">
              <div class="field">
                <label class="label" for="new_nom">Nom</label>
                <input class="input" id="new_nom" type="text" placeholder="Nom affiché">
              </div>

              <div class="field">
                <label class="label" for="new_email">Adresse mail</label>
                <input class="input" id="new_email" type="email" placeholder="adresse@mail.com">
              </div>

              <div class="field">
                <label class="label" for="new_role">Rôle</label>
                <select class="select" id="new_role">
                  <option value="agent">agent</option>
                  <option value="admin">admin</option>
                </select>
              </div>
            </div>

            <div class="switchGrid">
              <div class="switchBox">
                <label class="switchLabel">
                  <span>Accès Portail</span>
                  <input id="new_portail" type="checkbox" checked>
                </label>
              </div>

              <div class="switchBox">
                <label class="switchLabel">
                  <span>Accès Amical</span>
                  <input id="new_amical" type="checkbox">
                </label>
              </div>
            </div>

            <div class="agentActions">
              <button class="btn2 btnPrimary" type="button" onclick="createAgent(this)">Créer l’agent</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const EMAIL_KEY = "cs_portail_email_v1";

const state = {
  actorEmail: "",
  items: []
};

function showLoader(v){
  document.getElementById("loader").classList.toggle("show", !!v);
}

function showStatus(type, message){
  const box = document.getElementById("statusBox");
  box.className = "status show " + type;
  box.textContent = message || "";
}

function setButtonSaving(btn, saving, savingText = "Enregistrement..."){
  if (!btn) return;
  if (saving) {
    btn.dataset.originalText = btn.textContent;
    btn.textContent = savingText;
    btn.classList.add("saving");
    btn.disabled = true;
  } else {
    btn.textContent = btn.dataset.originalText || btn.textContent;
    btn.classList.remove("saving");
    btn.disabled = false;
  }
}

function escapeHtml(v){
  return String(v == null ? "" : v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getCurrentEmail(){
  return (localStorage.getItem(EMAIL_KEY) || "").trim().toLowerCase();
}

function jsonp(params){
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");
    const url = new URL(SCRIPT_URL);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    function cleanup(){
      try { delete window[callbackName]; } catch(e){}
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("Erreur de chargement JSONP"));
    };

    url.searchParams.set("callback", callbackName);
    url.searchParams.set("_ts", Date.now());

    Object.keys(params || {}).forEach(k => {
      url.searchParams.set(k, params[k]);
    });

    script.src = url.toString();
    document.body.appendChild(script);
  });
}

async function checkAdmin(){
  state.actorEmail = getCurrentEmail();

  if (!state.actorEmail) {
    showStatus("err", "Aucun email admin détecté.");
    return false;
  }

  const r = await jsonp({
    view: "auth_check",
    email: state.actorEmail
  });

  if (!r || !r.ok) {
    showStatus("err", "Utilisateur non autorisé.");
    return false;
  }

  if (String(r.role || "").toLowerCase() !== "admin") {
    showStatus("err", "Accès refusé : admin uniquement.");
    return false;
  }

  return true;
}

function toggleCollapseById(id){
  const box = document.getElementById(id);
  if (!box) return;
  box.classList.toggle("open");
}

function bindSummarySync(card){
  const summaryPortail = card.querySelector(".summary-portail");
  const summaryAmical = card.querySelector(".summary-amical");
  const detailPortail = card.querySelector(".field-portail");
  const detailAmical = card.querySelector(".field-amical");

  if (summaryPortail && detailPortail) {
    summaryPortail.addEventListener("change", () => {
      detailPortail.checked = summaryPortail.checked;
    });
    detailPortail.addEventListener("change", () => {
      summaryPortail.checked = detailPortail.checked;
    });
  }

  if (summaryAmical && detailAmical) {
    summaryAmical.addEventListener("change", () => {
      detailAmical.checked = summaryAmical.checked;
    });
    detailAmical.addEventListener("change", () => {
      summaryAmical.checked = detailAmical.checked;
    });
  }
}

function renderList(){
  const zone = document.getElementById("accessList");
  const items = Array.isArray(state.items) ? state.items : [];

  if (!items.length) {
    zone.innerHTML = '<div class="empty">Aucun agent trouvé.</div>';
    return;
  }

  let html = "";

  items.forEach((item, index) => {
    const name = item.nom || item.email || "Sans nom";
    const role = (item.role || "agent").toLowerCase();
    const portail = Number(item.portail || 0) === 1;
    const amical = Number(item.amical || 0) === 1;

    html += `
      <div class="collapsible access-card" id="accessCard_${index}" data-original-email="${escapeHtml(item.email || "")}">
        <div class="collapsibleHeader cardHeader" onclick="toggleCard(event, 'accessCard_${index}')">
          <div class="collapsibleLeft">
            <div class="chevron">▶</div>
            <div class="agentName">${escapeHtml(name)}</div>
          </div>

          <div class="summarySwitches">
            <label class="miniSwitch" onclick="event.stopPropagation()">
              <span>Portail</span>
              <input class="summary-portail" type="checkbox" ${portail ? "checked" : ""}>
            </label>

            <label class="miniSwitch" onclick="event.stopPropagation()">
              <span>Amical</span>
              <input class="summary-amical" type="checkbox" ${amical ? "checked" : ""}>
            </label>
          </div>
        </div>

        <div class="collapsibleContent">
          <div class="detailsGrid">
            <div class="field">
              <label class="label">Nom</label>
              <input class="input field-nom" type="text" value="${escapeHtml(item.nom || "")}">
            </div>

            <div class="field">
              <label class="label">Adresse mail</label>
              <input class="input field-email" type="email" value="${escapeHtml(item.email || "")}">
            </div>

            <div class="field">
              <label class="label">Rôle</label>
              <select class="select field-role">
                <option value="agent" ${role === "agent" ? "selected" : ""}>agent</option>
                <option value="admin" ${role === "admin" ? "selected" : ""}>admin</option>
              </select>
            </div>
          </div>

          <div class="switchGrid">
            <div class="switchBox">
              <label class="switchLabel">
                <span>Accès Portail</span>
                <input class="field-portail" type="checkbox" ${portail ? "checked" : ""}>
              </label>
            </div>

            <div class="switchBox">
              <label class="switchLabel">
                <span>Accès Amical</span>
                <input class="field-amical" type="checkbox" ${amical ? "checked" : ""}>
              </label>
            </div>
          </div>

          <div class="hint">Adresse mail et rôle restent masqués tant que la ligne n’est pas dépliée.</div>

          <div class="agentActions">
            <button class="btn2 btnPrimary" type="button" onclick="saveCard(this)">Enregistrer</button>
            <button class="btn2 btnDanger" type="button" onclick="deleteCard(this)">Supprimer</button>
          </div>
        </div>
      </div>
    `;
  });

  zone.innerHTML = html;

  document.querySelectorAll(".access-card").forEach(bindSummarySync);
}

function toggleCard(event, id){
  const box = document.getElementById(id);
  if (!box) return;
  box.classList.toggle("open");
}

async function loadData(){
  try{
    showLoader(true);
    showStatus("info", "Chargement des accès...");

    const r = await jsonp({
      view: "acces_list",
      actorEmail: state.actorEmail
    });

    if (!r || !r.ok) {
      showStatus("err", (r && r.error) ? r.error : "Erreur de chargement.");
      showLoader(false);
      return;
    }

    const items = Array.isArray(r.items) ? r.items : [];
    state.items = items
      .map(it => ({
        email: it.email || "",
        role: (it.role || "agent").toLowerCase(),
        nom: it.nom || "",
        portail: Number(it.portail || 0),
        amical: Number(it.amical || 0)
      }))
      .sort((a, b) => {
        const an = (a.nom || a.email || "").toLowerCase();
        const bn = (b.nom || b.email || "").toLowerCase();
        return an.localeCompare(bn, "fr", { sensitivity: "base" });
      });

    renderList();
    showStatus("ok", "Accès chargés.");
    showLoader(false);

  }catch(err){
    showLoader(false);
    showStatus("err", err?.message || String(err));
  }
}

async function saveCard(btn){
  const card = btn.closest(".access-card");
  if (!card) return;

  const originalEmail = (card.dataset.originalEmail || "").trim().toLowerCase();
  const email = (card.querySelector(".field-email")?.value || "").trim().toLowerCase();
  const nom = (card.querySelector(".field-nom")?.value || "").trim();
  const role = (card.querySelector(".field-role")?.value || "agent").trim().toLowerCase();
  const portail = card.querySelector(".field-portail")?.checked ? 1 : 0;
  const amical = card.querySelector(".field-amical")?.checked ? 1 : 0;

  try{
    setButtonSaving(btn, true);
    showStatus("info", "Enregistrement...");

    const r = await jsonp({
      view: "acces_save",
      actorEmail: state.actorEmail,
      originalEmail,
      email,
      nom,
      role,
      portail,
      amical
    });

    if (!r || !r.ok) {
      showStatus("err", (r && r.error) ? r.error : "Erreur d'enregistrement.");
      setButtonSaving(btn, false);
      return;
    }

    showStatus("ok", "Accès enregistré.");
    await loadData();

  }catch(err){
    showStatus("err", err?.message || String(err));
  } finally {
    setButtonSaving(btn, false);
  }
}

async function deleteCard(btn){
  const card = btn.closest(".access-card");
  if (!card) return;

  const email = (card.dataset.originalEmail || "").trim().toLowerCase();
  if (!email) return;

  try{
    showStatus("info", "Suppression...");

    const r = await jsonp({
      view: "acces_delete",
      actorEmail: state.actorEmail,
      email
    });

    if (!r || !r.ok) {
      showStatus("err", (r && r.error) ? r.error : "Erreur de suppression.");
      return;
    }

    showStatus("ok", "Accès supprimé.");
    await loadData();

  }catch(err){
    showStatus("err", err?.message || String(err));
  }
}

async function createAgent(btn){
  const nom = (document.getElementById("new_nom")?.value || "").trim();
  const email = (document.getElementById("new_email")?.value || "").trim().toLowerCase();
  const role = (document.getElementById("new_role")?.value || "agent").trim().toLowerCase();
  const portail = document.getElementById("new_portail")?.checked ? 1 : 0;
  const amical = document.getElementById("new_amical")?.checked ? 1 : 0;

  try{
    setButtonSaving(btn, true, "Création...");
    showStatus("info", "Création de l’agent...");

    const r = await jsonp({
      view: "acces_save",
      actorEmail: state.actorEmail,
      originalEmail: "",
      email,
      nom,
      role,
      portail,
      amical
    });

    if (!r || !r.ok) {
      showStatus("err", (r && r.error) ? r.error : "Erreur de création.");
      setButtonSaving(btn, false);
      return;
    }

    document.getElementById("new_nom").value = "";
    document.getElementById("new_email").value = "";
    document.getElementById("new_role").value = "agent";
    document.getElementById("new_portail").checked = true;
    document.getElementById("new_amical").checked = false;

    showStatus("ok", "Agent créé.");
    await loadData();

  }catch(err){
    showStatus("err", err?.message || String(err));
  } finally {
    setButtonSaving(btn, false, "Créer l’agent");
  }
}

(async function init(){
  const ok = await checkAdmin();
  if (!ok) return;
  await loadData();
})();
</script>
</body>
</html>
