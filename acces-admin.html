<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Accès admin — CS Consenvoye</title>
  <link rel="stylesheet" href="cs-theme.css">

  <style>
    .adminWrap{
      max-width:980px;
      margin:0 auto;
      padding:14px;
    }

    .dashboard{
      padding:14px 16px;
      margin-bottom:16px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(47,158,91,.34), rgba(47,158,91,.18));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      font-weight:900;
      color:rgba(255,255,255,.95);
    }

    .dashboardSmall{
      margin-top:8px;
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.78);
      line-height:1.35;
    }

    .card{
      border-radius:20px;
      padding:14px;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.95);
    }

    .cardTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:12px;
    }

    .status{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      line-height:1.4;
      border:1px solid rgba(255,255,255,.12);
    }

    .status.show{ display:block; }
    .status.ok{
      background:rgba(47,158,91,.18);
      color:#d9ffe7;
    }
    .status.err{
      background:rgba(220,70,70,.18);
      color:#ffe1e1;
    }
    .status.info{
      background:rgba(47,111,212,.18);
      color:#dde9ff;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .label{
      font-size:13px;
      font-weight:900;
      color:rgba(255,255,255,.80);
    }

    .input, .select{
      width:100%;
      min-height:46px;
      border:none;
      outline:none;
      border-radius:14px;
      padding:12px 14px;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:15px;
    }

    .select option{
      color:#111;
    }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .btn2{
      border:none;
      border-radius:14px;
      min-height:46px;
      padding:12px 16px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .btnPrimary{
      background:linear-gradient(180deg, rgba(47,158,91,.95), rgba(34,125,68,.95));
      color:#fff;
    }

    .btnSecondary{
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .empty{
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px dashed rgba(255,255,255,.10);
      color:rgba(255,255,255,.76);
      font-weight:800;
    }

    .accessList{
      display:grid;
      gap:12px;
    }

    .accessItem{
      border-radius:16px;
      padding:14px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    .accessTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .accessName{
      font-size:16px;
      font-weight:900;
      color:rgba(255,255,255,.96);
      line-height:1.3;
    }

    .roleBadge{
      flex:0 0 auto;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.3px;
      background:rgba(255,190,60,.20);
      border:1px solid rgba(255,190,60,.35);
      color:#ffe7b0;
    }

    .accessMeta{
      font-size:14px;
      line-height:1.5;
      color:rgba(255,255,255,.84);
      word-break:break-word;
    }

    .metaLabel{
      color:rgba(255,255,255,.62);
      font-weight:800;
    }

    .itemActions{
      margin-top:12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .miniBtn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      min-height:42px;
    }

    .editBtn{
      background:rgba(255,180,60,.92);
      color:#1f1f1f;
    }

    .smallNote{
      margin-top:8px;
      color:rgba(255,255,255,.72);
      font-size:13px;
      font-weight:800;
      line-height:1.35;
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">🔑 Gestion des accès</div>
      <button class="btn" onclick="window.location.href='admin.html'">Retour</button>
    </div>

    <div class="adminWrap">
      <div class="dashboard">
        🔐 Administration des accès
        <div class="dashboardSmall">
          Liste existante, ajout et modification des utilisateurs autorisés.
        </div>
      </div>

      <div id="statusBox" class="status info"></div>

      <div class="card">
        <div class="cardTitle">Ajouter / modifier un accès</div>

        <form id="accessForm">
          <input type="hidden" id="originalEmail">

          <div class="field">
            <label class="label" for="nom">Nom</label>
            <input class="input" id="nom" type="text" placeholder="Nom affiché">
          </div>

          <div class="field">
            <label class="label" for="email">Adresse mail</label>
            <input class="input" id="email" type="email" placeholder="adresse@mail.com" required>
          </div>

          <div class="field">
            <label class="label" for="role">Rôle</label>
            <select class="select" id="role" required>
              <option value="agent">agent</option>
              <option value="admin">admin</option>
            </select>
          </div>

          <div class="btnRow">
            <button type="submit" class="btn2 btnPrimary" id="saveBtn">Ajouter</button>
            <button type="button" class="btn2 btnSecondary" id="cancelBtn" style="display:none;">Annuler</button>
          </div>

          <div class="smallNote">
            La feuille <strong>Acces</strong> reste la base de données, mais la gestion se fait ici.
          </div>
        </form>
      </div>

      <div class="card">
        <div class="cardTitle">Accès existants</div>
        <div id="listZone">
          <div class="empty">Chargement...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";

    const state = {
      actorEmail: "",
      items: [],
      editing: false
    };

    function showStatus(type, message){
      const box = document.getElementById("statusBox");
      box.className = "status show " + type;
      box.textContent = message || "";
    }

    function escapeHtml(v){
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

   function getCurrentEmail(){
  const qs = new URLSearchParams(window.location.search);
  const fromQuery = (qs.get("email") || "").trim().toLowerCase();
  if (fromQuery) return fromQuery;

  return (localStorage.getItem("cs_portail_email_v1") || "").trim().toLowerCase();
}

    function jsonp(params){
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const url = new URL(SCRIPT_URL);

        window[callbackName] = function(data){
          cleanup();
          resolve(data);
        };

        function cleanup(){
          try { delete window[callbackName]; } catch(e){}
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.onerror = function(){
          cleanup();
          reject(new Error("Erreur de chargement JSONP"));
        };

        url.searchParams.set("callback", callbackName);
        url.searchParams.set("_ts", Date.now());

        Object.keys(params || {}).forEach(k => {
          url.searchParams.set(k, params[k]);
        });

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    async function checkAdmin(){
      state.actorEmail = getCurrentEmail();

      if (!state.actorEmail) {
        showStatus("err", "Aucun email admin détecté.");
        return false;
      }

      const r = await jsonp({
        view: "auth_check",
        email: state.actorEmail
      });

      if (!r || !r.ok) {
        showStatus("err", "Utilisateur non autorisé.");
        return false;
      }

      if (String(r.role || "").toLowerCase() !== "admin") {
        showStatus("err", "Accès refusé : admin uniquement.");
        return false;
      }

      return true;
    }

    async function loadAccesses(){
      showStatus("info", "Chargement des accès...");

      const r = await jsonp({
        view: "acces_list",
        actorEmail: state.actorEmail
      });

      if (!r || !r.ok) {
        showStatus("err", (r && r.error) ? r.error : "Erreur de chargement.");
        document.getElementById("listZone").innerHTML = '<div class="empty">Impossible de charger la liste.</div>';
        return;
      }

      state.items = Array.isArray(r.items) ? r.items : [];
      renderList();
      showStatus("ok", "Liste chargée.");
    }

    function renderList(){
      const zone = document.getElementById("listZone");

      if (!state.items.length) {
        zone.innerHTML = '<div class="empty">Aucun accès enregistré.</div>';
        return;
      }

      let html = '<div class="accessList">';

      state.items.forEach(item => {
        const nomAffiche = item.nom && item.nom.trim() ? item.nom : "Sans nom";

        html += `
          <div class="accessItem">
            <div class="accessTop">
              <div class="accessName">${escapeHtml(nomAffiche)}</div>
              <div class="roleBadge">${escapeHtml(item.role || "")}</div>
            </div>

            <div class="accessMeta">
              <div><span class="metaLabel">Email :</span> ${escapeHtml(item.email || "")}</div>
              <div><span class="metaLabel">Nom :</span> ${escapeHtml(item.nom || "")}</div>
            </div>

            <div class="itemActions">
              <button class="miniBtn editBtn" onclick="startEdit('${encodeURIComponent(item.email || "")}')">Modifier</button>
            </div>
          </div>
        `;
      });

      html += '</div>';
      zone.innerHTML = html;
    }

    function resetForm(){
      state.editing = false;
      document.getElementById("originalEmail").value = "";
      document.getElementById("nom").value = "";
      document.getElementById("email").value = "";
      document.getElementById("role").value = "agent";
      document.getElementById("saveBtn").textContent = "Ajouter";
      document.getElementById("cancelBtn").style.display = "none";
    }

    function startEdit(encodedEmail){
      const email = decodeURIComponent(encodedEmail || "");
      const item = state.items.find(x => String(x.email).toLowerCase() === String(email).toLowerCase());
      if (!item) return;

      state.editing = true;
      document.getElementById("originalEmail").value = item.email || "";
      document.getElementById("nom").value = item.nom || "";
      document.getElementById("email").value = item.email || "";
      document.getElementById("role").value = item.role || "agent";
      document.getElementById("saveBtn").textContent = "Enregistrer";
      document.getElementById("cancelBtn").style.display = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function handleSubmit(ev){
      ev.preventDefault();

      const originalEmail = document.getElementById("originalEmail").value.trim().toLowerCase();
      const nom = document.getElementById("nom").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const role = document.getElementById("role").value.trim().toLowerCase();

      if (!email) {
        showStatus("err", "Adresse mail manquante.");
        return;
      }

      if (!role) {
        showStatus("err", "Rôle manquant.");
        return;
      }

      showStatus("info", state.editing ? "Modification en cours..." : "Ajout en cours...");

      let r;

      if (state.editing) {
        r = await jsonp({
          view: "acces_update",
          actorEmail: state.actorEmail,
          originalEmail: originalEmail,
          email: email,
          role: role,
          nom: nom
        });
      } else {
        r = await jsonp({
          view: "acces_add",
          actorEmail: state.actorEmail,
          email: email,
          role: role,
          nom: nom
        });
      }

      if (!r || !r.ok) {
        showStatus("err", (r && r.error) ? r.error : "Erreur d'enregistrement.");
        return;
      }

      showStatus("ok", state.editing ? "Accès modifié." : "Accès ajouté.");
      resetForm();
      await loadAccesses();
    }

    document.getElementById("accessForm").addEventListener("submit", handleSubmit);
    document.getElementById("cancelBtn").addEventListener("click", resetForm);

    (async function init(){
      try {
        const ok = await checkAdmin();
        if (!ok) {
          document.getElementById("listZone").innerHTML = '<div class="empty">Accès refusé.</div>';
          return;
        }
        await loadAccesses();
      } catch(err) {
        showStatus("err", err && err.message ? err.message : String(err));
        document.getElementById("listZone").innerHTML = '<div class="empty">Erreur de chargement.</div>';
      }
    })();
  </script>
</body>
</html>
