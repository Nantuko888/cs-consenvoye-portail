<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Accès admin — CS Consenvoye</title>

  <link rel="stylesheet" href="cs-theme.css">

  <style>
    .adminWrap{
      max-width:980px;
      margin:0 auto;
      padding:14px;
    }

    .dashboard{
      padding:14px 16px;
      margin-bottom:16px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(47,158,91,.30), rgba(47,158,91,.16));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:rgba(255,255,255,.96);
    }

    .dashboardTitle{
      font-size:20px;
      font-weight:900;
      line-height:1.2;
    }

    .dashboardSmall{
      margin-top:8px;
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.78);
      line-height:1.35;
    }

    .status{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      line-height:1.4;
      border:1px solid rgba(255,255,255,.12);
    }
    .status.show{ display:block; }
    .status.ok{
      background:rgba(47,158,91,.18);
      color:#d9ffe7;
    }
    .status.err{
      background:rgba(220,70,70,.18);
      color:#ffe1e1;
    }
    .status.info{
      background:rgba(47,111,212,.18);
      color:#dde9ff;
    }

    .accordion{
      border-radius:20px;
      overflow:hidden;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      background:rgba(255,255,255,.06);
    }

    .accordionHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .accordionHeader:active{
      transform:translateY(1px);
    }

    .accordionTitle{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1 1 auto;
      color:rgba(255,255,255,.96);
      font-size:18px;
      font-weight:900;
    }

    .accordionArrow{
      font-size:18px;
      color:rgba(255,255,255,.88);
      transition:transform .18s ease;
      flex:0 0 auto;
    }

    .accordion.open .accordionArrow{
      transform:rotate(180deg);
    }

    .accordionContent{
      display:none;
      padding:0 12px 12px;
    }

    .accordion.open .accordionContent{
      display:block;
    }

    .portalHeader{
      background:linear-gradient(180deg, rgba(47,111,212,.34), rgba(47,111,212,.18));
    }

    .amicaleHeader{
      background:linear-gradient(180deg, rgba(212,106,0,.34), rgba(212,106,0,.18));
    }

    .card{
      border-radius:16px;
      padding:12px;
      margin-top:12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 8px 20px rgba(0,0,0,.12);
      color:rgba(255,255,255,.95);
    }

    .cardTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .cardName{
      font-size:16px;
      font-weight:900;
      line-height:1.25;
      color:rgba(255,255,255,.96);
    }

    .badge{
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      flex:0 0 auto;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .label{
      font-size:13px;
      font-weight:900;
      color:rgba(255,255,255,.80);
    }

    .input, .select{
      width:100%;
      min-height:44px;
      border:none;
      outline:none;
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:15px;
    }

    .select option{
      color:#111;
    }

    .switchRow{
      display:grid;
      gap:8px;
      grid-template-columns:1fr 1fr;
      margin-bottom:10px;
    }

    .switchBox{
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .switchLabel{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:14px;
      font-weight:900;
      color:rgba(255,255,255,.92);
    }

    .switchLabel input{
      width:20px;
      height:20px;
      accent-color:#ff8c00;
    }

    .btnRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .btn2{
      border:none;
      border-radius:12px;
      min-height:42px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .btnPrimary{
      background:linear-gradient(180deg, rgba(255,140,40,.95), rgba(212,106,0,.95));
      color:#fff;
    }

    .btnSecondary{
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .btnDanger{
      background:linear-gradient(180deg, rgba(220,70,70,.95), rgba(180,45,45,.95));
      color:#fff;
    }

    .hint{
      font-size:12px;
      line-height:1.35;
      color:rgba(255,255,255,.72);
      font-weight:800;
      margin-top:4px;
    }

    .empty{
      padding:14px;
      margin-top:12px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px dashed rgba(255,255,255,.10);
      color:rgba(255,255,255,.76);
      font-weight:800;
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">🔑 Gestion des accès</div>
      <button class="btn" onclick="window.location.href='admin.html'">Retour</button>
    </div>

    <div class="adminWrap">
      <div class="dashboard">
        <div class="dashboardTitle">Administration des accès</div>
        <div class="dashboardSmall">
          Deux blocs distincts : Portail et Amicale. La partie Amicale se base sur les membres déjà présents dans l’organigramme.
        </div>
      </div>

      <div id="statusBox" class="status info"></div>

      <div class="accordion" id="portalAccordion">
        <div class="accordionHeader portalHeader" onclick="toggleAccordion('portalAccordion')">
          <div class="accordionTitle">🖥️ Accès Portail</div>
          <div class="accordionArrow">▾</div>
        </div>
        <div class="accordionContent">
          <div id="portalList"></div>
        </div>
      </div>

      <div class="accordion" id="amicaleAccordion">
        <div class="accordionHeader amicaleHeader" onclick="toggleAccordion('amicaleAccordion')">
          <div class="accordionTitle">🤝 Accès Amicale</div>
          <div class="accordionArrow">▾</div>
        </div>
        <div class="accordionContent">
          <div id="amicaleList"></div>
        </div>
      </div>
    </div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const EMAIL_KEY = "cs_portail_email_v1";

const state = {
  actorEmail: "",
  portalItems: [],
  amicaleItems: []
};

function showStatus(type, message){
  const box = document.getElementById("statusBox");
  box.className = "status show " + type;
  box.textContent = message || "";
}

function escapeHtml(v){
  return String(v == null ? "" : v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getCurrentEmail(){
  return (localStorage.getItem(EMAIL_KEY) || "").trim().toLowerCase();
}

function jsonp(params){
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");
    const url = new URL(SCRIPT_URL);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    function cleanup(){
      try { delete window[callbackName]; } catch(e){}
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("Erreur de chargement JSONP"));
    };

    url.searchParams.set("callback", callbackName);
    url.searchParams.set("_ts", Date.now());

    Object.keys(params || {}).forEach(k => {
      url.searchParams.set(k, params[k]);
    });

    script.src = url.toString();
    document.body.appendChild(script);
  });
}

function toggleAccordion(id){
  const target = document.getElementById(id);
  if (!target) return;
  target.classList.toggle("open");
}

async function checkAdmin(){
  state.actorEmail = getCurrentEmail();

  if (!state.actorEmail) {
    showStatus("err", "Aucun email admin détecté.");
    return false;
  }

  const r = await jsonp({
    view: "auth_check",
    email: state.actorEmail
  });

  if (!r || !r.ok) {
    showStatus("err", "Utilisateur non autorisé.");
    return false;
  }

  if (String(r.role || "").toLowerCase() !== "admin") {
    showStatus("err", "Accès refusé : admin uniquement.");
    return false;
  }

  return true;
}

function accessCardHtml(item, section){
  const email = item.email || "";
  const nom = item.nom || "";
  const role = (item.role || "agent").toLowerCase();
  const portail = Number(item.portail || 0) === 1;
  const amical = Number(item.amical || 0) === 1;
  const isExisting = !!email;
  const badge = section === "amicale"
    ? (item.sourceSousPole ? `Amicale · ${escapeHtml(item.sourceSousPole)}` : "Amicale")
    : (role === "admin" ? "admin" : "agent");

  return `
    <div class="card access-card" data-section="${escapeHtml(section)}" data-original-email="${escapeHtml(email)}">
      <div class="cardTop">
        <div class="cardName">${escapeHtml(nom || "Nouvel accès")}</div>
        <div class="badge">${badge}</div>
      </div>

      <div class="field">
        <label class="label">Nom</label>
        <input class="input field-nom" type="text" value="${escapeHtml(nom)}" placeholder="Nom affiché">
      </div>

      <div class="field">
        <label class="label">Adresse mail</label>
        <input class="input field-email" type="email" value="${escapeHtml(email)}" placeholder="adresse@mail.com">
      </div>

      <div class="field">
        <label class="label">Rôle</label>
        <select class="select field-role">
          <option value="agent" ${role === "agent" ? "selected" : ""}>agent</option>
          <option value="admin" ${role === "admin" ? "selected" : ""}>admin</option>
        </select>
      </div>

      <div class="switchRow">
        <div class="switchBox">
          <label class="switchLabel">
            <span>Accès Portail</span>
            <input class="field-portail" type="checkbox" ${portail ? "checked" : ""}>
          </label>
        </div>

        <div class="switchBox">
          <label class="switchLabel">
            <span>Accès Amicale</span>
            <input class="field-amical" type="checkbox" ${amical ? "checked" : ""}>
          </label>
        </div>
      </div>

      ${section === "amicale" && item.orgDisplay ? `<div class="hint">Source organigramme : ${escapeHtml(item.orgDisplay)}</div>` : ""}

      <div class="btnRow">
        <button class="btn2 btnPrimary" onclick="saveCard(this)">Enregistrer</button>
        ${isExisting ? `<button class="btn2 btnDanger" onclick="deleteCard(this)">Supprimer</button>` : ""}
      </div>
    </div>
  `;
}

function renderPortal(){
  const zone = document.getElementById("portalList");
  const items = Array.isArray(state.portalItems) ? [...state.portalItems] : [];

  const newCard = {
    email: "",
    role: "agent",
    nom: "",
    portail: 1,
    amical: 0
  };

  let html = accessCardHtml(newCard, "portal");
  items.forEach(item => {
    html += accessCardHtml(item, "portal");
  });

  zone.innerHTML = html || '<div class="empty">Aucun accès portail.</div>';
}

function renderAmicale(){
  const zone = document.getElementById("amicaleList");
  const items = Array.isArray(state.amicaleItems) ? state.amicaleItems : [];

  if (!items.length) {
    zone.innerHTML = '<div class="empty">Aucun membre Amicale trouvé.</div>';
    return;
  }

  let html = "";
  items.forEach(item => {
    html += accessCardHtml(item, "amicale");
  });

  zone.innerHTML = html;
}

async function loadData(){
  showStatus("info", "Chargement des accès...");

  const r = await jsonp({
    view: "acces_admin_data",
    actorEmail: state.actorEmail
  });

  if (!r || !r.ok) {
    showStatus("err", (r && r.error) ? r.error : "Erreur de chargement.");
    return;
  }

  state.portalItems = Array.isArray(r.portalItems) ? r.portalItems : [];
  state.amicaleItems = Array.isArray(r.amicaleItems) ? r.amicaleItems : [];

  renderPortal();
  renderAmicale();

  showStatus("ok", "Accès chargés.");
}

async function saveCard(btn){
  const card = btn.closest(".access-card");
  if (!card) return;

  const originalEmail = (card.dataset.originalEmail || "").trim().toLowerCase();
  const email = (card.querySelector(".field-email")?.value || "").trim().toLowerCase();
  const nom = (card.querySelector(".field-nom")?.value || "").trim();
  const role = (card.querySelector(".field-role")?.value || "agent").trim().toLowerCase();
  const portail = card.querySelector(".field-portail")?.checked ? 1 : 0;
  const amical = card.querySelector(".field-amical")?.checked ? 1 : 0;

  showStatus("info", "Enregistrement...");

  const r = await jsonp({
    view: "acces_save",
    actorEmail: state.actorEmail,
    originalEmail,
    email,
    nom,
    role,
    portail,
    amical
  });

  if (!r || !r.ok) {
    showStatus("err", (r && r.error) ? r.error : "Erreur d'enregistrement.");
    return;
  }

  showStatus("ok", "Accès enregistré.");
  await loadData();
}

async function deleteCard(btn){
  const card = btn.closest(".access-card");
  if (!card) return;

  const email = (card.dataset.originalEmail || "").trim().toLowerCase();
  if (!email) return;

  showStatus("info", "Suppression...");

  const r = await jsonp({
    view: "acces_delete",
    actorEmail: state.actorEmail,
    email
  });

  if (!r || !r.ok) {
    showStatus("err", (r && r.error) ? r.error : "Erreur de suppression.");
    return;
  }

  showStatus("ok", "Accès supprimé.");
  await loadData();
}

(async function init(){
  const ok = await checkAdmin();
  if (!ok) return;
  await loadData();
})();
</script>
</body>
</html>
