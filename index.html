<style>
:root{
  --maxw: 760px;
  --titleMaxH: 34vh;
  --btn: clamp(100px, min(22vw, 15vh), 170px);
  --gap: clamp(10px, min(3vw, 2vh), 18px);
}
*{ box-sizing:border-box; }
html, body{
  margin:0; padding:0; height:100%;
  overflow:hidden;
  overscroll-behavior-y:none;
  background:#000;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-text-size-adjust:100%;
}
body{
  background:#000 url("background.png") center top / cover no-repeat fixed;
}

/* modes */
body.mode-login{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
body.mode-portal{
  display:block;
}

.wrap{
  min-height:100dvh;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.title{
  margin-top: calc(env(safe-area-inset-top) + 2px);
  width: min(94vw, 680px);
  max-height: var(--titleMaxH);
  height:auto;
  object-fit:contain;
  display:block;
  pointer-events:none;
  user-select:none;
  transform: scale(1.25);
  transform-origin: center top;
}

.refreshBtn{
  position:fixed;
  top:14px;
  left:14px;
  z-index:9999;

  width:44px;
  height:44px;

  border-radius:50%;
  border:1px solid rgba(255,255,255,.25);

  background:linear-gradient(180deg,#ff8c00,#d86f00);

  color:white;
  font-size:20px;
  font-weight:900;

  box-shadow:0 8px 20px rgba(0,0,0,.35);
  cursor:pointer;

  display:none;
  -webkit-tap-highlight-color:transparent;

  transition:background .25s ease, transform .25s ease;
}
.refreshBtn.loading{
  background:linear-gradient(180deg,#3ccf4e,#2ca63b);
}
.refreshBtn.loading{
  animation:spin .9s linear infinite;
}

.grid{
  width: min(94vw, var(--maxw));
  margin-top: clamp(8px, 1.5vh, 16px);
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--gap);
  justify-items:center;
  align-content:start;
}
.btn{
  width: var(--btn);
  height: var(--btn);
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}

.btn img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}
@media (min-width:768px){
  :root{
    --btn: clamp(110px, 16vw, 180px);
    --titleMaxH: 26vh;
    --maxw:900px;
  }
}

/* LOGIN */

/* bouton déconnexion top-right */
.logoutTopBtn{

}
.logoutTopBtn:active{

}

@keyframes spin{
  to{ transform: rotate(360deg); }
}

.srOnly{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}

/* Badge agents en ligne */
.onlineBadge{
  position: fixed;
  top: 14px;
  left: 66px;
  z-index: 9998;

  min-height: 44px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.28);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: rgba(255,255,255,.92);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .2px;

  align-items: center;
  gap: 8px;

  -webkit-tap-highlight-color: transparent;

}

.onlineBadge.isOpen{

}

/* Tableau dépliable */
.onlinePanel{
  position: fixed;
  top: 62px;
  left: 14px;
  z-index: 9997;

  width: min(calc(100vw - 28px), 380px);
  max-height: min(45vh, 360px);
  overflow: auto;

  padding: 10px 12px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(20,20,20,.72);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 10px 28px rgba(0,0,0,.35);
}

.onlinePanelHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
  color:#fff;
  font-size:12px;
  font-weight:800;
}

.onlinePanelCount{
  min-width:22px;
  height:22px;
  padding:0 8px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:rgba(65,214,93,.18);
  border:1px solid rgba(65,214,93,.32);
}

.onlinePanelTable{
  width:100%;

.onlinePanelTable th,

.onlinePanelTable thead tr{

.onlinePanelTable th{

.onlineStatus{

}

.onlineStatusDot{

  box-shadow:0 0 8px rgba(65,214,93,.65);
}

.onlineMuted{

@media (max-width:420px){

  }

<script>
/* CONFIG */
const GOOGLE_CLIENT_ID = "690765229829-6m73boc7cn4lhkvjel8aa2vo96e83f0t.apps.googleusercontent.com";
const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const LS_KEY = "cs_portail_email_v1";

/* DOM */
const $loginBox = document.getElementById("loginBox");
const $portal = document.getElementById("portal");
const $msg = document.getElementById("loginMsg");
const $logoutPortal = document.getElementById("logoutBtnPortal");
const $refreshBtn = document.getElementById("refreshBtn");

/* UI */
function showMsg(t){
  $msg.textContent = t || "";
}

function showSync(){
  if($refreshBtn){
    $refreshBtn.classList.add("loading");
  }
}

function hideSync(){
  if($refreshBtn){
    $refreshBtn.classList.remove("loading");
  }
}

function showRefreshBtn(){
  if($refreshBtn) $refreshBtn.style.display = "block";
}

function hideRefreshBtn(){
  if($refreshBtn) $refreshBtn.style.display = "none";
}

/* État URL portail */
function markPortalUrl_(){
  if (!location.search.includes("portal=1")) {
    history.replaceState({page:"portal"}, "", location.pathname + "?portal=1");
  } else {
    history.replaceState({page:"portal"}, "", location.pathname + location.search);
  }
}

function clearPortalUrl_(){
  history.replaceState({page:"login"}, "", location.pathname);
}

function showPortal(){
  document.body.classList.remove("mode-login");
  document.body.classList.add("mode-portal");
  $loginBox.style.display = "none";
  $portal.style.display = "flex";
  showRefreshBtn();
  markPortalUrl_();
}

function showLogin(){
  document.body.classList.remove("mode-portal");
  document.body.classList.add("mode-login");
  $portal.style.display = "none";
  $loginBox.style.display = "block";
  hideRefreshBtn();
  clearPortalUrl_();
}

/* Refresh sûr */
function refreshPage(){
  window.location.href = window.location.pathname + "?r=" + Date.now();
}

/* JWT email */
function b64urlToUtf8(b64url){
  let s = String(b64url || "").replace(/-/g, "+").replace(/_/g, "/");
  while (s.length % 4) s += "=";
  const bin = atob(s);
  let out = "";
  for (let i=0;i<bin.length;i++){
    out += "%" + bin.charCodeAt(i).toString(16).padStart(2,"0");
  }
  return decodeURIComponent(out);
}

function parseJwtEmail(credential){
  const parts = String(credential || "").split(".");
  if (parts.length < 2) return "";
  const payloadJson = b64urlToUtf8(parts[1]);
  const payload = JSON.parse(payloadJson);
  return String(payload.email || "").trim().toLowerCase();
}

/* JSONP */
function jsonp(url, cbName, timeoutMs = 30000){
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.async = true;
    script.defer = true;
    script.crossOrigin = "anonymous";

    const cleanup = () => {
      script.remove();
      try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
    };

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout JSONP"));
    }, timeoutMs);

    window[cbName] = (data) => {
      clearTimeout(timer);
      cleanup();
      resolve(data);
    };

    const sep = url.includes("?") ? "&" : "?";
    script.src = url + sep + "_t=" + Date.now();

    script.onerror = () => {
      clearTimeout(timer);
      cleanup();
      reject(new Error("Erreur JSONP (script bloqué)"));
    };

    document.head.appendChild(script);
  });
}

async function authCheck(email){
  const cb = "cb_auth_" + Math.random().toString(36).slice(2);
  const url = `${API}?view=auth_check&email=${encodeURIComponent(email)}&nocache=1&callback=${cb}`;
  try {
    return await jsonp(url, cb, 30000);
  } catch(e1){
    return await jsonp(url, cb, 30000);
  }
}

/* Overlay Vérification */
let $checking = null;

function ensureChecking(){
  if($checking) return;

  $checking = document.createElement("div");
  $checking.style.position = "fixed";
  $checking.style.inset = "0";
  $checking.style.display = "none";
  $checking.style.alignItems = "center";
  $checking.style.justifyContent = "center";
  $checking.style.background = "rgba(0,0,0,.55)";
  $checking.style.backdropFilter = "blur(8px)";
  $checking.style.webkitBackdropFilter = "blur(8px)";
  $checking.style.zIndex = "999999";
  $checking.innerHTML = `
    <div style="padding:16px 18px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.60);color:#fff;font-weight:900;">
      Vérification de l’accès…
    </div>
  `;
  document.body.appendChild($checking);
}

function showChecking(){
  ensureChecking();
  $loginBox.style.display = "none";
  $portal.style.display = "none";
  hideRefreshBtn();
  $checking.style.display = "flex";
}

function hideChecking(){
  ensureChecking();
  $checking.style.display = "none";
}

/* Déconnexion */
function doLogout(){
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem("cs_role_v1");
  showLogin();
  showMsg("Déconnecté.");
}
$logoutPortal.addEventListener("click", doLogout);

/* logique centrale login */
async function checkAndShow_(email){
  showChecking();
  showMsg("");

  try{
    const res = await authCheck(email);

    if(res && res.ok === true){
      localStorage.setItem(LS_KEY, email);
      localStorage.setItem("cs_role_v1", String(res.role || "").trim().toLowerCase());

      hideChecking();
      showPortal();
      showMsg("");
      return true;
    }

    localStorage.removeItem(LS_KEY);
    localStorage.removeItem("cs_role_v1");
    hideChecking();
    showLogin();
    showMsg("Accès refusé.");
    return false;

  }catch(err){
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem("cs_role_v1");
    hideChecking();
    showLogin();
    showMsg("Erreur réseau / serveur.");
    return false;
  }
}

/* Google callback */
async function handleCredentialResponse(response){
  showMsg("Vérification de l’accès…");

  const email = parseJwtEmail(response.credential);
  if(!email){
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem("cs_role_v1");
    showLogin();
    showMsg("Erreur : email introuvable.");
    return;
  }

  await checkAndShow_(email);
}

/* Boot */
(async function(){
  const saved = (localStorage.getItem(LS_KEY) || "").trim().toLowerCase();

  if(saved){
    showPortal();
    showSync();

    try{
      const res = await authCheck(saved);

      if(res && res.ok === true){
        localStorage.setItem("cs_role_v1", String(res.role || "").trim().toLowerCase());
        hideSync();
        return;
      }

      hideSync();
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem("cs_role_v1");
      showLogin();
      showMsg("Accès refusé.");
      return;

    }catch(e){
      showSync();
      setTimeout(() => hideSync(), 1800);
      return;
    }
  }

  showLogin();
})();

/* ADMIN */
const ADMIN_URL = "admin.html";
const DENIED_IMG = "acces_refuse.png";

function isAdminLocal(){
  return (localStorage.getItem("cs_role_v1") || "").trim().toLowerCase() === "admin";
}

let _denyActive = false;
let _denyPopHandler = null;

function showDenied(){
  if (document.getElementById("denyOverlay")) return;

  _denyActive = true;

  const overlay = document.createElement("div");
  overlay.id = "denyOverlay";
  overlay.style.cssText = `
    position:fixed; inset:0; z-index:999999;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:12px;
  `;

  const img = document.createElement("img");
  img.src = DENIED_IMG;
  img.alt = "Accès refusé";
  img.style.cssText = `
    max-width:100%;
    max-height: calc(100dvh - 110px);
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
  `;

  const btn = document.createElement("button");
  btn.id = "denyBackBtn";
  btn.textContent = "← Retour";
  btn.style.cssText = `
    position:fixed;
    left:12px;
    right:12px;
    bottom: calc(env(safe-area-inset-bottom) + 14px);
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.25);
    background: rgba(0,0,0,.65);
    color:#fff;
    font-weight:950;
    font-size:16px;
    z-index:1000000;
    -webkit-tap-highlight-color: transparent;
  `;

  history.pushState({ deny: 1 }, "", location.href);

  const closeDenied = () => {
    if(!_denyActive) return;
    _denyActive = false;

    if(_denyPopHandler){
      window.removeEventListener("popstate", _denyPopHandler);
      _denyPopHandler = null;
    }

    const ov = document.getElementById("denyOverlay");
    const b = document.getElementById("denyBackBtn");
    if (ov) ov.remove();
    if (b) b.remove();

    history.back();
  };

  _denyPopHandler = () => {
    if(!_denyActive) return;
    closeDenied();
  };

  window.addEventListener("popstate", _denyPopHandler);
  btn.addEventListener("click", closeDenied);

  overlay.appendChild(img);
  document.body.appendChild(overlay);
  document.body.appendChild(btn);
}

document.addEventListener("click", (e) => {
  const btn = e.target.closest("#btnAdmin");
  if(!btn) return;
  e.preventDefault();

  if(isAdminLocal()){
    location.href = ADMIN_URL;
  }else{
    showDenied();
  }
});
</script>

<script>
(function(){
  const badge = document.getElementById("onlineBadge");
  const text = document.getElementById("onlineBadgeText");
  const panel = document.getElementById("onlinePanel");
  const panelBody = document.getElementById("onlinePanelBody");
  const panelCount = document.getElementById("onlinePanelCount");

  if (!badge || !text || !panel || !panelBody || !panelCount) return;

  let currentOnline = [];

  function escapeHtml(v){
    return String(v || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function formatLastSeen(v){
    if(!v) return "—";
    const d = new Date(v);
    if(isNaN(d.getTime())) return "—";

    const now = new Date();
    const sameDay =
      d.getDate() === now.getDate() &&
      d.getMonth() === now.getMonth() &&
      d.getFullYear() === now.getFullYear();

    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");

    if (sameDay) return `${hh}:${mm}`;

    const dd = String(d.getDate()).padStart(2, "0");
    const mo = String(d.getMonth() + 1).padStart(2, "0");
    return `${dd}/${mo} ${hh}:${mm}`;
  }

  function renderPanel(items){
    panelCount.textContent = String(items.length);

    if(!items.length){
      panelBody.innerHTML = `
        <tr>
          <td colspan="3" class="onlineEmpty">Aucun agent en ligne</td>
        </tr>
      `;
      return;
    }

    panelBody.innerHTML = items.map(a => `
      <tr>
        <td>${escapeHtml(a.nom || a.email || "—")}</td>
        <td>
          <span class="onlineStatus">
            <span class="onlineStatusDot"></span>
            <span>En ligne</span>
          </span>
        </td>
        <td class="onlineMuted">${escapeHtml(formatLastSeen(a.derniere_connexion || a.maj_session))}</td>
      </tr>
    `).join("");
  }

  function closePanel(){
    panel.hidden = true;
    badge.classList.remove("isOpen");
  }

  function togglePanel(){
    if (badge.hidden || currentOnline.length <= 0) return;
    panel.hidden = !panel.hidden;
    badge.classList.toggle("isOpen", !panel.hidden);
  }

  function loadOnlineBadge(){
    const cb = "cb_agents_" + Date.now() + "_" + Math.floor(Math.random()*10000);

    window[cb] = function(res){
      try{
        delete window[cb];

        if(!res || !res.ok || !Array.isArray(res.items)){
          badge.hidden = true;
          closePanel();
          currentOnline = [];
          return;
        }

        currentOnline = res.items
          .filter(x => Number(x.en_ligne) === 1)
          .sort((a,b) => {
            const an = (a.nom || a.email || "").toLowerCase();
            const bn = (b.nom || b.email || "").toLowerCase();
            return an.localeCompare(bn, "fr");
          });

        const count = currentOnline.length;

        if(count <= 0){
          badge.hidden = true;
          closePanel();
          renderPanel([]);
          return;
        }

        text.textContent = count + (count > 1 ? " agents en ligne" : " agent en ligne");
        badge.hidden = false;
        renderPanel(currentOnline);

      }catch(err){
        badge.hidden = true;
        closePanel();
        currentOnline = [];
      }
    };

    const s = document.createElement("script");
    s.src = API + "?view=agents_status&callback=" + encodeURIComponent(cb) + "&nocache=1";

    s.onerror = function(){
      try{ delete window[cb]; }catch(e){}
      badge.hidden = true;
      closePanel();
      currentOnline = [];
    };

    document.body.appendChild(s);
  }

  badge.addEventListener("click", function(e){
    e.stopPropagation();
    togglePanel();
  });

  panel.addEventListener("click", function(e){
    e.stopPropagation();
  });

  document.addEventListener("click", function(e){
    if (panel.hidden) return;
    if (!panel.contains(e.target) && !badge.contains(e.target)){
      closePanel();
    }
  });

  loadOnlineBadge();
  setInterval(loadOnlineBadge, 30000);
})();
</script>

</body>
</html>
