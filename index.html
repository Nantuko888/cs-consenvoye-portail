<script>
/* ====== CONFIG ====== */
const GOOGLE_CLIENT_ID = "690765229829-6m73boc7cn4lhkvjel8aa2vo96e83f0t.apps.googleusercontent.com";
const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const LS_KEY = "cs_portail_email_v1";

/* ====== DOM ====== */
const $loginBox = document.getElementById("loginBox");
const $portal = document.getElementById("portal");
const $msg = document.getElementById("loginMsg");
const $logoutPortal = document.getElementById("logoutBtnPortal");
const $syncPill = document.getElementById("syncPill");

/* ====== UI ====== */
function showMsg(t){ $msg.textContent = t || ""; }

function showSync(text){
  if(!$syncPill) return;
    $syncPill.style.display = "block";
}
function hideSync(){
  if(!$syncPill) return;
  $syncPill.style.display = "none";
}


/* ✅ État URL portail (utile pour "retour") */
function markPortalUrl_(){
  if (!location.search.includes("portal=1")) {
    history.replaceState({page:"portal"}, "", location.pathname + "?portal=1");
  } else {
    history.replaceState({page:"portal"}, "", location.pathname + location.search);
  }
}
function clearPortalUrl_(){
  history.replaceState({page:"login"}, "", location.pathname);
}

function showPortal(){
  document.body.classList.remove("mode-login");
  document.body.classList.add("mode-portal");
  $loginBox.style.display = "none";
  $portal.style.display = "flex";
  markPortalUrl_();
}
function showLogin(){
  document.body.classList.remove("mode-portal");
  document.body.classList.add("mode-login");
  $portal.style.display = "none";
  $loginBox.style.display = "block";
  clearPortalUrl_();
}

/* ====== JWT email ====== */
function b64urlToUtf8(b64url){
  let s = String(b64url || "").replace(/-/g, "+").replace(/_/g, "/");
  while (s.length % 4) s += "=";
  const bin = atob(s);
  let out = "";
  for (let i=0;i<bin.length;i++){
    out += "%" + bin.charCodeAt(i).toString(16).padStart(2,"0");
  }
  return decodeURIComponent(out);
}
function parseJwtEmail(credential){
  const parts = String(credential || "").split(".");
  if (parts.length < 2) return "";
  const payloadJson = b64urlToUtf8(parts[1]);
  const payload = JSON.parse(payloadJson);
  return String(payload.email || "").trim().toLowerCase();
}

/* ====== JSONP ====== */
function jsonp(url, cbName, timeoutMs = 30000){
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.async = true;
    script.defer = true;
    script.crossOrigin = "anonymous";

    const cleanup = () => {
      script.remove();
      try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
    };

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout JSONP"));
    }, timeoutMs);

    window[cbName] = (data) => {
      clearTimeout(timer);
      cleanup();
      resolve(data);
    };

    const sep = url.includes("?") ? "&" : "?";
    script.src = url + sep + "_t=" + Date.now();

    script.onerror = () => {
      clearTimeout(timer);
      cleanup();
      reject(new Error("Erreur JSONP (script bloqué)"));
    };

    document.head.appendChild(script);
  });
}

async function authCheck(email){
  const cb = "cb_auth_" + Math.random().toString(36).slice(2);
  const url = `${API}?view=auth_check&email=${encodeURIComponent(email)}&nocache=1&callback=${cb}`;
  try { return await jsonp(url, cb, 30000); }
  catch(e1){ return await jsonp(url, cb, 30000); }
}

/* ====== Overlay Vérification ====== */
let $checking = null;

function ensureChecking(){
  if($checking) return;

  $checking = document.createElement("div");
  $checking.style.position = "fixed";
  $checking.style.inset = "0";
  $checking.style.display = "none";
  $checking.style.alignItems = "center";
  $checking.style.justifyContent = "center";
  $checking.style.background = "rgba(0,0,0,.55)";
  $checking.style.backdropFilter = "blur(8px)";
  $checking.style.webkitBackdropFilter = "blur(8px)";
  $checking.style.zIndex = "999999";
  $checking.innerHTML = `
    <div style="padding:16px 18px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.60);color:#fff;font-weight:900;">
      Vérification de l’accès…
    </div>
  `;
  document.body.appendChild($checking);
}

function showChecking(){
  ensureChecking();
  $loginBox.style.display = "none";
  $portal.style.display = "none";
  $checking.style.display = "flex";
}
function hideChecking(){
  ensureChecking();
  $checking.style.display = "none";
}

/* ====== Déconnexion ====== */
function doLogout(){
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem("cs_role_v1");
  showLogin();
  showMsg("Déconnecté.");
}
$logoutPortal.addEventListener("click", doLogout);

/* ====== logique centrale login ====== */
async function checkAndShow_(email){
  showChecking();
  showMsg("");

  try{
    const res = await authCheck(email);

    if(res && res.ok === true){
      localStorage.setItem(LS_KEY, email);
      localStorage.setItem("cs_role_v1", String(res.role||"").trim().toLowerCase());

      hideChecking();
      showPortal();
      showMsg("");
      return true;
    }

    localStorage.removeItem(LS_KEY);
    localStorage.removeItem("cs_role_v1");
    hideChecking();
    showLogin();
    showMsg("Accès refusé.");
    return false;

  }catch(err){
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem("cs_role_v1");
    hideChecking();
    showLogin();
    showMsg("Erreur réseau / serveur.");
    return false;
  }
}

/* ====== Google callback ====== */
async function handleCredentialResponse(response){
  showMsg("Vérification de l’accès…");

  const email = parseJwtEmail(response.credential);
  if(!email){
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem("cs_role_v1");
    showLogin();
    showMsg("Erreur : email introuvable.");
    return;
  }

  await checkAndShow_(email);
}

/* ====== Boot ====== */
(async function(){
  const saved = (localStorage.getItem(LS_KEY) || "").trim().toLowerCase();

  if(saved){
    // ✅ on affiche le portail tout de suite (pas d’écran noir)
    showPortal();
    showSync();

    try{
      const res = await authCheck(saved);

      if(res && res.ok === true){
        localStorage.setItem("cs_role_v1", String(res.role||"").trim().toLowerCase());
        hideSync();
        return;
      }

      // refus
      hideSync();
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem("cs_role_v1");
      showLogin();
      showMsg("Accès refusé.");
      return;

    }catch(e){
      // ✅ hors-ligne / serveur lent : on laisse le portail visible
      showSync("Hors ligne — affichage en cache");
      setTimeout(()=> hideSync(), 1800);
      return;
    }
  }

  showLogin();
})();


/* =========================================================
   ====== ADMIN (clic + refus plein écran + retour) ======
   ========================================================= */

const ADMIN_URL = "admin.html";
const DENIED_IMG = "acces_refuse.png";

function isAdminLocal(){
  return (localStorage.getItem("cs_role_v1") || "").trim().toLowerCase() === "admin";
}

/* ✅ globals (évite bugs silencieux) */
let _denyActive = false;
let _denyPopHandler = null;

function showDenied(){
  // si déjà affiché, ne recrée pas
  if (document.getElementById("denyOverlay")) return;

  _denyActive = true;

  const overlay = document.createElement("div");
  overlay.id = "denyOverlay";
  overlay.style.cssText = `
    position:fixed; inset:0; z-index:999999;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:12px;
  `;

  // image
  const img = document.createElement("img");
  img.src = DENIED_IMG;
  img.alt = "Accès refusé";
  img.style.cssText = `
    max-width:100%;
    max-height: calc(100dvh - 110px);
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
  `;

  // bouton retour en bas
  const btn = document.createElement("button");
  btn.id = "denyBackBtn";
  btn.textContent = "← Retour";
  btn.style.cssText = `
    position:fixed;
    left:12px;
    right:12px;
    bottom: calc(env(safe-area-inset-bottom) + 14px);
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.25);
    background: rgba(0,0,0,.65);
    color:#fff;
    font-weight:950;
    font-size:16px;
    z-index:1000000;
    -webkit-tap-highlight-color: transparent;
  `;

  // ✅ on ajoute 1 entrée "deny"
  // -> Android "retour" déclenche popstate
  history.pushState({ deny: 1 }, "", location.href);

  const closeDenied = () => {
    if(!_denyActive) return;
    _denyActive = false;

    if(_denyPopHandler){
      window.removeEventListener("popstate", _denyPopHandler);
      _denyPopHandler = null;
    }

    const ov = document.getElementById("denyOverlay");
    const b = document.getElementById("denyBackBtn");
    if (ov) ov.remove();
    if (b) b.remove();

    // ✅ annule l'entrée "deny" proprement
    history.back();
  };

  // ✅ Android back => ferme l’overlay (au lieu de boucler)
  _denyPopHandler = () => {
    if(!_denyActive) return;
    closeDenied();
  };
  window.addEventListener("popstate", _denyPopHandler);

  btn.addEventListener("click", closeDenied);

  overlay.appendChild(img);
  document.body.appendChild(overlay);
  document.body.appendChild(btn);
}

document.addEventListener("click", (e)=>{
  const btn = e.target.closest("#btnAdmin");
  if(!btn) return;
  e.preventDefault();

  // ✅ instantané : PAS d'appel API ici
  if(isAdminLocal()){
    location.href = ADMIN_URL;
  }else{
    showDenied();
  }
});
</script>
