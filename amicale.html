<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Amicale — CS Consenvoye</title>

  <link rel="stylesheet" href="cs-theme.css">

  <style>
    .pageWrap{
      max-width:980px;
      margin:0 auto;
      padding:14px;
    }

    .hero{
      padding:14px 16px;
      margin-bottom:16px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(212,106,0,.34), rgba(212,106,0,.16));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:rgba(255,255,255,.96);
    }

    .heroTitle{
      font-size:20px;
      font-weight:900;
      line-height:1.2;
    }

    .heroSmall{
      margin-top:8px;
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.78);
      line-height:1.35;
    }

    .status{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      line-height:1.4;
      border:1px solid rgba(255,255,255,.12);
    }

    .status.show{ display:block; }
    .status.ok{
      background:rgba(47,158,91,.18);
      color:#d9ffe7;
    }
    .status.err{
      background:rgba(220,70,70,.18);
      color:#ffe1e1;
    }
    .status.info{
      background:rgba(47,111,212,.18);
      color:#dde9ff;
    }

    .topTitleWrap{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .lockBtn{
      display:none;
      border:none;
      border-radius:12px;
      min-height:36px;
      min-width:42px;
      padding:8px 10px;
      background:rgba(255,255,255,.14);
      color:#fff;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .lockBtn:active{
      transform:translateY(1px);
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn2{
      border:none;
      border-radius:14px;
      min-height:42px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      transition:background .22s ease, transform .12s ease, opacity .18s ease;
    }

    .btn2:active{
      transform:translateY(1px);
    }

    .btnPrimary{
      background:linear-gradient(180deg, rgba(255,140,40,.95), rgba(212,106,0,.95));
      color:#fff;
    }

    .btnPrimary.saving{
      background:linear-gradient(180deg, rgba(47,158,91,.95), rgba(34,128,73,.95));
      color:#fff;
    }

    .btnSecondary{
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .btnDanger{
      background:linear-gradient(180deg, rgba(220,70,70,.95), rgba(180,45,45,.95));
      color:#fff;
    }

    .btnMini{
      min-height:36px;
      padding:8px 10px;
      font-size:13px;
      border-radius:12px;
    }

    .btn2[disabled]{
      opacity:.7;
      cursor:default;
    }

    .accordion{
      border-radius:20px;
      overflow:hidden;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      background:rgba(255,255,255,.06);
    }

    .accordionHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px;
    }

    .accordionHeaderMain{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1 1 auto;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .accordionHeaderMain:active{
      transform:translateY(1px);
    }

    .accordionTitle{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1 1 auto;
      color:rgba(255,255,255,.96);
      font-size:18px;
      font-weight:900;
    }

    .emoji{
      font-size:22px;
      line-height:1;
      flex:0 0 auto;
    }

    .accordionArrow{
      font-size:18px;
      color:rgba(255,255,255,.88);
      transition:transform .18s ease;
      flex:0 0 auto;
    }

    .accordion.open .accordionArrow{
      transform:rotate(180deg);
    }

    .accordionContent{
      display:none;
      padding:12px;
      background:rgba(0,0,0,.10);
    }

    .accordion.open .accordionContent{
      display:block;
    }

    .hdr-reunions{
      background:linear-gradient(180deg, rgba(47,111,212,.34), rgba(47,111,212,.18));
    }

    .hdr-cr{
      background:linear-gradient(180deg, rgba(145,90,220,.30), rgba(145,90,220,.15));
    }

    .hdr-projets{
      background:linear-gradient(180deg, rgba(47,158,91,.30), rgba(47,158,91,.15));
    }

    .hdr-evenements{
      background:linear-gradient(180deg, rgba(220,90,170,.28), rgba(220,90,170,.14));
    }

    .hdr-cal{
      background:linear-gradient(180deg, rgba(255,190,60,.30), rgba(255,190,60,.15));
    }

    .subAccordion{
      border-radius:16px;
      overflow:hidden;
      margin-bottom:10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
    }

    .subHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:13px 14px;
      cursor:pointer;
      font-weight:900;
      color:rgba(255,255,255,.95);
      background:rgba(255,255,255,.06);
      -webkit-tap-highlight-color:transparent;
    }

    .subHeader:active{
      transform:translateY(1px);
    }

    .subArrow{
      transition:transform .18s ease;
      color:rgba(255,255,255,.82);
    }

    .subAccordion.open .subArrow{
      transform:rotate(180deg);
    }

    .subContent{
      display:none;
      padding:12px;
      background:rgba(0,0,0,.14);
    }

    .subAccordion.open .subContent{
      display:block;
    }

    .activeHeader{
      background:linear-gradient(180deg, rgba(255,190,60,.20), rgba(255,190,60,.08));
    }

    .yearHeader{
      background:linear-gradient(180deg, rgba(47,111,212,.22), rgba(47,111,212,.10));
    }

    .sectorHeader{
      background:linear-gradient(180deg, rgba(47,158,91,.22), rgba(47,158,91,.10));
    }

    .archiveHeader{
      background:linear-gradient(180deg, rgba(145,90,220,.24), rgba(145,90,220,.10));
    }

    .archiveYearHeader{
      background:linear-gradient(180deg, rgba(220,90,170,.22), rgba(220,90,170,.10));
    }

    .archiveSectorHeader{
      background:linear-gradient(180deg, rgba(212,106,0,.24), rgba(212,106,0,.10));
    }

    .card{
      border-radius:16px;
      padding:12px;
      margin-bottom:10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.95);
    }

    .cardTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .cardTitle{
      font-size:15px;
      font-weight:900;
      color:rgba(255,255,255,.98);
    }

    .line{
      font-size:14px;
      line-height:1.45;
      color:rgba(255,255,255,.86);
      margin-bottom:4px;
      white-space:pre-wrap;
    }

    .muted{
      color:rgba(255,255,255,.68);
      font-weight:800;
      font-size:13px;
    }

    .grid2{
      display:grid;
      gap:10px;
      grid-template-columns:1fr;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .label{
      font-size:13px;
      font-weight:900;
      color:rgba(255,255,255,.80);
    }

    .input, .textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:15px;
      font-family:inherit;
    }

    .input{
      min-height:44px;
    }

    .textarea{
      min-height:110px;
      resize:vertical;
    }

    .editorBox{
      display:none;
      margin-top:10px;
      padding-top:10px;
      border-top:1px dashed rgba(255,255,255,.10);
    }

    .adminMode .editorBox.show{
      display:block;
    }

    .adminOnly{
      display:none;
    }

    .adminMode .adminOnly{
      display:flex;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:32px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
      font-size:12px;
      font-weight:900;
      margin-right:6px;
      margin-bottom:6px;
    }

    .summaryBox{
      border-radius:16px;
      padding:12px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      margin-bottom:10px;
    }

    .summaryTitle{
      font-size:15px;
      font-weight:900;
      color:rgba(255,255,255,.97);
      margin-bottom:8px;
    }

    .summaryRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:6px 0;
      font-size:14px;
      color:rgba(255,255,255,.88);
      border-bottom:1px dashed rgba(255,255,255,.08);
    }

    .summaryRow:last-child{
      border-bottom:none;
    }

    .empty{
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px dashed rgba(255,255,255,.10);
      color:rgba(255,255,255,.76);
      font-weight:800;
    }

    .deny{
      max-width:680px;
      margin:24px auto;
      padding:16px;
      border-radius:20px;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      color:#fff;
      text-align:center;
    }

    .denyTitle{
      font-size:22px;
      font-weight:950;
      margin-bottom:10px;
    }

    .loaderOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      z-index:99999;
    }

    .loaderOverlay.show{
      display:flex;
    }

    .loaderBox{
      width:52px;
      height:52px;
      border-radius:999px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 14px 34px rgba(0,0,0,.40);
    }

    .loaderSpinner{
      width:24px;
      height:24px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.25);
      border-top-color:#ff8c00;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @media (min-width:800px){
      .grid2{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div id="loader" class="loaderOverlay">
    <div class="loaderBox">
      <div class="loaderSpinner"></div>
    </div>
  </div>

  <div class="wrap" id="pageWrap" style="display:none;">
    <div class="topbar">
      <div class="topTitleWrap">
        <div class="title">🤝 Amicale</div>
        <button id="amicaleLock" class="lockBtn" type="button">🔒</button>
      </div>
      <button class="btn" onclick="window.location.href='index.html'">Retour</button>
    </div>

    <div class="pageWrap">
      <div class="hero">
        <div class="heroTitle">Espace Amicale</div>
        <div class="heroSmall">
          Consultation réservée aux membres de l’Amicale. Les administrateurs Amicale peuvent déverrouiller le mode création avec le cadenas.
        </div>
      </div>

      <div id="statusBox" class="status info"></div>
      <div id="sections"></div>
    </div>
  </div>

  <div id="denyBox" style="display:none;">
    <div class="deny">
      <div class="denyTitle">Accès réservé</div>
      <div class="line">Cette page est réservée aux membres autorisés de l’Amicale.</div>
      <div class="line" style="margin-top:10px;">
        <button class="btn" onclick="window.location.href='index.html'">Retour</button>
      </div>
    </div>
  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const EMAIL_KEY = "cs_portail_email_v1";

const state = {
  auth: null,
  adminMode: false,
  reunions: [],
  comptesRendus: [],
  projets: [],
  evenements: [],
  tourneesActives: [],
  tourneesArchives: []
};

function showLoader(v){
  document.getElementById("loader").classList.toggle("show", !!v);
}

function showStatus(type, message){
  const box = document.getElementById("statusBox");
  box.className = "status show " + type;
  box.textContent = message || "";
}

function setButtonSaving(btn, saving, savingText = "Enregistrement..."){
  if (!btn) return;
  if (saving) {
    btn.dataset.originalText = btn.textContent;
    btn.textContent = savingText;
    btn.classList.add("saving");
    btn.disabled = true;
  } else {
    btn.textContent = btn.dataset.originalText || btn.textContent;
    btn.classList.remove("saving");
    btn.disabled = false;
  }
}

function escapeHtml(v){
  return String(v == null ? "" : v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getCurrentEmail(){
  return (localStorage.getItem(EMAIL_KEY) || "").trim().toLowerCase();
}

function jsonp(params){
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");
    const url = new URL(API);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    function cleanup(){
      try { delete window[callbackName]; } catch(e){}
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("Erreur JSONP"));
    };

    url.searchParams.set("callback", callbackName);
    url.searchParams.set("_ts", Date.now());

    Object.keys(params || {}).forEach(k => {
      url.searchParams.set(k, params[k]);
    });

    script.src = url.toString();
    document.body.appendChild(script);
  });
}

function toggleAccordion(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle("open");
}

function toggleSubAccordion(ev, id){
  ev.stopPropagation();
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle("open");
}

function toggleEditor(id){
  const box = document.getElementById(id);
  if (!box) return;
  box.classList.toggle("show");
}

function setAdminMode(on){
  state.adminMode = !!on;
  document.body.classList.toggle("adminMode", state.adminMode);

  const lock = document.getElementById("amicaleLock");
  if (lock) {
    lock.textContent = state.adminMode ? "🔓" : "🔒";
  }

  showStatus("ok", state.adminMode ? "Mode création Amicale activé." : "Mode consultation.");
}

async function checkAmicaleAccess(){
  const email = getCurrentEmail();

  if (!email) {
    return { ok:false };
  }

  const auth = await jsonp({
    view: "auth_check",
    email
  });

  if (!auth || !auth.ok) {
    return { ok:false };
  }

  if (Number(auth.amical || 0) !== 1 && String(auth.role || "").toLowerCase() !== "admin") {
    return { ok:false };
  }

  return { ok:true, auth };
}

function sectionShell(id, headerClass, emoji, title, bodyHtml){
  return `
    <div class="accordion" id="${id}">
      <div class="accordionHeader ${headerClass}">
        <div class="accordionHeaderMain" onclick="toggleAccordion('${id}')">
          <div class="accordionTitle">
            <span class="emoji">${emoji}</span>
            <span>${title}</span>
          </div>
          <span class="accordionArrow">▾</span>
        </div>
      </div>
      <div class="accordionContent">${bodyHtml}</div>
    </div>
  `;
}

function renderReunions(){
  const items = state.reunions || [];

  return `
    ${items.length ? `
      <div class="grid2">
        ${items.map((r, i) => `
          <div class="card">
            <div class="cardTop">
              <div class="cardTitle">Réunion ${i + 1}</div>
              <div class="toolbar adminOnly">
                <button class="btn2 btnSecondary btnMini" type="button" onclick="toggleEditor('reunion_edit_${i}')">🖍</button>
              </div>
            </div>

            <div class="line"><strong>Date :</strong> ${escapeHtml(r.date || "—")}</div>
            <div class="line"><strong>Lieu :</strong> ${escapeHtml(r.lieu || "—")}</div>
            <div class="line"><strong>Notes :</strong> ${escapeHtml(r.notes || "—")}</div>

            <div class="editorBox" id="reunion_edit_${i}">
              <div class="field">
                <label class="label">Date</label>
                <input class="input" id="reunion_date_${i}" type="text" value="${escapeHtml(r.date || "")}">
              </div>
              <div class="field">
                <label class="label">Lieu</label>
                <input class="input" id="reunion_lieu_${i}" type="text" value="${escapeHtml(r.lieu || "")}">
              </div>
              <div class="field">
                <label class="label">Notes</label>
                <textarea class="textarea" id="reunion_notes_${i}">${escapeHtml(r.notes || "")}</textarea>
              </div>
              <div class="toolbar">
                <button class="btn2 btnPrimary" type="button" onclick="saveReunion(${i}, this)">Enregistrer</button>
                <button class="btn2 btnDanger" type="button" onclick="deleteReunion('${escapeHtml(r.id)}', this)">Supprimer</button>
              </div>
            </div>
          </div>
        `).join("")}
      </div>
    ` : `<div class="empty">Aucune réunion enregistrée.</div>`}

    <div class="card adminOnly">
      <div class="cardTitle">Ajouter une réunion</div>
      <div class="field">
        <label class="label">Date</label>
        <input class="input" id="new_reunion_date" type="text">
      </div>
      <div class="field">
        <label class="label">Lieu</label>
        <input class="input" id="new_reunion_lieu" type="text">
      </div>
      <div class="field">
        <label class="label">Notes</label>
        <textarea class="textarea" id="new_reunion_notes"></textarea>
      </div>
      <div class="toolbar">
        <button class="btn2 btnPrimary" type="button" onclick="createReunion(this)">Créer</button>
      </div>
    </div>
  `;
}

function renderCR(){
  const items = state.comptesRendus || [];

  return `
    ${items.length ? items.map((r, i) => {
      const docs = String(r.documents || "").split(/\n+/).map(x => x.trim()).filter(Boolean);
      return `
        <div class="card">
          <div class="cardTop">
            <div class="cardTitle">${escapeHtml(r.titre || `Compte-rendu ${i + 1}`)}</div>
            <div class="toolbar adminOnly">
              <button class="btn2 btnSecondary btnMini" type="button" onclick="toggleEditor('cr_edit_${i}')">🖍</button>
            </div>
          </div>

          <div class="line"><strong>Date :</strong> ${escapeHtml(r.date || "—")}</div>
          <div class="line"><strong>Texte :</strong></div>
          <div class="line">${escapeHtml(r.texte || "—")}</div>
          <div class="line" style="margin-top:8px;"><strong>Documents :</strong></div>
          ${docs.length ? docs.map(d => `<div class="pill">📎 ${escapeHtml(d)}</div>`).join("") : `<div class="muted">Aucun document</div>`}

          <div class="editorBox" id="cr_edit_${i}">
            <div class="field">
              <label class="label">Date</label>
              <input class="input" id="cr_date_${i}" type="text" value="${escapeHtml(r.date || "")}">
            </div>
            <div class="field">
              <label class="label">Titre</label>
              <input class="input" id="cr_titre_${i}" type="text" value="${escapeHtml(r.titre || "")}">
            </div>
            <div class="field">
              <label class="label">Texte</label>
              <textarea class="textarea" id="cr_texte_${i}">${escapeHtml(r.texte || "")}</textarea>
            </div>
            <div class="field">
              <label class="label">Documents (un par ligne)</label>
              <textarea class="textarea" id="cr_docs_${i}">${escapeHtml(r.documents || "")}</textarea>
            </div>
            <div class="toolbar">
              <button class="btn2 btnPrimary" type="button" onclick="saveCR(${i}, this)">Enregistrer</button>
              <button class="btn2 btnDanger" type="button" onclick="deleteCR('${escapeHtml(r.id)}', this)">Supprimer</button>
            </div>
          </div>
        </div>
      `;
    }).join("") : `<div class="empty">Aucun compte-rendu enregistré.</div>`}

    <div class="card adminOnly">
      <div class="cardTitle">Ajouter un compte-rendu</div>
      <div class="field">
        <label class="label">Date</label>
        <input class="input" id="new_cr_date" type="text">
      </div>
      <div class="field">
        <label class="label">Titre</label>
        <input class="input" id="new_cr_titre" type="text">
      </div>
      <div class="field">
        <label class="label">Texte</label>
        <textarea class="textarea" id="new_cr_texte"></textarea>
      </div>
      <div class="field">
        <label class="label">Documents (un par ligne)</label>
        <textarea class="textarea" id="new_cr_docs"></textarea>
      </div>
      <div class="toolbar">

function totalRows(items){
  let attribues = 0;
  let vendus = 0;
  let somme = 0;

  items.forEach(r => {
    attribues += Number(r.attribues || 0) || 0;
    vendus += Number(r.vendus || 0) || 0;
    somme += Number(String(r.somme || "").replace(",", ".")) || 0;
  });

  return { attribues, vendus, somme };
}

function groupByYear(items){
  const map = new Map();

  items.forEach(it => {
    const year = String(it.annee || "").trim() || "Sans année";
    if (!map.has(year)) map.set(year, []);
    map.get(year).push(it);
  });

  return Array.from(map.entries()).map(([annee, rows]) => ({ annee, rows }));
}

function renderTourneesGroup(items, prefix, yearClass, sectorClass, archiveMode){
  const groups = groupByYear(items);
  if (!groups.length) return `<div class="empty">Aucune donnée.</div>`;

  return groups.map((g, gi) => {
    const totals = totalRows(g.rows);
    const gid = `${prefix}_group_${gi}`;

    return `
      <div class="subAccordion" id="${gid}">
        <div class="subHeader ${yearClass}" onclick="toggleSubAccordion(event, '${gid}')">
          <span>Année ${escapeHtml(g.annee)}</span>
          <span class="subArrow">▾</span>
        </div>
        <div class="subContent">

          <div class="summaryBox">
            <div class="summaryTitle">Somme totale</div>
            <div class="summaryRow"><span>Calendriers attribués</span><strong>${totals.attribues}</strong></div>
            <div class="summaryRow"><span>Calendriers vendus</span><strong>${totals.vendus}</strong></div>
            <div class="summaryRow"><span>Somme restituée</span><strong>${totals.somme} €</strong></div>
          </div>

          ${g.rows.map((r, ri) => {
            const sid = `${gid}_sector_${ri}`;
            const agents = String(r.agents || "").split(",").map(x => x.trim()).filter(Boolean);

            return `
              <div class="subAccordion" id="${sid}">
                <div class="subHeader ${sectorClass}" onclick="toggleSubAccordion(event, '${sid}')">
                  <span>${escapeHtml(r.secteur || "Secteur")}</span>

                <div class="subContent">
                  <div class="card">

                      <div class="cardTitle">${escapeHtml(r.secteur || "Secteur")}</div>
                      <div class="toolbar adminOnly">
                        <button class="btn2 btnSecondary btnMini" type="button" onclick="toggleEditor('${prefix}_edit_${gi}_${ri}')">🖍</button>
                        ${!archiveMode ? `<button class="btn2 btnDanger btnMini" type="button" onclick="archiveTournee('${escapeHtml(r.annee)}','${escapeHtml(r.secteur)}', this)">Archiver</button>` : ``}
                      </div>
                    </div>

                    ${agents.length ? agents.map(a => `<div class="pill">${escapeHtml(a)}</div>`).join("") : `<div class="muted">Aucun agent</div>`}
                    <div class="line" style="margin-top:8px;"><strong>Calendriers attribués :</strong> ${escapeHtml(r.attribues || "0")}</div>

                    <div class="line"><strong>Somme restituée :</strong> ${escapeHtml(r.somme || "0")} €</div>

                    <div class="editorBox" id="${prefix}_edit_${gi}_${ri}">
                      <div class="field">
                        <label class="label">Année</label>
                        <input class="input" id="${prefix}_annee_${gi}_${ri}" type="text" value="${escapeHtml(r.annee || "")}">
                      </div>
                      <div class="field">
                        <label class="label">Secteur / commune</label>
                        <input class="input" id="${prefix}_secteur_${gi}_${ri}" type="text" value="${escapeHtml(r.secteur || "")}">
                      </div>
                      <div class="field">
                        <label class="label">Agents (séparés par virgules)</label>
                        <textarea class="textarea" id="${prefix}_agents_${gi}_${ri}">${escapeHtml(r.agents || "")}</textarea>
                      </div>
                      <div class="grid2">
                        <div class="field">
                          <label class="label">Calendriers attribués</label>
                          <input class="input" id="${prefix}_attribues_${gi}_${ri}" type="text" value="${escapeHtml(r.attribues || "")}">

                        <label class="label">Somme restituée</label>

async function loadAll(){
  try{
    showLoader(true);
    showStatus("info", "Chargement de la page Amicale...");

    const [
      reunions,
      cr,
      projets,
      evenements,
      tourneesActives,
      tourneesArchives
    ] = await Promise.all([
      jsonp({ view:"amicale_reunions_list", actorEmail:getCurrentEmail() }),
      jsonp({ view:"amicale_cr_list", actorEmail:getCurrentEmail() }),
      jsonp({ view:"amicale_projets_list", actorEmail:getCurrentEmail() }),
      jsonp({ view:"amicale_evenements_list", actorEmail:getCurrentEmail() }),
      jsonp({ view:"amicale_tournees_actives", actorEmail:getCurrentEmail() }),
      jsonp({ view:"amicale_tournees_archives", actorEmail:getCurrentEmail() })
    ]);

    state.reunions = Array.isArray(reunions.items) ? reunions.items : [];
    state.comptesRendus = Array.isArray(cr.items) ? cr.items : [];
    state.projets = Array.isArray(projets.items) ? projets.items : [];
    state.evenements = Array.isArray(evenements.items) ? evenements.items : [];
    state.tourneesActives = Array.isArray(tourneesActives.items) ? tourneesActives.items : [];
    state.tourneesArchives = Array.isArray(tourneesArchives.items) ? tourneesArchives.items : [];

    renderAll();
    showStatus("ok", state.adminMode ? "Mode création prêt." : "Mode consultation.");
    showLoader(false);

  }catch(err){
    showLoader(false);
    showStatus("err", err?.message || String(err));
  }
}

(async function init(){
  showLoader(true);

  try{
    const access = await checkAmicaleAccess();

    if (!access.ok) {
      document.getElementById("denyBox").style.display = "block";
      showLoader(false);
      return;
    }

    state.auth = access.auth || null;

    document.getElementById("pageWrap").style.display = "block";

    const canAdmin = Number(state.auth?.amicale_admin || 0) === 1 || String(state.auth?.role || "").toLowerCase() === "admin";
    const lock = document.getElementById("amicaleLock");

    if (canAdmin && lock) {
      lock.style.display = "inline-flex";
      lock.addEventListener("click", function(){
        setAdminMode(!state.adminMode);
      });
    }

    setAdminMode(false);
    await loadAll();

  }catch(err){
    document.getElementById("denyBox").style.display = "block";
    showLoader(false);
  }
})();
