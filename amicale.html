<!doctype html>
<html lang="fr">
<head>

<title>Amicale — Accès réservé</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:system-ui;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

/* bouton retour */

.backBtn{
position:fixed;
top:14px;
left:14px;

padding:10px 16px;
border-radius:14px;

background:linear-gradient(180deg,#ff8c00,#d86f00);
border:1px solid rgba(255,255,255,.25);

font-weight:900;
color:white;

box-shadow:0 10px 25px rgba(0,0,0,.4);

cursor:pointer;
}

/* image */

.lockImg{
max-width:90%;
max-height:70vh;
object-fit:contain;
}

</style>
</head>

<body>

<button class="backBtn" onclick="history.back()">← Retour</button>

<img src="amicale-refuse.png" class="lockImg">

</body>
