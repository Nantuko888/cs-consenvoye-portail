<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Organigramme Admin</title>

<link rel="stylesheet" href="cs-theme.css">

<style>

body{
font-family:system-ui;
background:#000;
color:#fff;
}

.adminWrap{
max-width:900px;
margin:auto;
padding:14px;
}

.card{
border-radius:16px;
padding:14px;
margin-bottom:14px;
background:rgba(255,255,255,.06);
}

.cardTitle{
font-size:18px;
font-weight:900;
margin-bottom:12px;
}

.input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.08);
color:#fff;
margin-bottom:8px;
}

.poleItem{
border-radius:14px;
overflow:hidden;
margin-bottom:10px;
}

.poleHeader{
padding:14px;
font-weight:900;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.poleContent{
display:none;
padding:14px;
background:rgba(0,0,0,.25);
}

.poleItem.open .poleContent{
display:block;
}

.memberEdit{
background:rgba(255,255,255,.05);
border-radius:10px;
padding:10px;
margin-bottom:10px;
}

.btn{
padding:8px 12px;
border-radius:8px;
border:none;
cursor:pointer;
font-weight:700;
}

.btnAdd{
background:#2ecc71;
color:#fff;
}

.btnRemove{
background:#e74c3c;
color:#fff;
}

.btnSave{
background:#ff8c00;
color:#fff;
width:100%;
padding:12px;
font-weight:900;
margin-top:12px;
}

#loader{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
z-index:9999;
}

.spinner{
width:36px;
height:36px;
border:4px solid rgba(255,255,255,.2);
border-top:4px solid #ff8c00;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
</div>

<div class="adminWrap">

<div class="card">

<div class="cardTitle">Direction</div>

<input id="chef" class="input" placeholder="Chef">
<input id="adj1" class="input" placeholder="Adjoint 1">
<input id="adj2" class="input" placeholder="Adjoint 2">

</div>

<div class="card">

<div class="cardTitle">Pôles</div>

<div id="poleZone"></div>

<button class="btn btnSave" onclick="saveOrg()">Enregistrer</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec"

let orgData=null

function showLoader(v){
document.getElementById("loader").style.display=v?"block":"none"
}

function jsonp(url){
return new Promise(resolve=>{
const cb="cb"+Date.now()
const s=document.createElement("script")
window[cb]=d=>{
resolve(d)
delete window[cb]
s.remove()
}
s.src=url+"&callback="+cb
document.body.appendChild(s)
})
}

function parseMember(txt){

if(typeof txt!=="string") return txt

const parts=txt.split(" : ")

if(parts.length===2){
return{fonction:parts[0].trim(),nom:parts[1].trim()}
}

return{fonction:"",nom:txt.trim()}

}

function memberRow(m){

const mem=parseMember(m||"")

return`

<div class="memberEdit">

<input class="input memberFonction" placeholder="Fonction" value="${mem.fonction||""}">
<input class="input memberNom" placeholder="Nom" value="${mem.nom||""}">

<button class="btn btnRemove" onclick="this.parentElement.remove()">Supprimer</button>

</div>

`

}

function render(){

const zone=document.getElementById("poleZone")

let html=""

orgData.poles.forEach((pole,i)=>{

html+=`

<div class="poleItem" style="border-left:6px solid ${pole.color||'#888'}">

<div class="poleHeader"
style="background:${pole.color||'#444'}20"
onclick="this.parentElement.classList.toggle('open')">

${pole.label}

<span>▼</span>

</div>

<div class="poleContent">

`

pole.subpoles.forEach((sp,j)=>{

html+=`<h4>${sp.label}</h4>`

const membres=sp.membres||[]

if(membres.length){

membres.forEach(m=>{
html+=memberRow(m)
})

}else{

html+=memberRow()

}

html+=`

<button class="btn btnAdd" onclick="addMember(this)">Ajouter</button>

<br><br>

`

})

html+=`</div></div>`

})

zone.innerHTML=html

}

function addMember(btn){
btn.insertAdjacentHTML("beforebegin",memberRow())
}

async function loadOrg(){

showLoader(true)

const r=await jsonp(API+"?view=org_admin_get")

orgData=r

document.getElementById("chef").value=r.direction.chef||""
document.getElementById("adj1").value=r.direction.adj1||""
document.getElementById("adj2").value=r.direction.adj2||""

render()

showLoader(false)

}

async function saveOrg(){

showLoader(true)

const payload={
direction:{
chef:document.getElementById("chef").value,
adj1:document.getElementById("adj1").value,
adj2:document.getElementById("adj2").value
},
poles:[]
}

document.querySelectorAll(".poleItem").forEach((pole,i)=>{

const poleData=orgData.poles[i]

const poleObj={
id:poleData.id,
subpoles:[]
}

pole.querySelectorAll(".poleContent h4").forEach((title,j)=>{

const sp=poleData.subpoles[j]

const subObj={
id:sp.id,
membres:[]
}

title.parentElement.querySelectorAll(".memberEdit").forEach(m=>{

const fonction=m.querySelector(".memberFonction").value
const nom=m.querySelector(".memberNom").value

if(nom){

subObj.membres.push({
fonction,
nom
})

}

})

poleObj.subpoles.push(subObj)

})

payload.poles.push(poleObj)

})

await jsonp(API+"?view=org_admin_save&payload="+encodeURIComponent(JSON.stringify(payload)))

showLoader(false)

alert("Organigramme enregistré")

loadOrg()

}

loadOrg()

</script>

</body>
</html>
