<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Organigramme Admin</title>

<link rel="stylesheet" href="cs-theme.css">

<style>

.adminWrap{
max-width:980px;
margin:0 auto;
padding:14px;
}

.card{
border-radius:20px;
padding:14px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.10);
background:rgba(255,255,255,.06);
color:#fff;
}

.cardTitle{
font-size:18px;
font-weight:900;
margin-bottom:12px;
}

.input{
width:100%;
min-height:44px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.1);
color:#fff;
padding:10px;
}

.poleItem{
border-radius:14px;
overflow:hidden;
background:rgba(255,255,255,.05);
margin-bottom:10px;
}

.poleHeader{
padding:14px;
font-weight:900;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.poleContent{
display:none;
padding:14px;
}

.poleItem.open .poleContent{
display:block;
}

.memberEdit{
border-radius:12px;
padding:10px;
margin-bottom:10px;
background:rgba(255,255,255,.05);
}

.btnSmall{
padding:8px 10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.btnAdd{
background:#2ecc71;
color:#fff;
}

.btnRemove{
background:#e74c3c;
color:#fff;
}

.btnSave{
background:#ff8c00;
color:#fff;
padding:12px;
border:none;
border-radius:12px;
font-weight:900;
cursor:pointer;
width:100%;
margin-top:12px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
<div class="title">Organigramme Admin</div>
<button class="btn" onclick="window.location.href='admin.html'">Retour</button>
</div>

<div class="adminWrap">

<div class="card">

<div class="cardTitle">Direction</div>

<input id="chef" class="input" placeholder="Chef">

<br><br>

<input id="adj1" class="input" placeholder="Adjoint 1">

<br><br>

<input id="adj2" class="input" placeholder="Adjoint 2">

</div>

<div class="card">

<div class="cardTitle">Pôles</div>

<div id="poleZone"></div>

<button class="btnSave" onclick="saveOrg()">Enregistrer</button>

</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec"

let orgData=null

function jsonp(url,cb){
return new Promise(resolve=>{
const s=document.createElement("script")
window[cb]=data=>{
resolve(data)
delete window[cb]
s.remove()
}
s.src=url+"&callback="+cb
document.body.appendChild(s)
})
}

function parseMember(txt){

if(typeof txt!=="string"){
return txt
}

const parts=txt.split(" : ")

if(parts.length===2){

return{
fonction:parts[0].trim(),
nom:parts[1].trim()
}

}

return{
fonction:"",
nom:txt.trim()
}

}

function memberRow(m){

const membre=parseMember(m)

return`

<div class="memberEdit">

<input class="input memberFonction" placeholder="Fonction" value="${membre.fonction||""}">

<br><br>

<input class="input memberNom" placeholder="Nom" value="${membre.nom||""}">

<br><br>

<button class="btnSmall btnRemove" onclick="this.parentElement.remove()">Supprimer</button>

</div>

`

}

function render(){

const zone=document.getElementById("poleZone")

let html=""

orgData.poles.forEach((pole,i)=>{

html+=`

<div class="poleItem">

<div class="poleHeader" onclick="this.parentElement.classList.toggle('open')">

${pole.label}

<span>▼</span>

</div>

<div class="poleContent">

`

pole.subpoles.forEach((sp,j)=>{

html+=`<h4>${sp.label}</h4>`

const membres=sp.membres||[]

if(membres.length){

membres.forEach(m=>{
html+=memberRow(m)
})

}else{

html+=memberRow("")

}

html+=`

<button class="btnSmall btnAdd" onclick="addMember(this)">Ajouter</button>

<br><br>

`

})

html+=`</div></div>`

})

zone.innerHTML=html

}

function addMember(btn){

btn.insertAdjacentHTML("beforebegin",memberRow(""))

}

async function loadOrg(){

const cb="cb"+Date.now()

const r=await jsonp(API+"?view=org_admin_get",cb)

orgData=r

document.getElementById("chef").value=r.direction.chef||""
document.getElementById("adj1").value=r.direction.adj1||""
document.getElementById("adj2").value=r.direction.adj2||""

render()

}

async function saveOrg(){

const payload={

direction:{
chef:document.getElementById("chef").value,
adj1:document.getElementById("adj1").value,
adj2:document.getElementById("adj2").value
},

poles:[]

}

document.querySelectorAll(".poleItem").forEach((pole,i)=>{

const poleData=orgData.poles[i]

const poleObj={
id:poleData.id,
subpoles:[]
}

pole.querySelectorAll(".poleContent h4").forEach((title,j)=>{

const sp=poleData.subpoles[j]

const subObj={
id:sp.id,
membres:[]
}

title.parentElement.querySelectorAll(".memberEdit").forEach(m=>{

const fonction=m.querySelector(".memberFonction").value
const nom=m.querySelector(".memberNom").value

if(nom){

subObj.membres.push({

fonction,
nom

})

}

})

poleObj.subpoles.push(subObj)

})

payload.poles.push(poleObj)

})

const cb="cb"+Date.now()

await jsonp(API+"?view=org_admin_save&payload="+encodeURIComponent(JSON.stringify(payload)),cb)

alert("Organigramme enregistré")

loadOrg()

}

loadOrg()

</script>

</body>
</html>
