<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Informations — CS Consenvoye</title>

  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.78);
      --shadow:0 14px 34px rgba(0,0,0,.40);
      --stroke:rgba(255,255,255,.10);
      --header1:rgba(212,106,0,.75);
      --header2:rgba(185,88,0,.58);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }

    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.62)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
      transform:translateZ(0);
    }

    .bg::after{
      content:"";
      position:absolute; inset:0;
      background:radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.64) 62%);
      z-index:-1;
    }

    .wrap{
      height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows:auto 1fr;
      gap:10px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:linear-gradient(180deg, var(--header1), var(--header2));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      min-height:46px;
    }

    .title{
      font-weight:950;
      letter-spacing:.8px;
      text-transform:uppercase;
      font-size:18px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:9px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .btn:active{transform:translateY(1px)}

    .content{
      min-height:0;
      overflow:auto;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      padding-right:2px;
    }

    .navBtn{
      width:100%;
      border:none;
      color:var(--txt);
      text-align:left;
      padding:16px 16px;
      border-radius:var(--radius);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .navBtn:active{
      transform:translateY(1px);
    }

    .navLeft{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .emoji{
      font-size:26px;
      line-height:1;
      flex:0 0 auto;
    }

    .label{
      font-size:20px;
      font-weight:950;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .arrow{
      font-size:18px;
      opacity:.88;
      flex:0 0 auto;
    }

    .contacts{
      background:linear-gradient(180deg, rgba(75,130,220,.34), rgba(75,130,220,.16));
    }

    .reglement{
      background:linear-gradient(180deg, rgba(210,70,70,.34), rgba(210,70,70,.16));
    }

    .amicale{
      background:linear-gradient(180deg, rgba(200,120,40,.34), rgba(200,120,40,.16));
    }

    .evenements{
      background:linear-gradient(180deg, rgba(90,170,105,.34), rgba(90,170,105,.16));
    }

    .statistiques{
      background:linear-gradient(180deg, rgba(145,90,210,.34), rgba(145,90,210,.16));
    }

    @media (max-width:360px){
      .label{font-size:18px}
      .emoji{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">Informations</div>
      <button class="btn" id="btnBack">Retour</button>
    </div>

    <div class="content">
      <button class="navBtn contacts" onclick="location.href='contacts.html'">
        <div class="navLeft">
          <span class="emoji">📞</span>
          <span class="label">Contacts</span>
        </div>
        <span class="arrow">›</span>
      </button>

      <button class="navBtn reglement" onclick="location.href='reglement.html'">
        <div class="navLeft">
          <span class="emoji">📘</span>
          <span class="label">Règlement</span>
        </div>
        <span class="arrow">›</span>
      </button>

      <button class="navBtn amicale" onclick="location.href='amicale-info.html'">
        <div class="navLeft">
          <span class="emoji">🤝</span>
          <span class="label">Amicale</span>
        </div>
        <span class="arrow">›</span>
      </button>

      <button class="navBtn evenements" onclick="location.href='evenements.html'">
        <div class="navLeft">
          <span class="emoji">📅</span>
          <span class="label">Événements</span>
        </div>
        <span class="arrow">›</span>
      </button>

      <button class="navBtn statistiques" onclick="location.href='statistiques.html'">
        <div class="navLeft">
          <span class="emoji">📊</span>
          <span class="label">Statistiques</span>
        </div>
        <span class="arrow">›</span>
      </button>
    </div>
  </div>

  <script>
    document.getElementById("btnBack").addEventListener("click", () => {
      location.replace("index.html?portal=1");
    });
  </script>
</body>
</html>
