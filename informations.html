<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Informations — CS Consenvoye</title>

<style>
:root{
  --txt:#f4f4f4;
  --muted:rgba(255,255,255,.75);
  --shadow:0 12px 28px rgba(0,0,0,.40);
  --stroke:rgba(255,255,255,.10);
  --radius:20px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
  overflow:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.65)),
    url("background.png") center/cover no-repeat;
  z-index:-1;
}

/* LAYOUT */
.wrap{
  height:100vh;
  max-width:900px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 10px);
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* HEADER */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(212,106,0,.80), rgba(185,88,0,.60));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
}

.title{
  font-weight:950;
  letter-spacing:.6px;
  font-size:16px;
  text-transform:uppercase;
}

.btn{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.20);
  color:var(--txt);
  padding:7px 12px;
  border-radius:12px;
  font-weight:900;
  font-size:13px;
}

/* LIST */
.content{
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-right:2px;
}

/* BUTTONS */
.navBtn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 14px;
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  cursor:pointer;
}

.navLeft{
  display:flex;
  align-items:center;
  gap:12px;
}

.emoji{
  font-size:22px;
}

.label{
  font-size:17px;
  font-weight:900;
}

.arrow{
  font-size:18px;
  opacity:.8;
}

/* COLORS */
.contacts{
  background:linear-gradient(180deg, rgba(75,130,220,.28), rgba(75,130,220,.12));
}

.reglement{
  background:linear-gradient(180deg, rgba(210,70,70,.28), rgba(210,70,70,.12));
}

.amicale{
  background:linear-gradient(180deg, rgba(200,120,40,.28), rgba(200,120,40,.12));
}

.evenements{
  background:linear-gradient(180deg, rgba(90,170,105,.28), rgba(90,170,105,.12));
}

.statistiques{
  background:linear-gradient(180deg, rgba(140,90,210,.28), rgba(140,90,210,.12));
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="topbar">
    <div class="title">Informations</div>
    <button class="btn" onclick="location.href='index.html?portal=1'">Retour</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="navBtn contacts" onclick="location.href='contacts.html'">
      <div class="navLeft">
        <span class="emoji">📞</span>
        <span class="label">Contacts</span>
      </div>
      <span class="arrow">›</span>
    </div>

    <div class="navBtn reglement" onclick="location.href='reglement.html'">
      <div class="navLeft">
        <span class="emoji">📘</span>
        <span class="label">Règlement</span>
      </div>
      <span class="arrow">›</span>
    </div>

    <div class="navBtn amicale" onclick="location.href='amicale-info.html'">
      <div class="navLeft">
        <span class="emoji">🤝</span>
        <span class="label">Amicale</span>
      </div>
      <span class="arrow">›</span>
    </div>

    <div class="navBtn evenements" onclick="location.href='evenements.html'">
      <div class="navLeft">
        <span class="emoji">📅</span>
        <span class="label">Événements</span>
      </div>
      <span class="arrow">›</span>
    </div>

    <div class="navBtn statistiques" onclick="location.href='statistiques.html'">
      <div class="navLeft">
        <span class="emoji">📊</span>
        <span class="label">Statistiques</span>
      </div>
      <span class="arrow">›</span>
    </div>

  </div>

</div>

</body>
</html>
