<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Règlement</title>

<style>

body{
font-family:system-ui;
background:#0b0b0b;
color:#fff;
margin:0;
padding:20px;
}

h1{
margin:0 0 20px 0;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.btnAdd{
background:#ff8c00;
color:#fff;
margin-bottom:20px;
}

.tabsList{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:20px;
}

.tabItem{
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:#1a1a1a;
border-radius:10px;
cursor:pointer;
}

.colorDot{
width:16px;
height:16px;
border-radius:50%;
}

.editor{
background:#111;
padding:20px;
border-radius:12px;
}

input, textarea{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

textarea{
height:200px;
resize:vertical;
}

.colorPicker{
display:flex;
gap:10px;
margin-bottom:15px;
}

.colorBtn{
width:26px;
height:26px;
border-radius:50%;
cursor:pointer;
border:2px solid transparent;
}

.colorBtn.selected{
border:2px solid white;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.save{
background:#2f9e5b;
color:white;
}

.delete{
background:#c0392b;
color:white;
}

</style>
</head>

<body>

<h1>Règlement</h1>

<button class="btnAdd" onclick="addTab()">+ Ajouter un onglet</button>

<div id="tabsList" class="tabsList"></div>

<div class="editor">

<input id="label" placeholder="Nom de l’onglet">

<div class="colorPicker" id="colors"></div>

<textarea id="contenu" placeholder="Écrire le texte du règlement..."></textarea>

<div class="actions">
<button class="save" onclick="saveTab()">Enregistrer</button>
<button class="delete" onclick="deleteTab()">Supprimer</button>
</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";

const COLORS=[
"rgba(75,130,220,.6)",
"rgba(145,105,220,.6)",
"rgba(215,125,60,.6)",
"rgba(70,170,170,.6)",
"rgba(210,70,70,.6)",
"rgba(90,170,105,.6)",
"rgba(210,170,60,.6)"
];

let tabs=[];
let selectedIndex=null;
let selectedColor=COLORS[0];

function jsonp(params){

return new Promise((resolve,reject)=>{

const cb="cb_"+Date.now();

window[cb]=function(data){
delete window[cb];
script.remove();
resolve(data);
}

const script=document.createElement("script");
const url=new URL(SCRIPT_URL);

url.searchParams.set("callback",cb);

for(const k in params){
url.searchParams.set(k,params[k]);
}

script.src=url;
document.body.appendChild(script);

});

}

function renderColors(){

const c=document.getElementById("colors");

c.innerHTML="";

COLORS.forEach(col=>{

const b=document.createElement("div");
b.className="colorBtn";
b.style.background=col;

if(col===selectedColor){
b.classList.add("selected");
}

b.onclick=()=>{
selectedColor=col;
renderColors();
}

c.appendChild(b);

});

}

function renderTabs(){

const list=document.getElementById("tabsList");

list.innerHTML="";

tabs.forEach((t,i)=>{

const div=document.createElement("div");
div.className="tabItem";

div.innerHTML=`
<div class="colorDot" style="background:${t.color}"></div>
<div>${t.label}</div>
`;

div.onclick=()=>{
selectTab(i);
}

list.appendChild(div);

});

}

function selectTab(i){

selectedIndex=i;

const t=tabs[i];

document.getElementById("label").value=t.label;
document.getElementById("contenu").value=t.contenu;

selectedColor=t.color;

renderColors();

}

function addTab(){

selectedIndex=null;

document.getElementById("label").value="";
document.getElementById("contenu").value="";

}

async function saveTab(){

const label=document.getElementById("label").value;
const contenu=document.getElementById("contenu").value;

await jsonp({
view:"reglement_save",
label,
contenu,
color:selectedColor
});

load();

}

async function deleteTab(){

if(selectedIndex===null)return;

const t=tabs[selectedIndex];

await jsonp({
view:"reglement_delete",
key:t.key
});

load();

}

async function load(){

const r=await jsonp({view:"reglement_tabs"});

tabs=r.items||[];

renderTabs();

}

renderColors();
load();

</script>

</body>
</html>
