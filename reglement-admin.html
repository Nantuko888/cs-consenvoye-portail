<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Admin règlement — CS Consenvoye</title>
  <link rel="stylesheet" href="cs-theme.css">

  <style>
    .adminWrap{
      max-width:980px;
      margin:0 auto;
      padding:14px;
    }

    .dashboard{
      padding:14px 16px;
      margin-bottom:16px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(210,70,70,.30), rgba(210,70,70,.16));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:rgba(255,255,255,.96);
    }

    .dashboardTitle{
      font-size:20px;
      font-weight:900;
      line-height:1.2;
    }

    .dashboardSmall{
      margin-top:8px;
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.78);
      line-height:1.35;
    }

    .status{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      line-height:1.4;
      border:1px solid rgba(255,255,255,.12);
    }

    .status.show{display:block}
    .status.ok{background:rgba(47,158,91,.18);color:#d9ffe7}
    .status.err{background:rgba(220,70,70,.18);color:#ffe1e1}
    .status.info{background:rgba(47,111,212,.18);color:#dde9ff}

    .card{
      border-radius:20px;
      padding:14px;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.95);
    }

    .cardTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:12px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .btn2{
      border:none;
      border-radius:14px;
      min-height:44px;
      padding:12px 16px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      transition:background .22s ease, transform .12s ease, opacity .18s ease;
    }

    .btn2:active{transform:translateY(1px)}
    .btn2[disabled]{opacity:.7;cursor:default}

    .btnPrimary{
      background:linear-gradient(180deg, rgba(255,140,40,.95), rgba(212,106,0,.95));
      color:#fff;
    }

    .btnSecondary{
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .btnDanger{
      background:linear-gradient(180deg, rgba(220,70,70,.95), rgba(180,45,45,.95));
      color:#fff;
    }

    .regList{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .regItem{
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      box-shadow:0 8px 20px rgba(0,0,0,.12);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .regHeader{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .chevron{
      width:18px;
      text-align:center;
      font-size:15px;
      color:rgba(255,255,255,.90);
      transition:transform .18s ease;
      flex:0 0 auto;
    }

    .regItem.open .chevron{
      transform:rotate(90deg);
    }

    .tabChip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      font-size:12px;
      font-weight:900;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      flex:0 0 auto;
      max-width:180px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .regMeta{
      min-width:0;
      flex:1 1 auto;
    }

    .regTitle{
      font-size:16px;
      font-weight:900;
      color:rgba(255,255,255,.98);
      line-height:1.15;
      word-break:break-word;
    }

    .regSub{
      margin-top:4px;
      font-size:12px;
      font-weight:800;
      color:rgba(255,255,255,.72);
      line-height:1.35;
    }

    .regBody{
      display:none;
      padding:0 14px 14px;
      background:rgba(0,0,0,.08);
    }

    .regItem.open .regBody{
      display:block;
    }

    .detailsGrid{
      display:grid;
      gap:12px;
      grid-template-columns:1fr;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
      min-width:0;
    }

    .label{
      font-size:13px;
      font-weight:900;
      color:rgba(255,255,255,.80);
    }

    .input,.textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:15px;
      font-family:inherit;
    }

    .input{min-height:44px}

    .textarea{
      min-height:260px;
      resize:vertical;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .switchBox{
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      margin-bottom:10px;
    }

    .switchLabel{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:14px;
      font-weight:900;
      color:rgba(255,255,255,.92);
    }

    .switchLabel input{
      width:20px;
      height:20px;
      accent-color:#ff8c00;
      margin:0;
    }

    .palette{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .colorBtn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.20);
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      flex:0 0 auto;
    }

    .colorBtn.selected{
      border:3px solid #fff;
      transform:scale(1.08);
    }

    .previewWrap{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      flex-wrap:wrap;
    }

    .previewLabel{
      font-size:13px;
      font-weight:900;
      color:rgba(255,255,255,.78);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .empty{
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px dashed rgba(255,255,255,.10);
      color:rgba(255,255,255,.76);
      font-weight:800;
    }

    .loaderOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      z-index:99999;
    }

    .loaderOverlay.show{display:flex}

    .loaderBox{
      width:52px;
      height:52px;
      border-radius:999px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 14px 34px rgba(0,0,0,.40);
    }

    .loaderSpinner{
      width:24px;
      height:24px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.25);
      border-top-color:#ff8c00;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    @media (min-width:800px){
      .detailsGrid{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div id="loader" class="loaderOverlay">
    <div class="loaderBox"><div class="loaderSpinner"></div></div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">📘 Admin règlement</div>
      <button class="btn" onclick="window.location.href='admin.html'">Retour</button>
    </div>

    <div class="adminWrap">
      <div class="dashboard">
        <div class="dashboardTitle">Règlement</div>
        <div class="dashboardSmall">
          Sélectionne un onglet, modifie son texte, puis enregistre.
        </div>
      </div>

      <div id="statusBox" class="status info"></div>

      <div class="card">
        <div class="cardTitle">Onglets</div>

        <div class="toolbar">
          <button class="btn2 btnPrimary" type="button" onclick="createNewItem()">Ajouter un onglet</button>
          <button class="btn2 btnSecondary" type="button" onclick="loadData()">Actualiser</button>
        </div>

        <div id="reglementList" class="regList"></div>
      </div>
    </div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const EMAIL_KEY = "cs_portail_email_v1";

const PRESET_COLORS = [
  "rgba(75,130,220,.42)",
  "rgba(145,105,220,.42)",
  "rgba(215,125,60,.42)",
  "rgba(70,170,170,.42)",
  "rgba(210,70,70,.42)",
  "rgba(90,170,105,.42)",
  "rgba(210,170,60,.42)"
];

const FALLBACK_ITEMS = [
  { key:"vehicules", label:"Véhicules", color:"rgba(75,130,220,.42)", ordre:1, actif:1, contenu:`Utilisation des véhicules

Les véhicules doivent être maintenus en permanence prêts à partir en intervention.

Après chaque intervention ou manœuvre, l’équipage veille à remettre le matériel en place, remplir le carnet de bord et vérifier le niveau de carburant.

Si la jauge est proche des 3/4, le complément doit être effectué. Si nécessaire, il est possible d’utiliser une autre station-service.

Si le véhicule est sale au retour d’intervention, il doit être nettoyé. En cas d’impossibilité immédiate, prévenir et revenir le lendemain pour effectuer le lavage.

En cas d’anomalie ou de dysfonctionnement, prévenir le responsable du pôle concerné.` },
  { key:"vsav", label:"VSAV", color:"rgba(145,105,220,.42)", ordre:2, actif:1, contenu:`Inventaire et désinfection VSAV

Les personnels peuvent participer à la désinfection mensuelle du VSAV, organisée avec un référent.

L’inscription peut se faire via la page web du centre ou sur la feuille d’inscription disponible au centre.

Cette participation permet également de se remettre à jour sur l’emplacement du matériel dans le VSAV.

La prise de garde mensuelle est également un moment permettant de réaliser l’inventaire du véhicule et de maintenir la connaissance du matériel.

Les référents VSAV ont mis en place une page dédiée accessible via un QR code présent dans le VSAV, permettant d’accéder directement à la partie “Désinfection VSAV / Inventaire” de la page web du centre.` },
  { key:"centre", label:"Vie centre", color:"rgba(215,125,60,.42)", ordre:3, actif:1, contenu:`Investissement dans la vie du centre

Le bon fonctionnement du centre repose sur l’implication de chacun.

- L’encadrement ou l’accompagnement des JSP
- La préparation des manœuvres
- La prise de responsabilité dans un pôle
- La participation aux cérémonies officielles

Ces engagements contribuent au bon fonctionnement du centre et au maintien du niveau opérationnel.` },
  { key:"communication", label:"Com / Manœuvres", color:"rgba(70,170,170,.42)", ordre:4, actif:1, contenu:`Communication / Manœuvres

La communication interne est essentielle au bon fonctionnement du centre.

Les personnels sont invités à consulter régulièrement les moyens de communication du centre et à répondre aux sondages et aux questions posées.

Il est recommandé de répondre dans les plus brefs délais, ou dans les délais demandés, aux sondages concernant les manœuvres, afin de permettre aux organisateurs de préparer au mieux les exercices.

Répondre aux sollicitations est également une marque de respect pour les personnes qui prennent du temps pour organiser les activités du centre.

Les manœuvres sont indispensables au maintien des compétences opérationnelles.

Les personnels doivent arriver prêts au minimum dix minutes avant le début de la manœuvre, par respect pour les organisateurs.

En cas d’impossibilité de présence, il est demandé de prévenir le responsable de la manœuvre dans les meilleurs délais.

Lors des manœuvres, le matériel doit être remis correctement en place et reconditionné afin d’éviter toute mauvaise surprise lors d’une intervention.` },
  { key:"gardes", label:"Gardes", color:"rgba(210,70,70,.42)", ordre:5, actif:1, contenu:`Gardes et gardes postées hors secteur / Prise de garde

Toute prise de garde hors secteur doit être signalée au chef de centre ou à ses adjoints.

- 78 heures de disponibilité mensuelle : 1 garde
- 108 heures de disponibilité mensuelle : 2 gardes
- Une troisième garde peut être accordée en cas d’investissement particulier dans la vie du centre (JSP, responsable de pôle, implication dans celui-ci)

La prise de garde est organisée mensuellement.

Un responsable est désigné chaque mois afin d’organiser cette prise de garde avec les agents également désignés pour le mois.

Il veille à ce que les missions prévues soient réalisées au cours du mois.

Un onglet dédié sur la page web du centre a été créé afin de faciliter la gestion de cette prise de garde.

Il est demandé de l’utiliser pour le suivi des missions.

La propreté du centre est l’affaire de tous.` },
  { key:"collectivite", label:"Collectivité", color:"rgba(90,170,105,.42)", ordre:6, actif:1, contenu:`Vie en collectivité

Les sapeurs-pompiers ont vocation à aider les personnes, aussi bien les victimes que leurs collègues.

Il est attendu de chacun une attitude respectueuse, contribuant à maintenir une bonne ambiance au centre et lors des manœuvres.

Lors des retours d’intervention, chacun veille à respecter le voisinage.

Les espaces communs doivent être respectés : après utilisation de la cuisine ou du matériel (café, tasses, etc.), chacun range et nettoie ce qu’il a utilisé.

Les nouveaux arrivants doivent être accueillis et accompagnés afin de faciliter leur intégration.

Le centre doit rester un lieu où l’on vient avec plaisir, dans un esprit de camaraderie et de solidarité.` },
  { key:"tenue", label:"Tenue / Tabac", color:"rgba(210,170,60,.42)", ordre:7, actif:1, contenu:`Tenue et image du centre / Interdiction de fumer et vapoter

La tenue portée lors des manœuvres, cérémonies ou représentations doit être propre et conforme.

Chaque sapeur-pompier représente le centre de secours et le SDIS, que ce soit en intervention ou lors de déplacements en tenue.

Il est attendu de chacun un comportement respectueux et exemplaire vis-à-vis de la population.

Lors des cérémonies et événements officiels, une tenue soignée et une attitude appropriée sont demandées.

Le respect de l’uniforme et de l’image du centre contribue à la crédibilité et à la reconnaissance du service auprès de la population.

Il est strictement interdit de fumer ou de vapoter dans les locaux du centre de secours, ainsi que dans les véhicules de service.

Cette règle s’applique à l’ensemble des personnels et des visiteurs.

Des espaces extérieurs peuvent être utilisés pour fumer, dans le respect des lieux et du voisinage.` }
];

const state = {
  actorEmail: "",
  items: []
};

function showLoader(v){
  document.getElementById("loader").classList.toggle("show", !!v);
}

function showStatus(type, message){
  const box = document.getElementById("statusBox");
  box.className = "status show " + type;
  box.textContent = message || "";
}

function setButtonSaving(btn, saving, savingText = "Enregistrement..."){
  if (!btn) return;
  if (saving) {
    btn.dataset.originalText = btn.textContent;
    btn.textContent = savingText;
    btn.disabled = true;
  } else {
    btn.textContent = btn.dataset.originalText || btn.textContent;
    btn.disabled = false;
  }
}

function escapeHtml(v){
  return String(v == null ? "" : v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getCurrentEmail(){
  return (localStorage.getItem(EMAIL_KEY) || "").trim().toLowerCase();
}

function jsonp(params){
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");
    const url = new URL(SCRIPT_URL);

    window[callbackName] = function(data){
      cleanup();
      resolve(data);
    };

    function cleanup(){
      try { delete window[callbackName]; } catch(e){}
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.onerror = function(){
      cleanup();
      reject(new Error("Erreur de chargement JSONP"));
    };

    url.searchParams.set("callback", callbackName);
    url.searchParams.set("_ts", Date.now());

    Object.keys(params || {}).forEach(k => {
      url.searchParams.set(k, params[k]);
    });

    script.src = url.toString();
    document.body.appendChild(script);
  });
}

async function checkAdmin(){
  state.actorEmail = getCurrentEmail();

  if (!state.actorEmail) {
    showStatus("err", "Aucun email admin détecté.");
    return false;
  }

  const r = await jsonp({
    view: "auth_check",
    email: state.actorEmail
  });

  if (!r || !r.ok) {
    showStatus("err", "Utilisateur non autorisé.");
    return false;
  }

  if (String(r.role || "").toLowerCase() !== "admin") {
    showStatus("err", "Accès refusé : admin uniquement.");
    return false;
  }

  return true;
}

function isValidReglementItem(x){
  if (!x || typeof x !== "object") return false;

  const key = String(x.key || "").trim();
  const label = String(x.label || "").trim();
  const color = String(x.color || "").trim();
  const contenu = String(x.contenu || "").trim();

  if (!key) return false;
  if (!label) return false;
  if (!color.startsWith("rgba(")) return false;
  if (!contenu) return false;
  if (key.includes(" ")) return false;
  if (label.includes("rgba(")) return false;
  if (contenu.startsWith("rgba(")) return false;

  return true;
}

function normalizeItems(items){
  return [...items]
    .map(x => ({
      key: x.key || "",
      label: x.label || "",
      color: x.color || PRESET_COLORS[0],
      contenu: x.contenu || "",
      ordre: Number(x.ordre || 0),
      actif: Number(x.actif || 0) === 1 ? 1 : 0
    }))
    .sort((a,b) => a.ordre - b.ordre);
}

function toggleCard(id){
  const box = document.getElementById(id);
  if (!box) return;
  document.querySelectorAll(".regItem").forEach(x => {
    if (x.id !== id) x.classList.remove("open");
  });
  box.classList.toggle("open");
}

function buildColorPalette(selectedColor, idx){
  return PRESET_COLORS.map((color, i) => `
    <button
      type="button"
      class="colorBtn ${color === selectedColor ? "selected" : ""}"
      style="background:${escapeHtml(color)};"
      onclick="pickColor(${idx}, '${escapeHtml(color)}')"
      aria-label="Couleur ${i+1}"
    ></button>
  `).join("");
}

function renderList(){
  const zone = document.getElementById("reglementList");
  const items = Array.isArray(state.items) ? state.items : [];

  if (!items.length) {
    zone.innerHTML = '<div class="empty">Aucun onglet trouvé.</div>';
    return;
  }

  zone.innerHTML = items.map((item, index) => `
    <div class="regItem" id="regCard_${index}" data-original-key="${escapeHtml(item.key || "")}">
      <div class="regHeader" onclick="toggleCard('regCard_${index}')">
        <div class="chevron">▶</div>
        <div class="tabChip" style="background:${escapeHtml(item.color || PRESET_COLORS[0])};">
          ${escapeHtml(item.label || item.key || "Sans titre")}
        </div>
        <div class="regMeta">
          <div class="regTitle">${escapeHtml(item.label || item.key || "Sans titre")}</div>
          <div class="regSub">ordre ${escapeHtml(item.ordre || 0)} • ${item.actif ? "actif" : "masqué"}</div>
        </div>
      </div>

      <div class="regBody">
        <div class="detailsGrid">
          <div class="field">
            <label class="label">Nom technique</label>
            <input class="input field-key" type="text" value="${escapeHtml(item.key || "")}" placeholder="ex: vehicules">
          </div>

          <div class="field">
            <label class="label">Libellé affiché</label>
            <input class="input field-label" type="text" value="${escapeHtml(item.label || "")}" placeholder="ex: Véhicules">
          </div>

          <div class="field">
            <label class="label">Ordre</label>
            <input class="input field-ordre" type="number" value="${escapeHtml(item.ordre || 0)}">
          </div>

          <div class="field">
            <label class="label">Aperçu onglet</label>
            <div class="previewWrap">
              <span class="previewLabel">Aperçu :</span>
              <div class="tabChip" style="background:${escapeHtml(item.color || PRESET_COLORS[0])};">
                ${escapeHtml(item.label || item.key || "Sans titre")}
              </div>
            </div>
          </div>
        </div>

        <div class="field">
          <label class="label">Couleur</label>
          <div class="palette">${buildColorPalette(item.color || PRESET_COLORS[0], index)}</div>
          <input class="input field-color" type="hidden" value="${escapeHtml(item.color || PRESET_COLORS[0])}">
        </div>

        <div class="field">
          <label class="label">Texte de l’onglet</label>
          <textarea class="textarea field-contenu" placeholder="Écris le texte du règlement ici...">${escapeHtml(item.contenu || "")}</textarea>
        </div>

        <div class="switchBox">
          <label class="switchLabel">
            <span>Onglet actif</span>
            <input class="field-actif" type="checkbox" ${item.actif ? "checked" : ""}>
          </label>
        </div>

        <div class="actions">
          <button class="btn2 btnPrimary" type="button" onclick="saveCard(this)">Enregistrer</button>
          <button class="btn2 btnDanger" type="button" onclick="deleteCard(this)">Supprimer</button>
        </div>
      </div>
    </div>
  `).join("");
}

function pickColor(index, color){
  const item = state.items[index];
  if (!item) return;
  item.color = color;
  renderList();
  const card = document.getElementById(`regCard_${index}`);
  if (card) card.classList.add("open");
}

function createNewItem(){
  const nextOrder = (state.items.reduce((m, x) => Math.max(m, Number(x.ordre || 0)), 0) || 0) + 1;

  state.items.push({
    key: "",
    label: "Nouvel onglet",
    color: PRESET_COLORS[0],
    contenu: "",
    ordre: nextOrder,
    actif: 1
  });

  renderList();
  const idx = state.items.length - 1;
  const card = document.getElementById(`regCard_${idx}`);
  if (card) {
    card.classList.add("open");
    card.scrollIntoView({ behavior:"smooth", block:"nearest" });
  }
}

async function loadData(){
  try{
    showLoader(true);
    showStatus("info", "Chargement du règlement...");

    const r = await jsonp({
      view: "reglement_admin_data",
      actorEmail: state.actorEmail
    });

    const items = (r && r.ok && Array.isArray(r.items)) ? r.items : [];
    const validItems = items.filter(isValidReglementItem);

    if (validItems.length) {
      state.items = normalizeItems(validItems);
      renderList();
      showStatus("ok", "Règlement chargé.");
      showLoader(false);
      return;
    }

    state.items = normalizeItems(FALLBACK_ITEMS);
    renderList();
    showStatus("info", "Affichage des textes existants.");
    showLoader(false);

  }catch(err){
    state.items = normalizeItems(FALLBACK_ITEMS);
    renderList();
    showLoader(false);
    showStatus("info", "Affichage des textes existants.");
  }
}

async function saveCard(btn){
  const card = btn.closest(".regItem");
  if (!card) return;

  const originalKey = (card.dataset.originalKey || "").trim();
  const key = (card.querySelector(".field-key")?.value || "").trim();
  const label = (card.querySelector(".field-label")?.value || "").trim();
  const color = (card.querySelector(".field-color")?.value || "").trim();
  const ordre = (card.querySelector(".field-ordre")?.value || "").trim();
  const contenu = (card.querySelector(".field-contenu")?.value || "").trim();
  const actif = card.querySelector(".field-actif")?.checked ? 1 : 0;

  try{
    setButtonSaving(btn, true);
    showStatus("info", "Enregistrement...");

    const r = await jsonp({
      view: "reglement_save",
      actorEmail: state.actorEmail,
      originalKey,
      key,
      label,
      color,
      ordre,
      contenu,
      actif
    });

    if (!r || !r.ok) {
      showStatus("err", (r && r.error) ? r.error : "Erreur d'enregistrement.");
      setButtonSaving(btn, false);
      return;
    }

    showStatus("ok", "Onglet enregistré.");
    await loadData();

  }catch(err){
    showStatus("err", err?.message || String(err));
  } finally {
    setButtonSaving(btn, false);
  }
}

async function deleteCard(btn){
  const card = btn.closest(".regItem");
  if (!card) return;

  const key = (card.dataset.originalKey || "").trim();
  if (!key) {
    card.remove();
    return;
  }

  try{
    showStatus("info", "Suppression...");

    const r = await jsonp({
      view: "reglement_delete",
      actorEmail: state.actorEmail,
      key
    });

    if (!r || !r.ok) {
      showStatus("err", (r && r.error) ? r.error : "Erreur de suppression.");
      return;
    }

    showStatus("ok", "Onglet supprimé.");
    await loadData();

  }catch(err){
    showStatus("err", err?.message || String(err));
  }
}

(async function init(){
  const ok = await checkAdmin();
  if (!ok) return;
  await loadData();
})();
</script>
