<!doctype html>
<html lang="fr">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Admin — CS Consenvoye</title>

<link rel="stylesheet" href="cs-theme.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== TITRES ===== */

.sectionTitle{
margin:14px 0 10px;
font-weight:950;
letter-spacing:.8px;
text-transform:uppercase;
text-align:center;
}

/* ===== DASHBOARD ===== */

.dashboardCard{

border-radius:22px;

background: linear-gradient(
180deg,
rgba(47,123,211,.35),
rgba(47,123,211,.18)
);

border:1px solid rgba(140,190,255,.28);

box-shadow:var(--shadow);

padding:16px;

margin-bottom:16px;

}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

/* ===== CARTES ===== */

.cardBtn{

position:relative;

padding:22px 14px;

border-radius:20px;

cursor:pointer;

text-align:center;

border:1px solid rgba(255,255,255,.12);

backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);

box-shadow:var(--shadow);

transition:.2s;

}

.cardBtn:hover{
transform:translateY(-2px);
}

.cardBtn:active{
transform:translateY(2px);
}

/* ===== ICÔNES ===== */

.cardIcon{

font-size:28px;
margin-bottom:6px;

}

/* ===== TITRE ===== */

.cardTitle{
font-weight:950;
font-size:16px;
}

/* ===== BADGE ===== */

.badge{

position:absolute;
top:8px;
right:10px;

font-size:11px;

padding:4px 8px;

border-radius:999px;

background:rgba(0,0,0,.4);

border:1px solid rgba(255,255,255,.25);

}

/* ===== COULEURS ===== */

.gestion{
background:linear-gradient(
180deg,
rgba(47,123,211,.65),
rgba(47,123,211,.40)
);
}

.param{
background:linear-gradient(
180deg,
rgba(255,177,90,.65),
rgba(255,177,90,.40)
);
}

.test{
background:linear-gradient(
180deg,
rgba(47,168,107,.65),
rgba(47,168,107,.40)
);
}

/* ===== SOUS MENUS ===== */

.subGrid{
margin-top:14px;
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.subBtn{

display:flex;
align-items:center;
gap:12px;

padding:16px;

border-radius:16px;

font-weight:900;

cursor:pointer;

border:1px solid rgba(255,255,255,.12);

background:rgba(0,0,0,.30);

backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);

box-shadow:var(--shadow);

}

.subIcon{
font-size:20px;
width:24px;
text-align:center;
}

.subBtn:active{
transform:translateY(2px);
}

/* ===== SECTIONS ===== */

.section{
display:none;
}

.section.active{
display:block;
}

/* ===== RETOUR ===== */

.backBtn{
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="wrap">

<!-- BANDEAU -->

<div class="topbar">
<div class="title">
<i class="fa-solid fa-fire"></i> Admin
</div>
<button class="btn" onclick="window.location.href='index.html'">
Retour
</button>
</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="dashboardCard">

<div class="sectionTitle">
Tableau de bord
</div>

<div class="grid">

<div class="cardBtn gestion" onclick="openSection('gestion')">

<div class="badge">3</div>

<div class="cardIcon">
<i class="fa-solid fa-screwdriver-wrench"></i>
</div>

<div class="cardTitle">
Gestion
</div>

</div>

<div class="cardBtn param" onclick="openSection('parametres')">

<div class="cardIcon">
<i class="fa-solid fa-gears"></i>
</div>

<div class="cardTitle">
Paramètres
</div>

</div>

<div class="cardBtn test" onclick="openSection('test')">

<div class="badge">LAB</div>

<div class="cardIcon">
<i class="fa-solid fa-flask"></i>
</div>

<div class="cardTitle">
Test
</div>

</div>

</div>

</div>

</div>

<!-- GESTION -->

<div id="gestion" class="section">

<button class="btn backBtn" onclick="goDashboard()">
← Tableau de bord
</button>

<div class="sectionTitle">
Gestion
</div>

<div class="subGrid">

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-sitemap"></i>
</div>
Organigramme
</div>

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-people-group"></i>
</div>
Équipes
</div>

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-truck-medical"></i>
</div>
Désinfection VSAV
</div>

</div>

</div>

<!-- PARAMETRES -->

<div id="parametres" class="section">

<button class="btn backBtn" onclick="goDashboard()">
← Tableau de bord
</button>

<div class="sectionTitle">
Paramètres
</div>

<div class="subGrid">

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-user-lock"></i>
</div>
Accès
</div>

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-sliders"></i>
</div>
Configuration
</div>

</div>

</div>

<!-- TEST -->

<div id="test" class="section">

<button class="btn backBtn" onclick="goDashboard()">
← Tableau de bord
</button>

<div class="sectionTitle">
Laboratoire
</div>

<div class="subGrid">

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-phone"></i>
</div>
Informations
</div>

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-calendar-days"></i>
</div>
Gardes postées
</div>

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-images"></i>
</div>
Galerie
</div>

<div class="subBtn">
<div class="subIcon">
<i class="fa-solid fa-book-open"></i>
</div>
Book
</div>

</div>

</div>

</div>

<script>

function openSection(name){

document.getElementById("dashboard").style.display="none"

document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active")
})

document.getElementById(name).classList.add("active")

}

function goDashboard(){

document.getElementById("dashboard").style.display="block"

document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active")
})

}

</script>

</body>
</html>
