<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Administration — CS Consenvoye</title>

  <link rel="stylesheet" href="cs-theme.css">

  <style>
    .adminWrap{
      max-width:980px;
      margin:0 auto;
      padding:14px;
    }

    .dashboard{
      padding:14px 16px;
      margin-bottom:16px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,140,40,.28), rgba(255,140,40,.14));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      font-weight:900;
      color:rgba(255,255,255,.95);
    }

    .menuBlock{
      border-radius:20px;
      overflow:hidden;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .menuHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .menuHeader:active{
      transform:translateY(1px);
    }

    .menuTitle{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1 1 auto;
      color:rgba(255,255,255,.96);
      font-size:18px;
      letter-spacing:.2px;
    }

    .emoji{
      font-size:22px;
      line-height:1;
      flex:0 0 auto;
    }

    .menuArrow{
      font-size:18px;
      color:rgba(255,255,255,.88);
      transition:transform .18s ease;
      flex:0 0 auto;
    }

    .menuBlock.open .menuArrow{
      transform:rotate(180deg);
    }

    .subMenu{
      display:none;
      padding:10px;
      background:rgba(0,0,0,.10);
    }

    .menuBlock.open .subMenu{
      display:block;
    }

    .subBtn{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      border-radius:14px;
      margin-bottom:8px;
      font-weight:850;
      cursor:pointer;
      color:rgba(255,255,255,.95);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      -webkit-tap-highlight-color:transparent;
    }

    .subBtn:last-child{
      margin-bottom:0;
    }

    .subBtn:active{
      transform:translateY(1px);
    }

    /* Catégories principales translucides */
    .gestionHeader{
      background:linear-gradient(180deg, rgba(47,111,212,.34), rgba(47,111,212,.18));
    }

    .paramHeader{
      background:linear-gradient(180deg, rgba(212,106,0,.34), rgba(212,106,0,.18));
    }

    .testsHeader{
      background:linear-gradient(180deg, rgba(47,158,91,.34), rgba(47,158,91,.18));
    }

    /* Sous-catégories différentes et translucides */
    .gestionSub{
      background:linear-gradient(180deg, rgba(145,90,220,.28), rgba(145,90,220,.14));
    }

    .paramSub{
      background:linear-gradient(180deg, rgba(255,190,60,.26), rgba(255,190,60,.13));
    }

    .testsSub{
      background:linear-gradient(180deg, rgba(220,90,170,.26), rgba(220,90,170,.13));
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">🛠️ Administration</div>
      <button class="btn" onclick="window.location.href='index.html'">Retour</button>
    </div>

    <div class="adminWrap">
      <div class="dashboard">📊 Tableau de bord administration</div>

      <!-- Gestion -->
      <div class="menuBlock">
        <div class="menuHeader gestionHeader" onclick="toggleMenu(this)">
          <div class="menuTitle">
            <span class="emoji">🧰</span>
            <span>Gestion</span>
          </div>
          <span class="menuArrow">▾</span>
        </div>

        <div class="subMenu">
          <div class="subBtn gestionSub">🧭 Organigramme</div>
          <div class="subBtn gestionSub">👥 Équipes</div>
          <div class="subBtn gestionSub">🚑 Désinfection VSAV</div>
        </div>
      </div>

      <!-- Paramètres -->
      <div class="menuBlock">
        <div class="menuHeader paramHeader" onclick="toggleMenu(this)">
          <div class="menuTitle">
            <span class="emoji">⚙️</span>
            <span>Paramètres</span>
          </div>
          <span class="menuArrow">▾</span>
        </div>

        <div class="subMenu">
          <div class="subBtn paramSub">🔑 Accès</div>
          <div class="subBtn paramSub">🛠️ Configuration</div>
        </div>
      </div>

      <!-- Tests -->
      <div class="menuBlock">
        <div class="menuHeader testsHeader" onclick="toggleMenu(this)">
          <div class="menuTitle">
            <span class="emoji">🧪</span>
            <span>Tests</span>
          </div>
          <span class="menuArrow">▾</span>
        </div>

        <div class="subMenu">
          <div class="subBtn testsSub">ℹ️ Informations</div>
          <div class="subBtn testsSub">👨‍🚒 Gardes postées</div>
          <div class="subBtn testsSub">🖼️ Galerie</div>
          <div class="subBtn testsSub">📘 Book</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleMenu(el){
      const block = el.parentElement;
      block.classList.toggle("open");
    }
  </script>
</body>
</html>
