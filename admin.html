<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Admin — CS Consenvoye</title>

<style>
:root{
  --txt:#f4f4f4;
  --muted:rgba(255,255,255,.70);
  --orange:#d46a00;
  --orange2:#b95800;
  --shadow:0 14px 34px rgba(0,0,0,.40);
  --radius:22px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
}
.bg{
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.55)),
    url("background.png") center/cover no-repeat;
  z-index:-1;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-radius:18px;
  background:linear-gradient(180deg,var(--orange),var(--orange2));
  font-weight:900;
  box-shadow:var(--shadow);
}
.topbar span{
  display:flex;
  align-items:center;
  gap:8px;
}
.dot{
  width:10px;
  height:10px;
  background:#00ff5a;
  border-radius:50%;
}
.btn{
  background:rgba(0,0,0,.2);
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

/* DASHBOARD BLOCK */
.dashboard{
  background:#1e7fff;
  border-radius:var(--radius);
  padding:30px;
  font-size:22px;
  font-weight:900;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:.25s;
}
.dashboard.compact{
  padding:12px;
  font-size:16px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.card{
  border-radius:var(--radius);
  padding:28px;
  font-weight:900;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:.2s;
}
.card:hover{transform:translateY(-2px)}

.planning{background:#ff7a00}
.years{background:#9c27b0}
.categories{background:#ff9800}
.documents{background:#009688}
.vsav{background:#f44336}
.orga{background:#795548}
.acces{background:#607d8b}

/* CONTENT AREA */
.content{
  display:none;
  background:rgba(0,0,0,.4);
  padding:20px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  min-height:200px;
}
.content.active{
  display:block;
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="wrap">

  <div class="topbar">
    <span>ADMIN · <div class="dot"></div> OK</span>
    <button class="btn" onclick="location.href='index.html'">Retour</button>
  </div>

  <div id="dashboard" class="dashboard">
    📊 TABLEAU DE BORD
  </div>

  <div id="grid" class="grid">
    <div class="card planning" onclick="openSection('planning')">📅 Planning</div>
    <div class="card years" onclick="openSection('years')">🗓 Années</div>
    <div class="card categories" onclick="openSection('categories')">🎨 Catégories</div>
    <div class="card documents" onclick="openSection('documents')">📂 Documents</div>
    <div class="card vsav" onclick="openSection('vsav')">🚑 VSAV</div>
    <div class="card orga" onclick="openSection('orga')">👥 Orga / Équipes</div>
    <div class="card acces" onclick="openSection('acces')">🔐 Accès</div>
  </div>

  <div id="sectionContent" class="content"></div>

</div>

<script>
const dashboard = document.getElementById("dashboard");
const grid = document.getElementById("grid");
const content = document.getElementById("sectionContent");

function openSection(section){
  dashboard.classList.add("compact");
  grid.style.display="none";
  content.classList.add("active");
  content.innerHTML = "<h2>"+section.toUpperCase()+"</h2><p>Contenu à développer...</p>";
}

dashboard.onclick = ()=>{
  dashboard.classList.remove("compact");
  grid.style.display="grid";
  content.classList.remove("active");
};
</script>

</body>
</html>
