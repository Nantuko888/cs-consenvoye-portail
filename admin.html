<!doctype html>
<html lang="fr">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Administration — CS Consenvoye</title>

<link rel="stylesheet" href="cs-theme.css">

<style>

.adminWrap{
max-width:980px;
margin:auto;
padding:14px;
}

/* tableau de bord */

.dashboard{

padding:14px;
margin-bottom:16px;

border-radius:18px;

background:linear-gradient(
180deg,
rgba(255,120,0,.45),
rgba(0,0,0,.35)
);

border:1px solid rgba(255,255,255,.12);

font-weight:900;

}

/* catégories */

.menuBlock{

border-radius:20px;
overflow:hidden;
margin-bottom:14px;

border:1px solid rgba(255,255,255,.12);

}

/* bandeau principal */

.menuHeader{

display:flex;
align-items:center;
justify-content:space-between;

padding:16px;

font-weight:900;

cursor:pointer;

}

/* sous menu */

.subMenu{

display:none;
padding:10px;

}

.menuBlock.open .subMenu{
display:block;
}

/* boutons */

.subBtn{

padding:12px;

border-radius:12px;

margin-bottom:8px;

font-weight:850;

cursor:pointer;

}

/* couleurs catégories */

.gestionHeader{
background:#2f6fd4;
}

.paramHeader{
background:#d46a00;
}

.testsHeader{
background:#2f9e5b;
}

/* sous catégories */

.gestionSub{
background:rgba(47,111,212,.25);
}

.paramSub{
background:rgba(212,106,0,.25);
}

.testsSub{
background:rgba(47,158,91,.25);
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="wrap">

<div class="topbar">

<div class="title">
⚙️ Administration
</div>

<button class="btn" onclick="window.location.href='index.html'">
Retour
</button>

</div>

<div class="adminWrap">

<div class="dashboard">
📊 Tableau de bord administration
</div>

<!-- Gestion -->

<div class="menuBlock">

<div class="menuHeader gestionHeader" onclick="toggleMenu(this)">
🔧 Gestion ▾
</div>

<div class="subMenu">

<div class="subBtn gestionSub">
🧭 Organigramme
</div>

<div class="subBtn gestionSub">
👥 Équipes
</div>

<div class="subBtn gestionSub">
🚑 Désinfection VSAV
</div>

</div>

</div>

<!-- Paramètres -->

<div class="menuBlock">

<div class="menuHeader paramHeader" onclick="toggleMenu(this)">
⚙️ Paramètres ▾
</div>

<div class="subMenu">

<div class="subBtn paramSub">
🔑 Accès
</div>

<div class="subBtn paramSub">
🛠 Configuration
</div>

</div>

</div>

<!-- Tests -->

<div class="menuBlock">

<div class="menuHeader testsHeader" onclick="toggleMenu(this)">
🧰 Tests ▾
</div>

<div class="subMenu">

<div class="subBtn testsSub">
ℹ️ Informations
</div>

<div class="subBtn testsSub">
👨‍🚒 Gardes postées
</div>

<div class="subBtn testsSub">
🖼 Galerie
</div>

<div class="subBtn testsSub">
📘 Book
</div>

</div>

</div>

</div>

</div>

<script>

function toggleMenu(el){

const block = el.parentElement

block.classList.toggle("open")

}

</script>

</body>
</html>
