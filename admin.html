<!doctype html>
<html lang="fr">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Admin — CS Consenvoye</title>

<link rel="stylesheet" href="cs-theme.css">

<style>

/* ===== PAGE ADMIN ===== */

.sectionTitle{
  margin:14px 0 8px;
  font-weight:950;
  letter-spacing:.6px;
  text-transform:uppercase;
  opacity:.9;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.cardBtn{
  border:1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.25);
  padding:16px;
  border-radius:18px;
  font-weight:900;
  text-align:center;
  cursor:pointer;
  box-shadow:var(--shadow);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  -webkit-tap-highlight-color: transparent;
}

.cardBtn:active{
  transform:translateY(1px);
}

.subGrid{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}

.subBtn{
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.25);
  padding:12px;
  border-radius:14px;
  font-weight:850;
  text-align:center;
  cursor:pointer;
}

.subBtn:active{
  transform:translateY(1px);
}

.section{
  display:none;
}

.section.active{
  display:block;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <!-- Bandeau -->
  <div class="topbar">
    <div class="title">Admin</div>
    <button class="btn" onclick="window.location.href='index.html'">Retour</button>
  </div>

  <!-- Tableau de bord -->
  <div class="sectionTitle">Tableau de bord</div>

  <div class="grid">

    <div class="cardBtn" onclick="openSection('gestion')">
      Gestion
    </div>

    <div class="cardBtn" onclick="openSection('parametres')">
      Paramètres
    </div>

    <div class="cardBtn" onclick="openSection('test')">
      Test
    </div>

  </div>

  <!-- ================= -->
  <!-- GESTION -->
  <!-- ================= -->

  <div id="gestion" class="section">

    <div class="sectionTitle">Gestion</div>

    <div class="subGrid">

      <div class="subBtn">
        Organigramme
      </div>

      <div class="subBtn">
        Équipes
      </div>

      <div class="subBtn">
        Désinfection VSAV
      </div>

    </div>

  </div>

  <!-- ================= -->
  <!-- PARAMETRES -->
  <!-- ================= -->

  <div id="parametres" class="section">

    <div class="sectionTitle">Paramètres</div>

    <div class="subGrid">

      <div class="subBtn">
        Accès
      </div>

      <div class="subBtn">
        Configuration
      </div>

    </div>

  </div>

  <!-- ================= -->
  <!-- TEST -->
  <!-- ================= -->

  <div id="test" class="section">

    <div class="sectionTitle">Test</div>

    <div class="subGrid">

      <div class="subBtn">
        Informations
      </div>

      <div class="subBtn">
        Garde posté
      </div>

      <div class="subBtn">
        Galerie
      </div>

      <div class="subBtn">
        Book
      </div>

    </div>

  </div>

</div>

<script>

function openSection(name){

  document.querySelectorAll(".section").forEach(sec=>{
    sec.classList.remove("active")
  })

  document.getElementById(name).classList.add("active")

}

</script>

</body>
</html>
