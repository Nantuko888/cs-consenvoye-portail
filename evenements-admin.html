<!doctype html>
<html lang="fr">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Admin événements</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:30px;
}

select,input,textarea{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
background:#d46a00;
color:white;
cursor:pointer;
}

button.delete{
background:#a60000;
}

button.edit{
background:#555;
}

.section{
margin-top:30px;
}

.card{
background:#1d1d1d;
border-radius:12px;
padding:12px;
margin-bottom:10px;
}

.actions{
margin-top:8px;
display:flex;
gap:8px;
}

</style>

</head>

<body>

<h1>Admin événements</h1>

<form id="formEvent">

<input type="hidden" name="id" id="eventId">

<select name="categorie" required>

<option value="">Catégorie</option>

<option value="ceremonies">Cérémonies</option>
<option value="reunions">Réunions</option>
<option value="repas">Repas</option>
<option value="sorties">Sorties</option>
<option value="projets">Projets</option>

</select>

<input name="titre" placeholder="Titre" required>

<input type="date" name="date">

<input name="lieu" placeholder="Lieu">

<textarea name="description" placeholder="Description"></textarea>

<button type="submit">Enregistrer</button>

</form>

<div id="events"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec"

const form=document.getElementById("formEvent")

const container=document.getElementById("events")

function jsonp(url){

return new Promise(resolve=>{

const cb="cb"+Math.random().toString(36).slice(2)

window[cb]=(data)=>{

resolve(data)

delete window[cb]

}

const s=document.createElement("script")

s.src=url+"&callback="+cb

document.body.appendChild(s)

})

}

async function loadEvents(){

const res=await jsonp(API+"?view=evenements_list")

if(!res.ok)return

const data=res.items

const cats={}

data.forEach(e=>{

if(!cats[e.categorie])cats[e.categorie]=[]

cats[e.categorie].push(e)

})

container.innerHTML=""

for(const cat in cats){

const sec=document.createElement("div")

sec.className="section"

sec.innerHTML="<h2>"+cat+"</h2>"

cats[cat].forEach(ev=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<strong>${ev.titre}</strong><br>
${ev.date||""}<br>
${ev.lieu||""}<br>
${ev.description||""}

<div class="actions">

<button class="edit">Modifier</button>
<button class="delete">Supprimer</button>

</div>
`

card.querySelector(".edit").onclick=()=>editEvent(ev)

card.querySelector(".delete").onclick=()=>deleteEvent(ev.id)

sec.appendChild(card)

})

container.appendChild(sec)

}

}

function editEvent(ev){

form.eventId.value=ev.id

form.categorie.value=ev.categorie

form.titre.value=ev.titre

form.date.value=ev.date

form.lieu.value=ev.lieu

form.description.value=ev.description

window.scrollTo(0,0)

}

async function deleteEvent(id){

if(!confirm("Supprimer cet événement ?"))return

await jsonp(API+"?view=evenement_delete&id="+id)

loadEvents()

}

form.addEventListener("submit",async e=>{

e.preventDefault()

const data=new FormData(form)

const id=form.eventId.value

let view="evenement_add"

if(id)view="evenement_update"

const params=new URLSearchParams(data)

const res=await jsonp(API+"?view="+view+"&"+params.toString())

form.reset()

loadEvents()

})

loadEvents()

</script>

</body>

</html>
