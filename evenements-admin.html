<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Admin Événements</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

select,input,textarea{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
background:#d46a00;
color:white;
cursor:pointer;
}

button:active{
transform:scale(.96);
}

.msg{
text-align:center;
margin-top:20px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Créer un événement</h1>

<form id="formEvent">

<select name="categorie" required>

<option value="">Catégorie</option>

<option value="ceremonies">Cérémonies</option>
<option value="reunions">Réunions</option>
<option value="repas">Repas</option>
<option value="sorties">Sorties</option>
<option value="projets">Projets</option>

</select>

<input name="titre" placeholder="Titre de l'événement" required>

<input name="date" placeholder="Date">

<input name="lieu" placeholder="Lieu">

<textarea name="description" placeholder="Description"></textarea>

<button type="submit">
Publier l'événement
</button>

</form>

<div class="msg" id="msg"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";

document.getElementById("formEvent").addEventListener("submit",function(e){

e.preventDefault();

const data=new FormData(e.target);

const params=new URLSearchParams();

params.append("view","evenement_add");

for(const [k,v] of data.entries()){
params.append(k,v);
}

const callback="cb_"+Math.random().toString(36).slice(2);

params.append("callback",callback);

const url=API+"?"+params.toString();

const script=document.createElement("script");

window[callback]=(res)=>{

if(res.ok){

document.getElementById("msg").textContent="Événement enregistré ✔";

e.target.reset();

}else{

document.getElementById("msg").textContent="Erreur : "+res.error;

}

script.remove();
delete window[callback];

};

script.src=url;

document.body.appendChild(script);

});

</script>

</body>
</html>
