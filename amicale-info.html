<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Amicale — Tournées calendriers</title>

<style>

:root{
 --txt:#f4f4f4;
 --shadow:0 14px 34px rgba(0,0,0,.40);
 --header1: rgba(212,106,0,.75);
 --header2: rgba(185,88,0,.58);
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:system-ui;
 background:#0b0b0b;
 color:var(--txt);
 overflow:hidden;
}

.bg{
 position:fixed;
 inset:0;
 background:
 linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.6)),
 url("background.png") center/cover no-repeat;
 z-index:-1;
}

.wrap{
 height:100vh;
 max-width:980px;
 margin:auto;
 padding:12px;
 display:grid;
 grid-template-rows:auto 1fr;
 gap:10px;
}

.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:10px 14px;
 border-radius:18px;
 background:linear-gradient(180deg,var(--header1),var(--header2));
 border:1px solid rgba(255,255,255,.12);
 box-shadow:var(--shadow);
}

.title{
 font-weight:900;
 letter-spacing:.5px;
 text-transform:uppercase;
}

.btn{
 border:none;
 background:rgba(0,0,0,.2);
 color:#fff;
 padding:8px 12px;
 border-radius:12px;
 font-weight:700;
 cursor:pointer;
}

.content{
 overflow:auto;
 display:flex;
 flex-direction:column;
 gap:8px;
}

.year{
 border-radius:16px;
 background:linear-gradient(180deg,rgba(200,120,40,.45),rgba(200,120,40,.15));
 border:1px solid rgba(255,255,255,.12);
}

.yearHeader{
 padding:14px;
 font-weight:900;
 font-size:18px;
 cursor:pointer;
 display:flex;
 justify-content:space-between;
}

.yearContent{
 display:none;
 padding:10px;
}

.secteur{
 border-radius:14px;
 margin-bottom:8px;
 background:rgba(0,0,0,.35);
 border:1px solid rgba(255,255,255,.08);
}

.secteurHeader{
 padding:12px;
 font-weight:800;
 cursor:pointer;
 display:flex;
 justify-content:space-between;
}

.secteurContent{
 display:none;
 padding:10px 14px 14px 14px;
 font-size:14px;
}

.label{
 opacity:.7;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

<div class="topbar">
<div class="title">Tournées calendriers</div>
<button class="btn" onclick="history.back()">Retour</button>
</div>

<div id="container" class="content"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";

function toggle(el){
 const c=el.nextElementSibling;
 c.style.display = c.style.display==="block" ? "none" : "block";
}

function load(){

 const url=API+"?view=amicale_tournees_actives";

 fetch(url)
.then(r=>r.text())
.then(txt=>{
const data = JSON.parse(txt.replace(/^callback\(|\)$/g,''));
 const items=data.items||[];

 const years={};

 items.forEach(i=>{
  if(!years[i.annee]) years[i.annee]=[];
  years[i.annee].push(i);
 });

 const container=document.getElementById("container");
 container.innerHTML="";

 Object.keys(years).sort().reverse().forEach(year=>{

  const yearDiv=document.createElement("div");
  yearDiv.className="year";

  const header=document.createElement("div");
  header.className="yearHeader";
  header.innerHTML=year+" <span>▾</span>";
  header.onclick=()=>toggle(header);

  const content=document.createElement("div");
  content.className="yearContent";

  years[year].forEach(s=>{

   const sec=document.createElement("div");
   sec.className="secteur";

   const secHead=document.createElement("div");
   secHead.className="secteurHeader";
   secHead.innerHTML=s.secteur+" <span>▾</span>";
   secHead.onclick=()=>toggle(secHead);

   const secCont=document.createElement("div");
   secCont.className="secteurContent";

   secCont.innerHTML=
   "<div><span class='label'>Agents :</span> "+s.agents+"</div>"+
   "<div><span class='label'>Calendriers attribués :</span> "+s.attribues+"</div>";

   sec.appendChild(secHead);
   sec.appendChild(secCont);

   content.appendChild(sec);

  });

  yearDiv.appendChild(header);
  yearDiv.appendChild(content);

  container.appendChild(yearDiv);

 });

 });

}

load();

</script>

</body>
</html>
