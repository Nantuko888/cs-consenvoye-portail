<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Documents — CS Consenvoye</title>

<style>
:root{
  --txt:#f4f4f4;
  --shadow:0 14px 34px rgba(0,0,0,.40);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
  overflow:hidden;
}

.bg{
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.62)),
    url("background.png") center top/cover no-repeat;
  z-index:-1;
}

.wrap{
  height:100vh;
  max-width:980px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border-radius:20px;
  background:linear-gradient(180deg, rgba(212,106,0,.85), rgba(185,88,0,.65));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.title{
  margin:0;
  font-size:18px;
  font-weight:950;
  letter-spacing:.6px;
}
.btn{
  border:none;
  background:rgba(0,0,0,.18);
  color:#fff;
  padding:10px 14px;
  border-radius:14px;
  font-weight:900;
}

/* 👇 ICI on force vertical */
.grid{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* Cards */
.card{
  position:relative;
  border-radius:22px;
  padding:20px;
  min-height:140px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
  text-decoration:none;
  color:#fff;

  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:var(--shadow);
  backdrop-filter:blur(16px);
}

/* Couleurs */
.card.op{
  background:linear-gradient(180deg, rgba(80,140,255,.25), rgba(0,0,0,.35));
  border-color:rgba(120,180,255,.4);
}
.card.note{
  background:linear-gradient(180deg, rgba(255,140,40,.25), rgba(0,0,0,.35));
  border-color:rgba(255,180,100,.4);
}

.cardTitle{
  margin:0;
  font-size:22px;
  font-weight:950;
}

.cardSub{
  margin:0;
  font-size:14px;
  font-weight:700;
  opacity:.8;
}

.bar{
  height:6px;
  border-radius:999px;
  margin-top:auto;
}

.op .bar{
  background:linear-gradient(90deg, #4aa8ff, #2f79ff);
}
.note .bar{
  background:linear-gradient(90deg, #ffb347, #ff7b00);
}

.card:active{
  transform:translateY(1px);
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="wrap">

  <div class="topbar">
    <h1 class="title">DOCUMENTS</h1>
    <button class="btn" onclick="location.href='index.html'">Retour</button>
  </div>

  <div class="grid">

    <a class="card op" href="documents-operationnels.html">
      <h2 class="cardTitle">DOCUMENTS OPÉRATIONNELS</h2>
      <p class="cardSub">Appuie pour afficher</p>
      <div class="bar"></div>
    </a>

    <a class="card note" href="notes-service.html">
      <h2 class="cardTitle">NOTES DE SERVICE</h2>
      <p class="cardSub">Appuie pour afficher</p>
      <div class="bar"></div>
    </a>

  </div>

</div>
</body>
</html>
