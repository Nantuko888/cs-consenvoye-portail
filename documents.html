<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Documents — CS Consenvoye</title>
  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --shadow:0 14px 34px rgba(0,0,0,.40);
      --stroke:rgba(255,255,255,.10);
      --headerColor1: rgba(212,106,0,.75);
      --headerColor2: rgba(185,88,0,.58);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }
    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.56)),
        url("background.png") center top/cover no-repeat;
      z-index:-1;
    }

    .page{
      min-height:100dvh;
      padding:
        calc(env(safe-area-inset-top) + 12px)
        14px
        calc(env(safe-area-inset-bottom) + 14px);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-radius:20px;
      background:linear-gradient(180deg,var(--headerColor1),var(--headerColor2));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .title{
      margin:0;
      font-size:18px;
      font-weight:950;
      letter-spacing:.5px;
      text-transform:uppercase;
    }
    .backBtn{
      border:none;
      background:rgba(0,0,0,.18);
      color:#fff;
      padding:10px 14px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .hero{
      padding:14px 16px;
      border-radius:22px;
      background:rgba(0,0,0,.26);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .heroTitle{
      margin:0 0 6px 0;
      font-size:22px;
      font-weight:950;
      line-height:1.05;
    }
    .heroSub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      line-height:1.3;
    }

    .grid{
      flex:1;
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      align-content:start;
    }

    .card{
      display:flex;
      align-items:center;
      gap:14px;
      min-height:112px;
      padding:18px 18px;
      border-radius:24px;
      text-decoration:none;
      color:#fff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      -webkit-tap-highlight-color:transparent;
      transition:transform .12s ease, background .12s ease;
    }
    .card:active{
      transform:translateY(1px) scale(.995);
      background:rgba(255,255,255,.12);
    }

    .iconWrap{
      width:58px;
      height:58px;
      border-radius:18px;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
      font-size:28px;
    }

    .cardBody{
      min-width:0;
      flex:1;
    }
    .cardTitle{
      margin:0 0 6px 0;
      font-size:20px;
      font-weight:950;
      line-height:1.05;
    }
    .cardText{
      margin:0;
      color:rgba(255,255,255,.80);
      font-size:14px;
      font-weight:700;
      line-height:1.28;
    }

    .arrow{
      flex:0 0 auto;
      font-size:24px;
      font-weight:900;
      opacity:.92;
    }

    @media (min-width:700px){
      .grid{
        grid-template-columns:1fr 1fr;
      }
      .card{
        min-height:136px;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <main class="page">
    <div class="topbar">
      <h1 class="title">Documents</h1>
      <button class="backBtn" onclick="location.href='index.html'">Retour</button>
    </div>

    <section class="hero">
      <h2 class="heroTitle">Choisis une rubrique</h2>
      <p class="heroSub">
        Accès rapide aux documents opérationnels et aux notes de service.
      </p>
    </section>

    <section class="grid">
      <a class="card" href="documents-operationnels.html">
        <div class="iconWrap">📁</div>
        <div class="cardBody">
          <h3 class="cardTitle">Documents opérationnels</h3>
          <p class="cardText">
            Accéder à la page documents actuelle.
          </p>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="card" href="notes-service.html">
        <div class="iconWrap">📝</div>
        <div class="cardBody">
          <h3 class="cardTitle">Notes de service</h3>
          <p class="cardText">
            Ouvrir l’espace dédié aux notes de service.
          </p>
        </div>
        <div class="arrow">›</div>
      </a>
    </section>
  </main>
</body>
</html>
