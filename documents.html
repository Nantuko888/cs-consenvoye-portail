<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Documents — CS Consenvoye</title>
  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --shadow: 0 14px 34px rgba(0,0,0,.40);
      --radius: 22px;
      --stroke: rgba(255,255,255,.10);
      --orange:#d46a00;
      --orange2:#b95800;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }
    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.52)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
      transform: translateZ(0);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.64) 62%);
      z-index:-1;
    }

    .wrap{
      height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:10px;
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.58));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      min-height:46px;
    }
    .topbar .title{
      font-weight:950; letter-spacing:.8px; text-transform:uppercase;
      font-size:18px; margin:0; white-space:nowrap;
    }
    .btn{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:9px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active{transform:translateY(1px)}

    .hero{
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.30));
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      padding:16px 14px;
    }
    .heroTitle{
      margin:0 0 6px 0;
      font-size:22px;
      font-weight:950;
      line-height:1.05;
    }
    .heroSub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
      line-height:1.3;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      min-height:0;
      align-content:start;
    }

    .cell{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 16px;
      min-height:118px;
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.30));
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      text-decoration:none;
      color:var(--txt);
      -webkit-tap-highlight-color:transparent;
    }
    .cell:active{transform:translateY(1px)}

    .cellLeft{
      min-width:0;
      display:flex;
      align-items:center;
      gap:14px;
    }
    .cellIcon{
      width:54px;
      height:54px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
      font-size:26px;
      flex:0 0 auto;
    }
    .cellText{
      min-width:0;
    }
    .cellTitle{
      margin:0 0 6px 0;
      font-size:20px;
      font-weight:950;
      line-height:1.05;
    }
    .cellSub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
      line-height:1.28;
    }
    .cellArrow{
      font-size:28px;
      font-weight:950;
      opacity:.9;
      flex:0 0 auto;
    }

    @media (min-width:700px){
      .grid{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <h1 class="title">DOCUMENTS</h1>
      <button class="btn" id="btnBack">Retour</button>
    </div>

    <section class="hero">
      <h2 class="heroTitle">Choisir une rubrique</h2>
      <p class="heroSub">Accès rapide aux documents opérationnels et aux notes de service.</p>
    </section>

    <section class="grid">
      <a class="cell" href="documents-operationnels.html">
        <div class="cellLeft">
          <div class="cellIcon">📁</div>
          <div class="cellText">
            <h3 class="cellTitle">Documents opérationnels</h3>
            <p class="cellSub">Accéder aux documents opérationnels.</p>
          </div>
        </div>
        <div class="cellArrow">›</div>
      </a>

      <a class="cell" href="notes-service.html">
        <div class="cellLeft">
          <div class="cellIcon">📝</div>
          <div class="cellText">
            <h3 class="cellTitle">Notes de service</h3>
            <p class="cellSub">Accéder à la page dédiée aux notes de service.</p>
          </div>
        </div>
        <div class="cellArrow">›</div>
      </a>
    </section>
  </div>

<script>
  document.getElementById("btnBack").addEventListener("click", ()=>location.href="index.html");
</script>
</body>
</html>
