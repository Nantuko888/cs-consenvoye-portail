<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Statistiques — CS Consenvoye</title>

<style>
:root{
  --txt:#f4f4f4;
  --muted:rgba(255,255,255,.72);
  --shadow:0 14px 34px rgba(0,0,0,.40);
  --stroke:rgba(255,255,255,.10);
  --orange1:rgba(212,106,0,.75);
  --orange2:rgba(185,88,0,.58);
  --radius:18px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
  overflow:hidden;
}

.bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.65)),
    url("background.png") center/cover no-repeat;
  z-index:-1;
}

.wrap{
  height:100vh;
  max-width:980px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 10px);
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  gap:10px;
}

/* HEADER */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  min-height:46px;
  border-radius:18px;
  background:linear-gradient(180deg, var(--orange1), var(--orange2));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.title{
  font-weight:950;
  letter-spacing:.8px;
  text-transform:uppercase;
  font-size:18px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.topRight{
  display:flex;
  align-items:center;
  gap:8px;
}
.btn,
.lockBtn,
.smallBtn{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.18);
  color:#fff;
  padding:9px 12px;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn:active,
.lockBtn:active,
.smallBtn:active{
  transform:translateY(1px);
}
.lockBtn{
  min-width:44px;
  padding:9px 11px;
  display:none;
}

/* FILTERS */
.filters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.filterBox{
  border-radius:18px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  min-height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.selectMonth{
  width:100%;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-weight:900;
  font-size:16px;
  text-align:center;
  text-align-last:center;
  padding:0 14px;
  appearance:none;
  -webkit-appearance:none;
}
.yearBox{
  font-weight:950;
  font-size:18px;
  letter-spacing:.5px;
}

/* PIE */
.pieWrap{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:8px 0 2px;
}
.pie{
  width:180px;
  height:180px;
  border-radius:50%;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.08);
}

/* AGENT VIEW */
.agentView{
  min-height:0;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-right:2px;
}
.block{
  border-radius:18px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:12px;
}
.blockTitle{
  font-weight:950;
  font-size:18px;
  margin-bottom:8px;
}
.table{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.row{
  display:grid;
  grid-template-columns:1fr 84px 84px;
  gap:8px;
  align-items:center;
}
.row.header{
  padding-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,.08);
  margin-bottom:2px;
}
.cellType{
  font-weight:850;
  font-size:15px;
  color:#fff;
}
.cellHead{
  font-weight:900;
  font-size:12px;
  text-align:right;
  color:rgba(255,255,255,.72);
  text-transform:uppercase;
}
.cellVal{
  font-weight:950;
  font-size:16px;
  text-align:right;
  color:#fff;
}
.emptyCard{
  border-radius:18px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  padding:16px;
  text-align:center;
  font-weight:900;
}

/* STATUS */
.statusPill{
  position:fixed;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 12px);
  max-width:980px;
  margin:0 auto;
  z-index:90;
  display:none;
}
.statusPillInner{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:16px;
  background:rgba(0,0,0,.68);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  font-weight:900;
}
.statusSub{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

/* OVERLAYS */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:none;
  z-index:150;
}
.overlay.show{display:block}

.sheet{
  position:absolute;
  left:12px;
  right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 12px);
  max-width:980px;
  margin:0 auto;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(0,0,0,.84), rgba(0,0,0,.72));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.menuSheet{ height:min(42vh, 420px); }
.panelSheet{ height:min(78vh, 800px); }

.sheetHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.18);
}
.sheetTitle{
  font-weight:950;
  font-size:16px;
}
.sheetBody{
  padding:12px;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ADMIN MENU */
.menuGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.menuCard{
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  cursor:pointer;
}
.menuCard:active{transform:translateY(1px)}
.menuLeft{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.menuEmoji{
  font-size:24px;
  flex:0 0 auto;
}
.menuText{
  min-width:0;
}
.menuMain{
  font-weight:950;
  font-size:17px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.menuSub{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}
.menuArrow{
  font-size:18px;
  opacity:.8;
}

/* PANELS */
.section{
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  padding:12px;
}
.sectionTitle{
  font-weight:950;
  font-size:15px;
  margin-bottom:10px;
}
.hint{
  font-size:12px;
  color:var(--muted);
  margin-top:-4px;
  margin-bottom:8px;
}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.field, .select{
  width:100%;
  border:none;
  outline:none;
  background:rgba(0,0,0,.24);
  color:#fff;
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;
  padding:11px 12px;
  font:inherit;
  font-weight:800;
}
.actionRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.smallBtn.danger{
  border-color:rgba(255,90,90,.28);
}
.listAdmin{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
}
.itemLeft{
  min-width:0;
  display:flex;
  align-items:center;
  gap:10px;
}
.dot{
  width:12px;
  height:12px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,.20);
  flex:0 0 auto;
}
.itemMain{
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.itemSub{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.vehicleChecks{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.checkCard{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  font-weight:850;
}
.catalogLayout{
  display:grid;
  grid-template-columns:1.1fr 1fr;
  gap:10px;
}
.vehicleListSelectable{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.vehicleSelectable{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
}
.vehicleSelectable.active{
  background:rgba(255,255,255,.10);
  border-color:rgba(255,255,255,.22);
}
.vehicleSelectable:active{transform:translateY(1px)}
.emptyMini{
  font-size:13px;
  color:var(--muted);
  padding:8px 2px;
}

@media (max-width:640px){
  .filters,
  .grid2,
  .vehicleChecks,
  .catalogLayout{
    grid-template-columns:1fr;
  }
  .row{
    grid-template-columns:1fr 68px 68px;
  }
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="wrap">

  <div class="topbar">
    <div class="title">Statistiques</div>
    <div class="topRight">
      <button id="lockBtn" class="lockBtn" type="button" aria-label="Administration">🔒</button>
      <button class="btn" onclick="location.href='informations.html'">Retour</button>
    </div>
  </div>

  <div class="filters">
    <div class="filterBox">
      <select id="monthSelect" class="selectMonth"></select>
    </div>
    <div class="filterBox yearBox" id="yearBox">2026</div>
  </div>

  <div class="pieWrap">
    <div id="pie" class="pie"></div>
  </div>

  <div id="agentView" class="agentView"></div>

</div>

<div id="statusPill" class="statusPill">
  <div class="statusPillInner">
    <div>⚠️</div>
    <div>
      <div id="statusMain">Chargement…</div>
      <div id="statusSub" class="statusSub"></div>
    </div>
  </div>
</div>

<!-- MENU ADMIN -->
<div id="menuOverlay" class="overlay">
  <div class="sheet menuSheet">
    <div class="sheetHead">
      <div class="sheetTitle">Administration statistiques</div>
      <button id="menuClose" class="smallBtn" type="button">Fermer</button>
    </div>
    <div class="sheetBody">
      <div class="menuGrid">
        <div class="menuCard" data-open-panel="catalogue">
          <div class="menuLeft">
            <div class="menuEmoji">📁</div>
            <div class="menuText">
              <div class="menuMain">Catalogue</div>
              <div class="menuSub">Véhicules + descriptifs liés à chaque véhicule</div>
            </div>
          </div>
          <div class="menuArrow">›</div>
        </div>

        <div class="menuCard" data-open-panel="remplissage">
          <div class="menuLeft">
            <div class="menuEmoji">📝</div>
            <div class="menuText">
              <div class="menuMain">Remplissage</div>
              <div class="menuSub">Choix véhicule, descriptif, date, lieu, hors secteur</div>
            </div>
          </div>
          <div class="menuArrow">›</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PANNEAU DETAIL -->
<div id="panelOverlay" class="overlay">
  <div class="sheet panelSheet">
    <div class="sheetHead">
      <div id="panelTitle" class="sheetTitle">Admin</div>
      <button id="panelClose" class="smallBtn" type="button">Fermer</button>
    </div>
    <div id="panelBody" class="sheetBody"></div>
  </div>
</div>

<script>
/* ========= CONFIG ========= */
const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const LS_EMAIL = "cs_portail_email_v1";

/* ========= DONNEES TEMPORAIRES UI ========= */
let vehicleCatalog = {
  "VSAV": {
    color: "#ff3b3b",
    descriptors: ["Malaise", "AVP", "Chute"]
  },
  "FPT": {
    color: "#3b8bff",
    descriptors: ["Feu habitation", "Feu VL"]
  }
};

let interventions = [
  { id:1, date:"2026-04-01", vehicle:"VSAV", descriptor:"Malaise", horsSecteur:false, lieu:"Consenvoye" },
  { id:2, date:"2026-04-03", vehicle:"VSAV", descriptor:"Chute", horsSecteur:true, lieu:"Extérieur" },
  { id:3, date:"2026-04-05", vehicle:"FPT", descriptor:"Feu habitation", horsSecteur:false, lieu:"Centre" },
  { id:4, date:"2026-04-07", vehicle:"VSAV", descriptor:"AVP", horsSecteur:true, lieu:"RD" },
  { id:5, date:"2026-04-09", vehicle:"VSAV", descriptor:"Malaise", horsSecteur:false, lieu:"Consenvoye" }
];

let isAdmin = false;
let selectedCatalogVehicle = Object.keys(vehicleCatalog)[0] || "";

/* ========= DOM ========= */
const monthSelect = document.getElementById("monthSelect");
const yearBox = document.getElementById("yearBox");
const pie = document.getElementById("pie");
const agentView = document.getElementById("agentView");
const lockBtn = document.getElementById("lockBtn");

const menuOverlay = document.getElementById("menuOverlay");
const menuClose = document.getElementById("menuClose");
const panelOverlay = document.getElementById("panelOverlay");
const panelTitle = document.getElementById("panelTitle");
const panelBody = document.getElementById("panelBody");
const panelClose = document.getElementById("panelClose");

const statusPill = document.getElementById("statusPill");
const statusMain = document.getElementById("statusMain");
const statusSub = document.getElementById("statusSub");

/* ========= UTILS ========= */
function showStatus(main, sub=""){
  statusMain.textContent = main || "";
  statusSub.textContent = sub || "";
  statusPill.style.display = "block";
}
function hideStatus(){
  statusPill.style.display = "none";
}
function getEmailLocal(){
  return (localStorage.getItem(LS_EMAIL) || "").trim().toLowerCase();
}
function jsonp(url, cbName, timeoutMs=15000){
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    const cleanup = () => {
      script.remove();
      try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
    };
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout JSONP"));
    }, timeoutMs);
    window[cbName] = (data) => {
      clearTimeout(timer);
      cleanup();
      resolve(data);
    };
    const sep = url.includes("?") ? "&" : "?";
    script.src = url + sep + "t=" + Date.now();
    script.onerror = () => {
      clearTimeout(timer);
      cleanup();
      reject(new Error("Erreur JSONP"));
    };
    document.head.appendChild(script);
  });
}
async function loadMyRole(){
  const email = getEmailLocal();
  if(!email){
    isAdmin = false;
    lockBtn.style.display = "none";
    return;
  }
  const cb = "cb_auth_" + Math.random().toString(36).slice(2);
  const url = `${API}?view=auth_check&email=${encodeURIComponent(email)}&nocache=1&callback=${cb}`;

  try{
    const res = await jsonp(url, cb, 20000);
    isAdmin = !!(res && res.ok === true && String(res.role || "").toLowerCase() === "admin");
    lockBtn.style.display = isAdmin ? "inline-block" : "none";
  }catch(e){
    isAdmin = false;
    lockBtn.style.display = "none";
  }
}
function escapeHtml(s){
  return String(s == null ? "" : s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* ========= MOIS / ANNEE ========= */
const months = [
  "Janvier","Février","Mars","Avril","Mai","Juin",
  "Juillet","Août","Septembre","Octobre","Novembre","Décembre"
];
months.forEach((m, i) => {
  const opt = document.createElement("option");
  opt.value = String(i + 1).padStart(2, "0");
  opt.textContent = m;
  monthSelect.appendChild(opt);
});
monthSelect.value = "04";
yearBox.textContent = "2026";

function selectedYear(){ return String(yearBox.textContent || "").trim(); }
function selectedMonth(){ return String(monthSelect.value || "").trim(); }

function filteredInterventions(){
  return interventions.filter(i => {
    const parts = String(i.date || "").split("-");
    if(parts.length !== 3) return false;
    return parts[0] === selectedYear() && parts[1] === selectedMonth();
  });
}

/* ========= VUE AGENT ========= */
function buildStats(filtered){
  const stats = {};
  const pieTotals = {};

  filtered.forEach(inter => {
    const v = inter.vehicle;
    if(!stats[v]){
      stats[v] = {
        color: (vehicleCatalog[v] && vehicleCatalog[v].color) || "#999999",
        descriptors: {}
      };
    }
    if(!stats[v].descriptors[inter.descriptor]){
      stats[v].descriptors[inter.descriptor] = { secteur:0, hors:0 };
    }

    if(inter.horsSecteur){
      stats[v].descriptors[inter.descriptor].hors += 1;
    }else{
      stats[v].descriptors[inter.descriptor].secteur += 1;
    }

    pieTotals[v] = (pieTotals[v] || 0) + 1;
  });

  return { stats, pieTotals };
}

function renderPie(pieTotals){
  const keys = Object.keys(pieTotals);
  if(!keys.length){
    pie.style.background = "rgba(255,255,255,.08)";
    return;
  }

  const total = keys.reduce((s,k) => s + pieTotals[k], 0);
  let current = 0;
  const parts = [];

  keys.forEach(k => {
    const pct = (pieTotals[k] / total) * 100;
    const color = (vehicleCatalog[k] && vehicleCatalog[k].color) || "#999999";
    parts.push(`${color} ${current}% ${current + pct}%`);
    current += pct;
  });

  pie.style.background = `conic-gradient(${parts.join(",")})`;
}

function renderAgent(stats){
  agentView.innerHTML = "";
  const vehKeys = Object.keys(stats);

  if(!vehKeys.length){
    agentView.innerHTML = `<div class="emptyCard">Aucune donnée pour cette période</div>`;
    return;
  }

  vehKeys.forEach(v => {
    const block = document.createElement("div");
    block.className = "block";

    let html = `<div class="blockTitle" style="color:${escapeHtml(stats[v].color)}">${escapeHtml(v)}</div>`;
    html += `
      <div class="table">
        <div class="row header">
          <div class="cellHead" style="text-align:left">Descriptif</div>
          <div class="cellHead">Secteur</div>
          <div class="cellHead">Hors secteur</div>
        </div>
    `;

    Object.keys(stats[v].descriptors).forEach(desc => {
      const s = stats[v].descriptors[desc].secteur;
      const h = stats[v].descriptors[desc].hors;
      html += `
        <div class="row">
          <div class="cellType">${escapeHtml(desc)}</div>
          <div class="cellVal">${s}</div>
          <div class="cellVal">${h}</div>
        </div>
      `;
    });

    html += `</div>`;
    block.innerHTML = html;
    agentView.appendChild(block);
  });
}

function renderAll(){
  const filtered = filteredInterventions();
  const { stats, pieTotals } = buildStats(filtered);
  renderPie(pieTotals);
  renderAgent(stats);
}

/* ========= OVERLAYS ========= */
function openMenu(){
  if(!isAdmin) return;
  menuOverlay.classList.add("show");
}
function closeMenu(){
  menuOverlay.classList.remove("show");
}
function openPanel(name){
  closeMenu();
  panelOverlay.classList.add("show");

  if(name === "catalogue"){
    panelTitle.textContent = "Catalogue";
    renderCataloguePanel();
  }else if(name === "remplissage"){
    panelTitle.textContent = "Remplissage";
    renderRemplissagePanel();
  }
}
function closePanel(){
  panelOverlay.classList.remove("show");
  panelBody.innerHTML = "";
}

/* ========= PANEL CATALOGUE ========= */
function renderCataloguePanel(){
  if(!selectedCatalogVehicle || !vehicleCatalog[selectedCatalogVehicle]){
    selectedCatalogVehicle = Object.keys(vehicleCatalog)[0] || "";
  }

  panelBody.innerHTML = `
    <div class="section">
      <div class="sectionTitle">Ajouter un véhicule</div>
      <div class="hint">Nom du véhicule + couleur.</div>
      <div class="grid2">
        <input id="pc_vehicle_name" class="field" type="text" placeholder="Nom véhicule (ex : VSAV)">
        <input id="pc_vehicle_color" class="field" type="text" placeholder="Couleur HEX (ex : #ff3b3b)">
      </div>
      <div class="actionRow" style="margin-top:10px;">
        <button id="pc_add_vehicle" class="smallBtn" type="button">Ajouter véhicule</button>
      </div>
    </div>

    <div class="catalogLayout">
      <div class="section">
        <div class="sectionTitle">Véhicules</div>
        <div id="pc_vehicle_list" class="vehicleListSelectable"></div>
      </div>

      <div class="section">
        <div class="sectionTitle">Descriptifs liés</div>
        <div class="hint">Tu sélectionnes un véhicule, puis tu ajoutes ses descriptifs.</div>
        <div id="pc_desc_zone"></div>
      </div>
    </div>
  `;

  document.getElementById("pc_add_vehicle").onclick = () => {
    const name = String(document.getElementById("pc_vehicle_name").value || "").trim().toUpperCase();
    const color = String(document.getElementById("pc_vehicle_color").value || "").trim();
    if(!name || !color) return;
    if(!vehicleCatalog[name]){
      vehicleCatalog[name] = { color, descriptors: [] };
    }else{
      vehicleCatalog[name].color = color;
    }
    selectedCatalogVehicle = name;
    renderCataloguePanel();
    renderAll();
  };

  const list = document.getElementById("pc_vehicle_list");
  const keys = Object.keys(vehicleCatalog);

  if(!keys.length){
    list.innerHTML = `<div class="emptyMini">Aucun véhicule.</div>`;
  }else{
    keys.forEach(v => {
      const el = document.createElement("div");
      el.className = "vehicleSelectable" + (v === selectedCatalogVehicle ? " active" : "");
      el.innerHTML = `
        <span class="dot" style="background:${escapeHtml(vehicleCatalog[v].color)}"></span>
        <div style="min-width:0;">
          <div class="itemMain">${escapeHtml(v)}</div>
          <div class="itemSub">${escapeHtml(vehicleCatalog[v].color)}</div>
        </div>
      `;
      el.onclick = () => {
        selectedCatalogVehicle = v;
        renderCataloguePanel();
      };
      list.appendChild(el);
    });
  }

  renderDescriptorsZone();
}

function renderDescriptorsZone(){
  const zone = document.getElementById("pc_desc_zone");
  if(!zone) return;

  if(!selectedCatalogVehicle || !vehicleCatalog[selectedCatalogVehicle]){
    zone.innerHTML = `<div class="emptyMini">Sélectionne un véhicule.</div>`;
    return;
  }

  const vehicle = vehicleCatalog[selectedCatalogVehicle];
  zone.innerHTML = `
    <div style="margin-bottom:10px;">
      <div class="itemMain" style="margin-bottom:4px;">${escapeHtml(selectedCatalogVehicle)}</div>
      <div class="itemSub">${escapeHtml(vehicle.color)}</div>
    </div>

    <div class="grid2">
      <input id="pc_desc_name" class="field" type="text" placeholder="Descriptif (ex : Malaise)">
      <div></div>
    </div>

    <div class="actionRow" style="margin-top:10px; margin-bottom:10px;">
      <button id="pc_add_desc" class="smallBtn" type="button">Ajouter descriptif</button>
      <button id="pc_delete_vehicle" class="smallBtn danger" type="button">Supprimer véhicule</button>
    </div>

    <div id="pc_desc_list" class="listAdmin"></div>
  `;

  document.getElementById("pc_add_desc").onclick = () => {
    const name = String(document.getElementById("pc_desc_name").value || "").trim();
    if(!name) return;
    if(!vehicle.descriptors.includes(name)){
      vehicle.descriptors.push(name);
    }
    renderDescriptorsZone();
    renderAll();
  };

  document.getElementById("pc_delete_vehicle").onclick = () => {
    delete vehicleCatalog[selectedCatalogVehicle];
    interventions = interventions.filter(it => it.vehicle !== selectedCatalogVehicle);
    selectedCatalogVehicle = Object.keys(vehicleCatalog)[0] || "";
    renderCataloguePanel();
    renderAll();
  };

  const list = document.getElementById("pc_desc_list");
  if(!vehicle.descriptors.length){
    list.innerHTML = `<div class="emptyMini">Aucun descriptif pour ce véhicule.</div>`;
    return;
  }

  vehicle.descriptors.forEach(desc => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="itemLeft">
        <div>
          <div class="itemMain">${escapeHtml(desc)}</div>
          <div class="itemSub">${escapeHtml(selectedCatalogVehicle)}</div>
        </div>
      </div>
      <button class="smallBtn danger" type="button">Supprimer</button>
    `;
    div.querySelector("button").onclick = () => {
      vehicle.descriptors = vehicle.descriptors.filter(x => x !== desc);
      interventions = interventions.filter(it => !(it.vehicle === selectedCatalogVehicle && it.descriptor === desc));
      renderDescriptorsZone();
      renderAll();
    };
    list.appendChild(div);
  });
}

/* ========= PANEL REMPLISSAGE ========= */
function renderRemplissagePanel(){
  panelBody.innerHTML = `
    <div class="section">
      <div class="sectionTitle">Nouvelle intervention</div>
      <div class="hint">Choisis un véhicule, puis un descriptif lié à ce véhicule.</div>

      <div class="grid2">
        <select id="pr_vehicle" class="select"></select>
        <select id="pr_descriptor" class="select"></select>
      </div>

      <div class="grid2" style="margin-top:10px;">
        <input id="pr_date" class="field" type="date">
        <input id="pr_lieu" class="field" type="text" placeholder="Lieu">
      </div>

      <div class="grid2" style="margin-top:10px;">
        <label class="checkCard">
          <input id="pr_hs" type="checkbox">
          <span>Hors secteur</span>
        </label>
        <div></div>
      </div>

      <div class="actionRow" style="margin-top:10px;">
        <button id="pr_add" class="smallBtn" type="button">Ajouter intervention</button>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">Interventions enregistrées</div>
      <div id="pr_list" class="listAdmin"></div>
    </div>
  `;

  const vehicleSel = document.getElementById("pr_vehicle");
  const descSel = document.getElementById("pr_descriptor");

  const vehKeys = Object.keys(vehicleCatalog);
  vehKeys.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    vehicleSel.appendChild(opt);
  });

  function refreshDescriptors(){
    const v = vehicleSel.value;
    descSel.innerHTML = "";
    const descs = (vehicleCatalog[v] && vehicleCatalog[v].descriptors) ? vehicleCatalog[v].descriptors : [];
    descs.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      descSel.appendChild(opt);
    });
  }

  refreshDescriptors();
  vehicleSel.onchange = refreshDescriptors;

  document.getElementById("pr_add").onclick = () => {
    const vehicle = String(vehicleSel.value || "").trim();
    const descriptor = String(descSel.value || "").trim();
    const date = String(document.getElementById("pr_date").value || "").trim();
    const lieu = String(document.getElementById("pr_lieu").value || "").trim();
    const horsSecteur = !!document.getElementById("pr_hs").checked;

    if(!vehicle || !descriptor || !date) return;

    interventions.push({
      id: Date.now(),
      date,
      vehicle,
      descriptor,
      horsSecteur,
      lieu
    });

    renderRemplissagePanel();
    renderAll();
  };

  const list = document.getElementById("pr_list");
  if(!interventions.length){
    list.innerHTML = `<div class="emptyMini">Aucune intervention enregistrée.</div>`;
    return;
  }

  [...interventions]
    .sort((a,b) => String(b.date).localeCompare(String(a.date)))
    .forEach(it => {
      const color = vehicleCatalog[it.vehicle] ? vehicleCatalog[it.vehicle].color : "#999999";
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div class="itemLeft">
          <span class="dot" style="background:${escapeHtml(color)}"></span>
          <div>
            <div class="itemMain">${escapeHtml(it.date)} — ${escapeHtml(it.vehicle)} — ${escapeHtml(it.descriptor)}</div>
            <div class="itemSub">${escapeHtml(it.lieu || "—")} • ${it.horsSecteur ? "Hors secteur" : "Secteur 1er appel"}</div>
          </div>
        </div>
        <button class="smallBtn danger" type="button">Supprimer</button>
      `;
      div.querySelector("button").onclick = () => {
        interventions = interventions.filter(x => x.id !== it.id);
        renderRemplissagePanel();
        renderAll();
      };
      list.appendChild(div);
    });
}

/* ========= EVENTS ========= */
lockBtn.addEventListener("click", openMenu);
monthSelect.addEventListener("change", renderAll);

document.querySelectorAll("[data-open-panel]").forEach(el => {
  el.addEventListener("click", () => openPanel(el.dataset.openPanel));
});

menuClose.addEventListener("click", closeMenu);
panelClose.addEventListener("click", closePanel);

menuOverlay.addEventListener("click", (e) => {
  if(e.target === menuOverlay) closeMenu();
});
panelOverlay.addEventListener("click", (e) => {
  if(e.target === panelOverlay) closePanel();
});

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape"){
    closeMenu();
    closePanel();
  }
});

/* ========= INIT ========= */
(async function init(){
  renderAll();
  showStatus("Vérification accès admin…", "Le cadenas s’affiche seulement si l’utilisateur est admin.");
  await loadMyRole();
  hideStatus();
})();
</script>
