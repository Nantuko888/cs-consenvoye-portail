<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Statistiques</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}
canvas{
  max-width:250px;
  margin-top:30px;
}
</style>
</head>

<body>

<h1>Statistiques</h1>

<canvas id="chart"></canvas>

<script>
const ctx = document.getElementById("chart");

new Chart(ctx,{
  type:"pie",
  data:{
    labels:["VSAV","FPT"],
    datasets:[{
      data:[5,3],
      backgroundColor:["red","blue"]
    }]
  }
});
</script>

</body>
</html>
