<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Statistiques</title>

<style>
:root{
  --txt:#f4f4f4;
  --shadow:0 12px 28px rgba(0,0,0,.40);
  --stroke:rgba(255,255,255,.10);
  --radius:18px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
  overflow:hidden;
}

.bg{
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.65)),
    url("background.png") center/cover no-repeat;
  z-index:-1;
}

/* LAYOUT */
.wrap{
  height:100vh;
  max-width:900px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 10px);
  display:grid;
  grid-template-rows:auto auto 1fr;
  gap:10px;
}

/* HEADER */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(140,90,210,.80), rgba(110,60,180,.60));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
}

.title{
  font-weight:950;
  font-size:16px;
  text-transform:uppercase;
}

.topRight{
  display:flex;
  gap:8px;
  align-items:center;
}

.btn{
  padding:7px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.20);
  color:var(--txt);
  font-weight:900;
  font-size:13px;
}

.lock{
  font-size:18px;
  cursor:pointer;
}

/* CHART */
.chartBox{
  display:flex;
  justify-content:center;
  padding:10px;
  border-radius:18px;
  background:rgba(0,0,0,.30);
  border:1px solid var(--stroke);
}

canvas{max-width:220px}

/* DETAILS */
.list{
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.block{
  padding:10px 12px;
  border-radius:16px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.08);
}

.blockTitle{
  font-weight:900;
  font-size:14px;
  margin-bottom:6px;
}

.line{
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

/* ADMIN PANEL */
.adminPanel{
  display:none;
  padding:10px;
  border-radius:16px;
  background:rgba(140,90,210,.20);
  border:1px solid rgba(255,255,255,.10);
  font-size:13px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="topbar">
    <div class="title">Statistiques</div>

    <div class="topRight">
      <div class="lock" id="lock">🔒</div>
      <button class="btn" onclick="location.href='informations.html'">Retour</button>
    </div>
  </div>

  <!-- CAMEMBERT -->
  <div class="chartBox">
    <canvas id="chart"></canvas>
  </div>

  <!-- DETAILS -->
  <div class="list" id="details"></div>

  <!-- ADMIN -->
  <div class="adminPanel" id="adminPanel">
    Mode admin actif (zone future saisie)
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* ===== FAKE DATA ===== */
const interventions = [
  {vehicules:["VSAV"], type:"Malaise"},
  {vehicules:["VSAV"], type:"Chute"},
  {vehicules:["FPT"], type:"Feu"},
  {vehicules:["VSAV","FPT"], type:"AVP"}
];

const vehiculesConfig = {
  VSAV:"#ff3b3b",
  FPT:"#3b8bff"
};

/* ===== STATS ===== */
let stats = {};

interventions.forEach(i=>{
  i.vehicules.forEach(v=>{
    if(!stats[v]) stats[v]={total:0,types:{},color:vehiculesConfig[v]};
    stats[v].total++;
    stats[v].types[i.type]=(stats[v].types[i.type]||0)+1;
  });
});

/* ===== CHART ===== */
new Chart(document.getElementById("chart"),{
  type:"pie",
  data:{
    labels:Object.keys(stats),
    datasets:[{
      data:Object.values(stats).map(v=>v.total),
      backgroundColor:Object.values(stats).map(v=>v.color)
    }]
  },
  options:{plugins:{legend:{display:false}}}
});

/* ===== DETAILS ===== */
const details = document.getElementById("details");

Object.keys(stats).forEach(v=>{
  const block=document.createElement("div");
  block.className="block";

  let html = `<div class="blockTitle" style="color:${stats[v].color}">${v}</div>`;

  Object.keys(stats[v].types).forEach(t=>{
    html += `<div class="line"><span>${t}</span><span>${stats[v].types[t]}</span></div>`;
  });

  block.innerHTML = html;
  details.appendChild(block);
});

/* ===== LOCK SYSTEM ===== */
let isAdmin = false;

document.getElementById("lock").onclick = ()=>{
  isAdmin = !isAdmin;

  document.getElementById("lock").textContent = isAdmin ? "🔓" : "🔒";
  document.getElementById("adminPanel").style.display = isAdmin ? "block" : "none";
};
</script>

</body>
</html>
