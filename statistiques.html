<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Statistiques — CS Consenvoye</title>

<style>
:root{
  --txt:#f4f4f4;
  --muted:rgba(255,255,255,.72);
  --shadow:0 14px 34px rgba(0,0,0,.40);
  --stroke:rgba(255,255,255,.10);
  --orange1:rgba(212,106,0,.75);
  --orange2:rgba(185,88,0,.58);
  --radius:18px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
  overflow:hidden;
}
.bg{
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.65)),
    url("background.png") center/cover no-repeat;
  z-index:-1;
}
.wrap{
  height:100vh;
  max-width:980px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 10px);
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  gap:10px;
}

/* header */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-radius:18px;
  background:linear-gradient(180deg, var(--orange1), var(--orange2));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  min-height:46px;
}
.title{
  font-weight:950;
  letter-spacing:.8px;
  text-transform:uppercase;
  font-size:18px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.topRight{
  display:flex;
  align-items:center;
  gap:8px;
}
.btn, .lockBtn, .smallBtn{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.18);
  color:#fff;
  padding:9px 12px;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn:active, .lockBtn:active, .smallBtn:active{ transform:translateY(1px) }
.lockBtn{
  min-width:44px;
  padding:9px 11px;
  display:none;
}

/* filters */
.filters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.filterBox{
  border-radius:18px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  min-height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.selectMonth{
  width:100%;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-weight:900;
  font-size:16px;
  text-align:center;
  text-align-last:center;
  padding:0 14px;
  appearance:none;
  -webkit-appearance:none;
}
.yearBox{
  font-weight:950;
  font-size:18px;
  letter-spacing:.5px;
}

/* pie */
.pieWrap{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:8px 0 2px;
}
.pie{
  width:180px;
  height:180px;
  border-radius:50%;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.08);
}

/* agent */
.agentView{
  min-height:0;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-right:2px;
}
.block{
  border-radius:18px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:12px;
}
.blockTitle{
  font-weight:950;
  font-size:18px;
  margin-bottom:8px;
}
.table{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.row{
  display:grid;
  grid-template-columns:1fr 84px 84px;
  gap:8px;
  align-items:center;
}
.row.header{
  padding-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,.08);
  margin-bottom:2px;
}
.cellType{
  font-weight:850;
  font-size:15px;
  color:#fff;
}
.cellHead{
  font-weight:900;
  font-size:12px;
  text-align:right;
  color:rgba(255,255,255,.72);
  text-transform:uppercase;
}
.cellVal{
  font-weight:950;
  font-size:16px;
  text-align:right;
  color:#fff;
}
.emptyCard{
  border-radius:18px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  padding:16px;
  text-align:center;
  font-weight:900;
}
.statusPill{
  position:fixed;
  left:12px; right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 12px);
  max-width:980px;
  margin:0 auto;
  z-index:90;
  display:none;
}
.statusPillInner{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:16px;
  background:rgba(0,0,0,.68);
  border:1px solid rgba(255,255,255,.14);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  font-weight:900;
}
.statusSub{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

/* overlays */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:none;
  z-index:150;
}
.overlay.show{display:block}

.sheet{
  position:absolute;
  left:12px; right:12px;
  bottom:calc(env(safe-area-inset-bottom) + 12px);
  max-width:980px;
  margin:0 auto;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(0,0,0,.84), rgba(0,0,0,.72));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.menuSheet{ height:min(44vh, 420px); }
.panelSheet{ height:min(76vh, 780px); }

.sheetHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.18);
}
.sheetTitle{
  font-weight:950;
  font-size:16px;
}
.sheetBody{
  padding:12px;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* admin menu */
.menuGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.menuCard{
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  cursor:pointer;
}
.menuLeft{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.menuEmoji{
  font-size:24px;
  flex:0 0 auto;
}
.menuText{
  min-width:0;
}
.menuMain{
  font-weight:950;
  font-size:17px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.menuSub{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}
.menuArrow{
  font-size:18px;
  opacity:.8;
}

/* panel content */
.section{
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  padding:12px;
}
.sectionTitle{
  font-weight:950;
  font-size:15px;
  margin-bottom:10px;
}
.hint{
  font-size:12px;
  color:var(--muted);
  margin-top:-4px;
  margin-bottom:8px;
}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.field, .select, .textarea{
  width:100%;
  border:none;
  outline:none;
  background:rgba(0,0,0,.24);
  color:#fff;
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;
  padding:11px 12px;
  font:inherit;
  font-weight:800;
}
.textarea{
  min-height:84px;
  resize:vertical;
}
.actionRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.smallBtn.danger{ border-color:rgba(255,90,90,.28); }

.listAdmin{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
}
.itemLeft{
  min-width:0;
  display:flex;
  align-items:center;
  gap:10px;
}
.dot{
  width:12px;
  height:12px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,.20);
  flex:0 0 auto;
}
.itemMain{
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.itemSub{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.vehicleChecks{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.checkCard{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  font-weight:850;
}

@media (max-width:520px){
  .filters,
  .grid2,
  .vehicleChecks{
    grid-template-columns:1fr;
  }
  .row{
    grid-template-columns:1fr 68px 68px;
  }
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="wrap">

  <div class="topbar">
    <div class="title">Statistiques</div>
    <div class="topRight">
      <button id="lockBtn" class="lockBtn" type="button" aria-label="Administration">🔒</button>
      <button class="btn" onclick="location.href='informations.html'">Retour</button>
    </div>
  </div>

  <div class="filters">
    <div class="filterBox">
      <select id="monthSelect" class="selectMonth"></select>
    </div>
    <div class="filterBox yearBox" id="yearBox">2026</div>
  </div>

  <div class="pieWrap">
    <div id="pie" class="pie"></div>
  </div>

  <div id="agentView" class="agentView"></div>

</div>

<div id="statusPill" class="statusPill">
  <div class="statusPillInner">
    <div>⚠️</div>
    <div>
      <div id="statusMain">Chargement…</div>
      <div id="statusSub" class="statusSub"></div>
    </div>
  </div>
</div>

<!-- menu admin -->
<div id="menuOverlay" class="overlay">
  <div class="sheet menuSheet">
    <div class="sheetHead">
      <div class="sheetTitle">Administration statistiques</div>
      <button id="menuClose" class="smallBtn" type="button">Fermer</button>
    </div>
    <div class="sheetBody">
      <div class="menuGrid">
        <div class="menuCard" data-open-panel="vehicules">
          <div class="menuLeft">
            <div class="menuEmoji">🚒</div>
            <div class="menuText">
              <div class="menuMain">Catalogue véhicules</div>
              <div class="menuSub">Nom du véhicule + couleur</div>
            </div>
          </div>
          <div class="menuArrow">›</div>
        </div>

        <div class="menuCard" data-open-panel="types">
          <div class="menuLeft">
            <div class="menuEmoji">🏷️</div>
            <div class="menuText">
              <div class="menuMain">Catalogue types</div>
              <div class="menuSub">Malaise, AVP, feu…</div>
            </div>
          </div>
          <div class="menuArrow">›</div>
        </div>

        <div class="menuCard" data-open-panel="interventions">
          <div class="menuLeft">
            <div class="menuEmoji">📝</div>
            <div class="menuText">
              <div class="menuMain">Remplissage interventions</div>
              <div class="menuSub">Date, type, véhicules, lieu, hors secteur</div>
            </div>
          </div>
          <div class="menuArrow">›</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- panneau detail -->
<div id="panelOverlay" class="overlay">
  <div class="sheet panelSheet">
    <div class="sheetHead">
      <div id="panelTitle" class="sheetTitle">Admin</div>
      <button id="panelClose" class="smallBtn" type="button">Fermer</button>
    </div>
    <div id="panelBody" class="sheetBody"></div>
  </div>
</div>

<script>
/* ========= CONFIG ========= */
const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const LS_EMAIL = "cs_portail_email_v1";

/* ========= ETAT TEMPORAIRE INTERFACE ========= */
let vehiculesConfig = {
  "VSAV":"#ff3b3b",
  "FPT":"#3b8bff"
};

let statsTypes = [
  "Malaise",
  "Chute",
  "AVP",
  "Feu"
];

let interventions = [
  { id:1, date:"2026-04-01", type:"Malaise", vehicules:["VSAV"], horsSecteur:false, lieu:"Consenvoye" },
  { id:2, date:"2026-04-03", type:"Chute", vehicules:["VSAV"], horsSecteur:true, lieu:"Extérieur" },
  { id:3, date:"2026-04-05", type:"Feu", vehicules:["FPT"], horsSecteur:false, lieu:"Centre" },
  { id:4, date:"2026-04-07", type:"AVP", vehicules:["VSAV","FPT"], horsSecteur:true, lieu:"RD" },
  { id:5, date:"2026-04-09", type:"Malaise", vehicules:["VSAV"], horsSecteur:false, lieu:"Consenvoye" }
];

let isAdmin = false;

/* ========= DOM ========= */
const monthSelect = document.getElementById("monthSelect");
const yearBox = document.getElementById("yearBox");
const pie = document.getElementById("pie");
const agentView = document.getElementById("agentView");
const lockBtn = document.getElementById("lockBtn");

const menuOverlay = document.getElementById("menuOverlay");
const menuClose = document.getElementById("menuClose");
const panelOverlay = document.getElementById("panelOverlay");
const panelTitle = document.getElementById("panelTitle");
const panelBody = document.getElementById("panelBody");
const panelClose = document.getElementById("panelClose");

const statusPill = document.getElementById("statusPill");
const statusMain = document.getElementById("statusMain");
const statusSub = document.getElementById("statusSub");

/* ========= UTILS ========= */
function showStatus(main, sub=""){
  statusMain.textContent = main || "";
  statusSub.textContent = sub || "";
  statusPill.style.display = "block";
}
function hideStatus(){
  statusPill.style.display = "none";
}
function getEmailLocal(){
  return (localStorage.getItem(LS_EMAIL) || "").trim().toLowerCase();
}
function jsonp(url, cbName, timeoutMs=15000){
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    const cleanup = () => {
      script.remove();
      try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
    };
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout JSONP"));
    }, timeoutMs);
    window[cbName] = (data) => {
      clearTimeout(timer);
      cleanup();
      resolve(data);
    };
    const sep = url.includes("?") ? "&" : "?";
    script.src = url + sep + "t=" + Date.now();
    script.onerror = () => {
      clearTimeout(timer);
      cleanup();
      reject(new Error("Erreur JSONP"));
    };
    document.head.appendChild(script);
  });
}
async function loadMyRole(){
  const email = getEmailLocal();
  if(!email){
    isAdmin = false;
    lockBtn.style.display = "none";
    return;
  }
  const cb = "cb_auth_" + Math.random().toString(36).slice(2);
  const url = `${API}?view=auth_check&email=${encodeURIComponent(email)}&nocache=1&callback=${cb}`;
  try{
    const res = await jsonp(url, cb, 20000);
    isAdmin = !!(res && res.ok === true && String(res.role || "").toLowerCase() === "admin");
    lockBtn.style.display = isAdmin ? "inline-block" : "none";
  }catch(e){
    isAdmin = false;
    lockBtn.style.display = "none";
  }
}

/* ========= MOIS / ANNEE ========= */
const months = [
  "Janvier","Février","Mars","Avril","Mai","Juin",
  "Juillet","Août","Septembre","Octobre","Novembre","Décembre"
];
months.forEach((m, i) => {
  const opt = document.createElement("option");
  opt.value = String(i + 1).padStart(2, "0");
  opt.textContent = m;
  monthSelect.appendChild(opt);
});
monthSelect.value = "04";
yearBox.textContent = "2026";

function selectedYear(){ return String(yearBox.textContent || "").trim(); }
function selectedMonth(){ return String(monthSelect.value || "").trim(); }

function filteredInterventions(){
  return interventions.filter(i => {
    const parts = String(i.date || "").split("-");
    if(parts.length !== 3) return false;
    return parts[0] === selectedYear() && parts[1] === selectedMonth();
  });
}

/* ========= VUE AGENT ========= */
function buildStats(filtered){
  const stats = {};
  const pieTotals = {};

  filtered.forEach(inter => {
    inter.vehicules.forEach(v => {
      if(!stats[v]){
        stats[v] = {
          color: vehiculesConfig[v] || "#999999",
          types: {}
        };
      }
      if(!stats[v].types[inter.type]){
        stats[v].types[inter.type] = { secteur:0, hors:0 };
      }
      if(inter.horsSecteur){
        stats[v].types[inter.type].hors += 1;
      }else{
        stats[v].types[inter.type].secteur += 1;
      }
      pieTotals[v] = (pieTotals[v] || 0) + 1;
    });
  });

  return { stats, pieTotals };
}

function renderPie(pieTotals){
  const keys = Object.keys(pieTotals);
  if(!keys.length){
    pie.style.background = "rgba(255,255,255,.08)";
    return;
  }
  const total = keys.reduce((s,k)=>s + pieTotals[k], 0);
  let current = 0;
  const parts = [];
  keys.forEach(k => {
    const pct = (pieTotals[k] / total) * 100;
    const color = vehiculesConfig[k] || "#999999";
    parts.push(`${color} ${current}% ${current + pct}%`);
    current += pct;
  });
  pie.style.background = `conic-gradient(${parts.join(",")})`;
}

function renderAgent(stats){
  agentView.innerHTML = "";
  const vehKeys = Object.keys(stats);

  if(!vehKeys.length){
    agentView.innerHTML = `<div class="emptyCard">Aucune donnée pour cette période</div>`;
    return;
  }

  vehKeys.forEach(v => {
    const block = document.createElement("div");
    block.className = "block";

    let html = `<div class="blockTitle" style="color:${stats[v].color}">${v}</div>`;
    html += `
      <div class="table">
        <div class="row header">
          <div class="cellHead" style="text-align:left">Type</div>
          <div class="cellHead">Secteur</div>
          <div class="cellHead">Hors secteur</div>
        </div>
    `;

    Object.keys(stats[v].types).forEach(type => {
      const s = stats[v].types[type].secteur;
      const h = stats[v].types[type].hors;
      html += `
        <div class="row">
          <div class="cellType">${type}</div>
          <div class="cellVal">${s}</div>
          <div class="cellVal">${h}</div>
        </div>
      `;
    });

    html += `</div>`;
    block.innerHTML = html;
    agentView.appendChild(block);
  });
}

function renderAll(){
  const filtered = filteredInterventions();
  const { stats, pieTotals } = buildStats(filtered);
  renderPie(pieTotals);
  renderAgent(stats);
}

/* ========= OVERLAYS ========= */
function openMenu(){
  if(!isAdmin) return;
  menuOverlay.classList.add("show");
}
function closeMenu(){
  menuOverlay.classList.remove("show");
}
function openPanel(name){
  closeMenu();
  panelOverlay.classList.add("show");
  if(name === "vehicules"){
    panelTitle.textContent = "Catalogue véhicules";
    renderVehiculesPanel();
  }else if(name === "types"){
    panelTitle.textContent = "Catalogue types";
    renderTypesPanel();
  }else if(name === "interventions"){
    panelTitle.textContent = "Remplissage interventions";
    renderInterventionsPanel();
  }
}
function closePanel(){
  panelOverlay.classList.remove("show");
  panelBody.innerHTML = "";
}

/* ========= PANELS ========= */
function renderVehiculesPanel(){
  panelBody.innerHTML = `
    <div class="section">
      <div class="sectionTitle">Ajouter un véhicule</div>
      <div class="hint">Nom du véhicule + couleur.</div>
      <div class="grid2">
        <input id="pv_name" class="field" type="text" placeholder="Nom véhicule (ex : VSAV)">
        <input id="pv_color" class="field" type="text" placeholder="Couleur HEX (ex : #ff3b3b)">
      </div>
      <div class="actionRow" style="margin-top:10px;">
        <button id="pv_add" class="smallBtn" type="button">Ajouter</button>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">Véhicules enregistrés</div>
      <div id="pv_list" class="listAdmin"></div>
    </div>
  `;

  document.getElementById("pv_add").onclick = () => {
    const name = String(document.getElementById("pv_name").value || "").trim().toUpperCase();
    const color = String(document.getElementById("pv_color").value || "").trim();
    if(!name || !color) return;
    vehiculesConfig[name] = color;
    renderVehiculesPanel();
    renderAll();
  };

  const list = document.getElementById("pv_list");
  Object.keys(vehiculesConfig).forEach(v => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="itemLeft">
        <span class="dot" style="background:${vehiculesConfig[v]}"></span>
        <div>
          <div class="itemMain">${v}</div>
          <div class="itemSub">${vehiculesConfig[v]}</div>
        </div>
      </div>
      <button class="smallBtn danger" type="button">Supprimer</button>
    `;
    div.querySelector("button").onclick = () => {
      delete vehiculesConfig[v];
      interventions = interventions
        .map(it => ({ ...it, vehicules: it.vehicules.filter(x => x !== v) }))
        .filter(it => it.vehicules.length > 0);
      renderVehiculesPanel();
      renderAll();
    };
    list.appendChild(div);
  });
}

function renderTypesPanel(){
  panelBody.innerHTML = `
    <div class="section">
      <div class="sectionTitle">Ajouter un type</div>
      <div class="hint">Ex : Malaise, AVP, Feu…</div>
      <div class="grid2">
        <input id="pt_name" class="field" type="text" placeholder="Nom du type">
        <div></div>
      </div>
      <div class="actionRow" style="margin-top:10px;">
        <button id="pt_add" class="smallBtn" type="button">Ajouter</button>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">Types enregistrés</div>
      <div id="pt_list" class="listAdmin"></div>
    </div>
  `;

  document.getElementById("pt_add").onclick = () => {
    const t = String(document.getElementById("pt_name").value || "").trim();
    if(!t) return;
    if(!statsTypes.includes(t)) statsTypes.push(t);
    renderTypesPanel();
    renderAll();
  };

  const list = document.getElementById("pt_list");
  statsTypes.forEach(t => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="itemLeft">
        <div>
          <div class="itemMain">${t}</div>
        </div>
      </div>
      <button class="smallBtn danger" type="button">Supprimer</button>
    `;
    div.querySelector("button").onclick = () => {
      statsTypes = statsTypes.filter(x => x !== t);
      interventions = interventions.filter(it => it.type !== t);
      renderTypesPanel();
      renderAll();
    };
    list.appendChild(div);
  });
}

function renderInterventionsPanel(){
  panelBody.innerHTML = `
    <div class="section">
      <div class="sectionTitle">Nouvelle intervention</div>
      <div class="hint">Date, type, véhicules, lieu, hors secteur.</div>

      <div class="grid2">
        <input id="pi_date" class="field" type="date">
        <select id="pi_type" class="select"></select>
      </div>

      <div class="section" style="margin-top:10px; padding:10px 12px;">
        <div class="sectionTitle" style="margin-bottom:8px; font-size:14px;">Véhicules déclenchés</div>
        <div id="pi_vehs" class="vehicleChecks"></div>
      </div>

      <div class="grid2" style="margin-top:10px;">
        <input id="pi_lieu" class="field" type="text" placeholder="Lieu">
        <label class="checkCard">
          <input id="pi_hs" type="checkbox">
          <span>Hors secteur</span>
        </label>
      </div>

      <div class="actionRow" style="margin-top:10px;">
        <button id="pi_add" class="smallBtn" type="button">Ajouter intervention</button>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">Interventions enregistrées</div>
      <div id="pi_list" class="listAdmin"></div>
    </div>
  `;

  const typeSel = document.getElementById("pi_type");
  statsTypes.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSel.appendChild(opt);
  });

  const vehs = document.getElementById("pi_vehs");
  Object.keys(vehiculesConfig).forEach(v => {
    const label = document.createElement("label");
    label.className = "checkCard";
    label.innerHTML = `
      <input type="checkbox" value="${v}">
      <span class="dot" style="background:${vehiculesConfig[v]}"></span>
      <span>${v}</span>
    `;
    vehs.appendChild(label);
  });

  document.getElementById("pi_add").onclick = () => {
    const date = String(document.getElementById("pi_date").value || "").trim();
    const type = String(document.getElementById("pi_type").value || "").trim();
    const lieu = String(document.getElementById("pi_lieu").value || "").trim();
    const hs = !!document.getElementById("pi_hs").checked;
    const checked = [...vehs.querySelectorAll('input[type="checkbox"]:checked')].map(x => x.value);

    if(!date || !type || !checked.length) return;

    interventions.push({
      id: Date.now(),
      date,
      type,
      vehicules: checked,
      horsSecteur: hs,
      lieu
    });

    renderInterventionsPanel();
    renderAll();
  };

  const list = document.getElementById("pi_list");
  [...interventions]
    .sort((a,b) => String(b.date).localeCompare(String(a.date)))
    .forEach(it => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div class="itemLeft">
          <div>
            <div class="itemMain">${it.date} — ${it.type}</div>
            <div class="itemSub">${it.vehicules.join(", ")} • ${it.lieu || "—"} • ${it.horsSecteur ? "Hors secteur" : "Secteur"}</div>
          </div>
        </div>
        <button class="smallBtn danger" type="button">Supprimer</button>
      `;
      div.querySelector("button").onclick = () => {
        interventions = interventions.filter(x => x.id !== it.id);
        renderInterventionsPanel();
        renderAll();
      };
      list.appendChild(div);
    });
}

/* ========= EVENTS ========= */
lockBtn.addEventListener("click", openMenu);
monthSelect.addEventListener("change", renderAll);

document.querySelectorAll("[data-open-panel]").forEach(el => {
  el.addEventListener("click", () => openPanel(el.dataset.openPanel));
});

menuClose.addEventListener("click", closeMenu);
panelClose.addEventListener("click", closePanel);

menuOverlay.addEventListener("click", (e) => {
  if(e.target === menuOverlay) closeMenu();
});
panelOverlay.addEventListener("click", (e) => {
  if(e.target === panelOverlay) closePanel();
});

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape"){
    closeMenu();
    closePanel();
  }
});

/* ========= INIT ========= */
(async function init(){
  renderAll();
  showStatus("Vérification accès admin…", "Le cadenas s’affiche seulement pour un admin.");
  await loadMyRole();
  hideStatus();
})();
</script>
</body>
</html>
