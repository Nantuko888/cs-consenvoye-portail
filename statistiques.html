<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Statistiques</title>

<style>
:root{
  --txt:#f4f4f4;
  --shadow:0 14px 34px rgba(0,0,0,.40);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
  overflow:hidden;
}

/* BG */
.bg{
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.65)),
    url("background.png") center/cover no-repeat;
  z-index:-1;
}

/* LAYOUT */
.wrap{
  height:100vh;
  max-width:980px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 10px);
  display:grid;
  grid-template-rows:auto auto 1fr;
  gap:10px;
}

/* HEADER ORANGE */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 14px;
  border-radius:20px;
  background:linear-gradient(180deg, rgba(212,106,0,.85), rgba(185,88,0,.65));
  box-shadow:var(--shadow);
}

.title{
  font-weight:900;
  font-size:18px;
  text-transform:uppercase;
}

.topRight{
  display:flex;
  align-items:center;
  gap:10px;
}

.lock{
  font-size:18px;
  cursor:pointer;
}

.btn{
  border:none;
  padding:10px 14px;
  border-radius:16px;
  background:rgba(0,0,0,.25);
  color:#fff;
  font-weight:900;
}

/* PIE */
.pie{
  width:180px;
  height:180px;
  border-radius:50%;
  margin:auto;
}

/* LIST */
.list{
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.block{
  padding:12px;
  border-radius:16px;
  background:rgba(0,0,0,.35);
}

.blockTitle{
  font-weight:900;
  margin-bottom:6px;
}

.line{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* ADMIN */
.admin{
  display:none;
  padding:12px;
  border-radius:16px;
  background:rgba(255,120,0,.15);
  border:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="topbar">
    <div class="title">Statistiques</div>

    <div class="topRight">
      <div id="lock" class="lock">🔒</div>
      <button class="btn" onclick="location.href='informations.html'">Retour</button>
    </div>
  </div>

  <!-- PIE -->
  <div id="pie" class="pie"></div>

  <!-- DETAILS -->
  <div id="list" class="list"></div>

  <!-- ADMIN PANEL -->
  <div id="admin" class="admin">
    Mode admin activé (zone future saisie)
  </div>

</div>

<script>

/* ===== DATA TEST ===== */
const interventions = [
  {vehicules:["VSAV"], type:"Malaise"},
  {vehicules:["VSAV"], type:"Chute"},
  {vehicules:["FPT"], type:"Feu"},
  {vehicules:["VSAV","FPT"], type:"AVP"}
];

const vehicules = {
  VSAV:"#ff3b3b",
  FPT:"#3b8bff"
};

/* ===== CALCUL ===== */
let stats = {};

interventions.forEach(i=>{
  i.vehicules.forEach(v=>{
    if(!stats[v]) stats[v]={total:0,types:{},color:vehicules[v]};
    stats[v].total++;
    stats[v].types[i.type]=(stats[v].types[i.type]||0)+1;
  });
});

/* ===== PIE ===== */
let total = Object.values(stats).reduce((s,v)=>s+v.total,0);
let current = 0;
let gradient = "conic-gradient(";

Object.values(stats).forEach((v,i)=>{
  let percent = (v.total/total)*100;
  gradient += `${v.color} ${current}% ${current+percent}%`;
  current += percent;
  if(i < Object.keys(stats).length-1) gradient += ",";
});

gradient += ")";
document.getElementById("pie").style.background = gradient;

/* ===== DETAILS ===== */
const list = document.getElementById("list");

Object.keys(stats).forEach(v=>{
  let div = document.createElement("div");
  div.className = "block";

  let html = `<div class="blockTitle" style="color:${stats[v].color}">${v}</div>`;

  Object.keys(stats[v].types).forEach(t=>{
    html += `<div class="line"><span>${t}</span><span>${stats[v].types[t]}</span></div>`;
  });

  div.innerHTML = html;
  list.appendChild(div);
});

/* ===== CADENAS ===== */
let admin = false;

document.getElementById("lock").onclick = ()=>{
  admin = !admin;

  document.getElementById("lock").textContent = admin ? "🔓" : "🔒";
  document.getElementById("admin").style.display = admin ? "block" : "none";
};

</script>

</body>
</html>
