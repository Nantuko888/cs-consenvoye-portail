<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Statistiques</title>

<style>
:root{
  --txt:#f4f4f4;
  --shadow:0 14px 34px rgba(0,0,0,.40);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:#0b0b0b;
  overflow:hidden;
}

.bg{
  position:fixed; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.65)),
    url("background.png") center/cover no-repeat;
  z-index:-1;
}

.wrap{
  height:100vh;
  max-width:980px;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 10px);
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  gap:10px;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.58));
  box-shadow:var(--shadow);
}

.title{
  font-weight:900;
  font-size:18px;
}

.btn{
  padding:8px 12px;
  border-radius:12px;
  background:rgba(0,0,0,.2);
  border:none;
  color:#fff;
  font-weight:900;
}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
}

.select, .year{
  flex:1;
  padding:10px;
  border-radius:14px;
  background:rgba(0,0,0,.35);
  border:none;
  color:#fff;
  font-weight:900;
  text-align:center;
}

/* PIE */
.pie{
  width:180px;
  height:180px;
  border-radius:50%;
  margin:auto;
}

/* LIST */
.list{
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.block{
  padding:12px;
  border-radius:16px;
  background:rgba(0,0,0,.35);
}

.blockTitle{
  font-weight:900;
  margin-bottom:6px;
}

/* TABLE */
.table{
  width:100%;
  font-size:14px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:2px 0;
}

.headerRow{
  font-size:12px;
  opacity:.7;
}

.col{
  width:33%;
  text-align:left;
}

.colRight{
  width:33%;
  text-align:right;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="topbar">
    <div class="title">Statistiques</div>
    <button class="btn" onclick="location.href='informations.html'">Retour</button>
  </div>

  <!-- FILTRES -->
  <div class="filters">
    <select class="select" id="month"></select>
    <div class="year" id="year"></div>
  </div>

  <!-- PIE -->
  <div id="pie" class="pie"></div>

  <!-- LIST -->
  <div id="list" class="list"></div>

</div>

<script>

/* MOIS */
const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const monthSelect = document.getElementById("month");

months.forEach((m,i)=>{
  let opt=document.createElement("option");
  opt.value=i;
  opt.textContent=m;
  monthSelect.appendChild(opt);
});

const now=new Date();
monthSelect.value=now.getMonth();
document.getElementById("year").textContent=now.getFullYear();

/* DATA TEST */
const interventions = [
  {vehicules:["VSAV"], type:"Malaise", hs:false},
  {vehicules:["VSAV"], type:"Chute", hs:true},
  {vehicules:["FPT"], type:"Feu", hs:false},
  {vehicules:["VSAV","FPT"], type:"AVP", hs:true}
];

const vehicules = {
  VSAV:"#ff3b3b",
  FPT:"#3b8bff"
};

/* CALCUL */
let stats = {};

interventions.forEach(i=>{
  i.vehicules.forEach(v=>{
    if(!stats[v]) stats[v]={types:{},color:vehicules[v]};

    if(!stats[v].types[i.type]){
      stats[v].types[i.type]={secteur:0,hors:0};
    }

    if(i.hs){
      stats[v].types[i.type].hors++;
    }else{
      stats[v].types[i.type].secteur++;
    }
  });
});

/* PIE */
let totalVeh = {};
interventions.forEach(i=>{
  i.vehicules.forEach(v=>{
    totalVeh[v]=(totalVeh[v]||0)+1;
  });
});

let total = Object.values(totalVeh).reduce((s,v)=>s+v,0);
let current=0;
let gradient="conic-gradient(";

Object.keys(totalVeh).forEach((v,i)=>{
  let p=(totalVeh[v]/total)*100;
  gradient+=`${vehicules[v]} ${current}% ${current+p}%`;
  current+=p;
  if(i<Object.keys(totalVeh).length-1) gradient+=",";
});

gradient+=")";
document.getElementById("pie").style.background=gradient;

/* LIST */
const list=document.getElementById("list");

Object.keys(stats).forEach(v=>{
  let div=document.createElement("div");
  div.className="block";

  let html=`<div class="blockTitle" style="color:${stats[v].color}">${v}</div>`;

  html+=`
  <div class="table">
    <div class="row headerRow">
      <div class="col">Type</div>
      <div class="colRight">Secteur</div>
      <div class="colRight">Hors</div>
    </div>
  `;

  Object.keys(stats[v].types).forEach(t=>{
    let s = stats[v].types[t].secteur;
    let h = stats[v].types[t].hors;

    html+=`
    <div class="row">
      <div class="col">${t}</div>
      <div class="colRight">${s}</div>
      <div class="colRight">${h}</div>
    </div>
    `;
  });

  html+=`</div>`;

  div.innerHTML=html;
  list.appendChild(div);
});

</script>

</body>
</html>
