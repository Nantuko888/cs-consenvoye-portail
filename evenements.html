<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Événements</title>

<style>

:root{
--txt:#f4f4f4;
--shadow:0 14px 34px rgba(0,0,0,.40);
--header1: rgba(212,106,0,.75);
--header2: rgba(185,88,0,.58);
}

body{
margin:0;
font-family:system-ui;
color:var(--txt);
background:#0b0b0b;
}

.bg{
position:fixed;
inset:0;
background:
linear-gradient(180deg,rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("background.png") center/cover no-repeat;
z-index:-1;
}

.wrap{
max-width:900px;
margin:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:12px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
border-radius:18px;
background:linear-gradient(180deg,var(--header1),var(--header2));
box-shadow:var(--shadow);
}

.title{
font-weight:900;
letter-spacing:.5px;
}

.btn{
padding:8px 12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:rgba(0,0,0,.2);
color:white;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
border-radius:18px;
padding:18px;
text-align:center;
font-weight:900;
cursor:pointer;
border:1px solid rgba(255,255,255,.12);
box-shadow:var(--shadow);
}

.card:active{
transform:translateY(1px);
}

.cat1{background:linear-gradient(180deg,rgba(75,130,220,.4),rgba(75,130,220,.2))}
.cat2{background:linear-gradient(180deg,rgba(210,70,70,.4),rgba(210,70,70,.2))}
.cat3{background:linear-gradient(180deg,rgba(200,120,40,.4),rgba(200,120,40,.2))}
.cat4{background:linear-gradient(180deg,rgba(90,170,105,.4),rgba(90,170,105,.2))}
.cat5{background:linear-gradient(180deg,rgba(145,105,220,.4),rgba(145,105,220,.2))}
.cat6{background:linear-gradient(180deg,rgba(70,170,170,.4),rgba(70,170,170,.2))}

</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

<div class="topbar">
<div class="title">ÉVÉNEMENTS</div>
<button class="btn" onclick="location.href='informations.html'">Retour</button>
</div>

<div class="grid">

<div class="card cat1" onclick="location.href='evenement-ceremonies.html'">
Cérémonies
</div>

<div class="card cat2" onclick="location.href='evenement-reunions.html'">
Réunions
</div>

<div class="card cat3" onclick="location.href='evenement-repas.html'">
Repas / convivialité
</div>

<div class="card cat4" onclick="location.href='evenement-sorties.html'">
Sorties / activités
</div>

<div class="card cat5" onclick="location.href='evenement-projets.html'">
Projets
</div>

<div class="card cat6" onclick="location.href='evenement-comptes.html'">
Comptes-rendus
</div>

</div>

</div>

</body>
</html>
