<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Règlement — CS Consenvoye</title>

  <style>
    :root{
      --txt:#f4f4f4;
      --shadow:0 14px 34px rgba(0,0,0,.40);
      --stroke:rgba(255,255,255,.10);
      --headerColor1: rgba(212,106,0,.75);
      --headerColor2: rgba(185,88,0,.58);
      --activeTitleBg: rgba(75,130,220,.35);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.54), rgba(0,0,0,.58)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
      transform:translateZ(0);
    }

    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.66) 62%);
      z-index:-1;
    }

    .wrap{
      height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows:auto 1fr;
      gap:10px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:linear-gradient(180deg,var(--headerColor1),var(--headerColor2));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      min-height:46px;
    }

    .topbar .title{
      font-weight:950;
      letter-spacing:.8px;
      text-transform:uppercase;
      font-size:18px;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:9px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .btn:active{transform:translateY(1px)}

    .page{
      min-height:0;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding-right:2px;
      padding-bottom:calc(env(safe-area-inset-bottom) + 18px);
    }

    .book{
      position:relative;
      display:grid;
      grid-template-columns:20px 1fr auto;
      gap:0;
      min-height:72vh;
      border-radius:24px;
      overflow:visible;
      background:linear-gradient(180deg, rgba(0,0,0,.42), rgba(0,0,0,.28));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .spiral{
      position:relative;
      border-top-left-radius:24px;
      border-bottom-left-radius:24px;
      border-right:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }

    .spiral::before{
      content:"";
      position:absolute;
      top:14px;
      bottom:14px;
      left:50%;
      width:10px;
      transform:translateX(-50%);
      border-radius:999px;
      background:
        radial-gradient(circle, rgba(255,255,255,.78) 0 2px, transparent 3px) center top / 10px 28px repeat-y;
      opacity:.95;
    }

    .content{
      min-width:0;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:20px 18px 20px 16px;
    }

    .content.switching{
      animation: regFadeSlide .28s ease;
    }

    @keyframes regFadeSlide{
      0%{
        opacity:.15;
        transform:translateX(10px);
      }
      100%{
        opacity:1;
        transform:translateX(0);
      }
    }

    .content h2{
      margin:0 0 18px;
      padding:8px 12px;
      font-size:21px;
      font-weight:950;
      color:#fff;
      line-height:1.15;
      border-radius:12px;
      background:var(--activeTitleBg);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .content p{
      margin:0 0 18px;
      line-height:1.72;
      color:rgba(255,255,255,.92);
      font-weight:750;
      white-space:pre-wrap;
    }

    .content ul{
      margin:0 0 18px 20px;
      padding:0;
    }

    .content li{
      margin:8px 0;
      line-height:1.55;
      color:rgba(255,255,255,.92);
      font-weight:750;
    }

    .tabs{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:8px;
      padding:12px 0 12px 0;
      margin-right:-18px;
    }

    .tab{
      writing-mode:vertical-rl;
      text-orientation:mixed;
      padding:14px 8px;
      min-height:78px;
      border-top-right-radius:14px;
      border-bottom-right-radius:14px;
      border-top-left-radius:10px;
      border-bottom-left-radius:10px;
      cursor:pointer;
      font-weight:950;
      font-size:13px;
      letter-spacing:.2px;
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-left:none;
      box-shadow:0 10px 24px rgba(0,0,0,.24);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      transition:transform .15s ease, filter .15s ease;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .tab:active{
      transform:translateX(1px);
    }

    .tab.active{
      transform:translateX(-10px);
      filter:brightness(1.08);
    }

    .tab[data-key="vehicules"]{
      background:linear-gradient(180deg, rgba(75,130,220,.42), rgba(75,130,220,.20));
    }
    .tab[data-key="vsav"]{
      background:linear-gradient(180deg, rgba(145,105,220,.42), rgba(145,105,220,.20));
    }
    .tab[data-key="centre"]{
      background:linear-gradient(180deg, rgba(215,125,60,.42), rgba(215,125,60,.20));
    }
    .tab[data-key="communication"]{
      background:linear-gradient(180deg, rgba(70,170,170,.42), rgba(70,170,170,.20));
    }
    .tab[data-key="gardes"]{
      background:linear-gradient(180deg, rgba(210,70,70,.42), rgba(210,70,70,.20));
    }
    .tab[data-key="collectivite"]{
      background:linear-gradient(180deg, rgba(90,170,105,.42), rgba(90,170,105,.20));
    }
    .tab[data-key="tenue"]{
      background:linear-gradient(180deg, rgba(210,170,60,.42), rgba(210,170,60,.20));
    }

    @media (max-width: 560px){
      .book{
        grid-template-columns:16px 1fr auto;
        min-height:66vh;
      }

      .content{
        padding:16px 14px 16px 14px;
      }

      .content h2{
        font-size:19px;
      }

      .tab{
        font-size:12px;
        min-height:70px;
        padding:12px 7px;
      }

      .tabs{
        margin-right:-12px;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">Règlement</div>
      <button class="btn" id="btnBack">Retour</button>
    </div>

    <div class="page">
      <div class="book">
        <div class="spiral"></div>

        <div class="content" id="regContent"></div>

        <div class="tabs">
          <div class="tab active" data-key="vehicules">Véhicules</div>
          <div class="tab" data-key="vsav">VSAV</div>
          <div class="tab" data-key="centre">Vie centre</div>
          <div class="tab" data-key="communication">Com / Manœuvres</div>
          <div class="tab" data-key="gardes">Gardes</div>
          <div class="tab" data-key="collectivite">Collectivité</div>
          <div class="tab" data-key="tenue">Tenue / Tabac</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TAB_COLORS = {
      vehicules: "rgba(75,130,220,.35)",
      vsav: "rgba(145,105,220,.35)",
      centre: "rgba(215,125,60,.35)",
      communication: "rgba(70,170,170,.35)",
      gardes: "rgba(210,70,70,.35)",
      collectivite: "rgba(90,170,105,.35)",
      tenue: "rgba(210,170,60,.35)"
    };

    const REGLEMENT_DATA = {
      vehicules: `
        <h2>Utilisation des véhicules</h2>
        <p>Les véhicules doivent être maintenus en permanence prêts à partir en intervention.

Après chaque intervention ou manœuvre, l’équipage veille à remettre le matériel en place, remplir le carnet de bord et vérifier le niveau de carburant.

Si la jauge est proche des 3/4, le complément doit être effectué. Si nécessaire, il est possible d’utiliser une autre station-service.

Si le véhicule est sale au retour d’intervention, il doit être nettoyé. En cas d’impossibilité immédiate, prévenir et revenir le lendemain pour effectuer le lavage.

En cas d’anomalie ou de dysfonctionnement, prévenir le responsable du pôle concerné.</p>
      `,

      vsav: `
        <h2>Inventaire et désinfection VSAV</h2>
        <p>Les personnels peuvent participer à la désinfection mensuelle du VSAV, organisée avec un référent.

L’inscription peut se faire via la page web du centre ou sur la feuille d’inscription disponible au centre.

Cette participation permet également de se remettre à jour sur l’emplacement du matériel dans le VSAV.

La prise de garde mensuelle est également un moment permettant de réaliser l’inventaire du véhicule et de maintenir la connaissance du matériel.

Les référents VSAV ont mis en place une page dédiée accessible via un QR code présent dans le VSAV, permettant d’accéder directement à la partie “Désinfection VSAV / Inventaire” de la page web du centre.</p>
      `,

      centre: `
        <h2>Investissement dans la vie du centre</h2>
        <p>Le bon fonctionnement du centre repose sur l’implication de chacun.</p>

        <ul>
          <li>L’encadrement ou l’accompagnement des JSP</li>
          <li>La préparation des manœuvres</li>
          <li>La prise de responsabilité dans un pôle</li>
          <li>La participation aux cérémonies officielles</li>
        </ul>

        <p>Ces engagements contribuent au bon fonctionnement du centre et au maintien du niveau opérationnel.</p>
      `,

      communication: `
        <h2>Communication / Manœuvres</h2>
        <p>La communication interne est essentielle au bon fonctionnement du centre.

Les personnels sont invités à consulter régulièrement les moyens de communication du centre et à répondre aux sondages et aux questions posées.

Il est recommandé de répondre dans les plus brefs délais, ou dans les délais demandés, aux sondages concernant les manœuvres, afin de permettre aux organisateurs de préparer au mieux les exercices.

Répondre aux sollicitations est également une marque de respect pour les personnes qui prennent du temps pour organiser les activités du centre.</p>

        <p>Les manœuvres sont indispensables au maintien des compétences opérationnelles.

Les personnels doivent arriver prêts au minimum dix minutes avant le début de la manœuvre, par respect pour les organisateurs.

En cas d’impossibilité de présence, il est demandé de prévenir le responsable de la manœuvre dans les meilleurs délais.

Lors des manœuvres, le matériel doit être remis correctement en place et reconditionné afin d’éviter toute mauvaise surprise lors d’une intervention.</p>
      `,

      gardes: `
        <h2>Gardes et gardes postées hors secteur / Prise de garde</h2>
        <p>Toute prise de garde hors secteur doit être signalée au chef de centre ou à ses adjoints.</p>

        <ul>
          <li>78 heures de disponibilité mensuelle : 1 garde</li>
          <li>108 heures de disponibilité mensuelle : 2 gardes</li>
          <li>Une troisième garde peut être accordée en cas d’investissement particulier dans la vie du centre (JSP, responsable de pôle, implication dans celui-ci)</li>
        </ul>

        <p>La prise de garde est organisée mensuellement.

Un responsable est désigné chaque mois afin d’organiser cette prise de garde avec les agents également désignés pour le mois.

Il veille à ce que les missions prévues soient réalisées au cours du mois.

Un onglet dédié sur la page web du centre a été créé afin de faciliter la gestion de cette prise de garde.

Il est demandé de l’utiliser pour le suivi des missions.

La propreté du centre est l’affaire de tous.</p>
      `,

      collectivite: `
        <h2>Vie en collectivité</h2>
        <p>Les sapeurs-pompiers ont vocation à aider les personnes, aussi bien les victimes que leurs collègues.

Il est attendu de chacun une attitude respectueuse, contribuant à maintenir une bonne ambiance au centre et lors des manœuvres.

Lors des retours d’intervention, chacun veille à respecter le voisinage.

Les espaces communs doivent être respectés : après utilisation de la cuisine ou du matériel (café, tasses, etc.), chacun range et nettoie ce qu’il a utilisé.

Les nouveaux arrivants doivent être accueillis et accompagnés afin de faciliter leur intégration.

Le centre doit rester un lieu où l’on vient avec plaisir, dans un esprit de camaraderie et de solidarité.</p>
      `,

      tenue: `
        <h2>Tenue et image du centre / Interdiction de fumer et vapoter</h2>
        <p>La tenue portée lors des manœuvres, cérémonies ou représentations doit être propre et conforme.

Chaque sapeur-pompier représente le centre de secours et le SDIS, que ce soit en intervention ou lors de déplacements en tenue.

Il est attendu de chacun un comportement respectueux et exemplaire vis-à-vis de la population.

Lors des cérémonies et événements officiels, une tenue soignée et une attitude appropriée sont demandées.

Le respect de l’uniforme et de l’image du centre contribue à la crédibilité et à la reconnaissance du service auprès de la population.</p>

        <p>Il est strictement interdit de fumer ou de vapoter dans les locaux du centre de secours, ainsi que dans les véhicules de service.

Cette règle s’applique à l’ensemble des personnels et des visiteurs.

Des espaces extérieurs peuvent être utilisés pour fumer, dans le respect des lieux et du voisinage.</p>
      `
    };

    const regContent = document.getElementById("regContent");
    const tabs = document.querySelectorAll(".tab");

    function renderReglement(key){
      document.documentElement.style.setProperty("--activeTitleBg", TAB_COLORS[key]);
      regContent.classList.remove("switching");
      void regContent.offsetWidth;
      regContent.innerHTML = REGLEMENT_DATA[key];
      regContent.classList.add("switching");
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        renderReglement(tab.dataset.key);
      });
    });

    renderReglement("vehicules");

    document.getElementById("btnBack").addEventListener("click", () => {
      location.replace("informations.html");
    });
  </script>
</body>
</html>
