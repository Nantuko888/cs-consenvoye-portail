<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Règlement — CS Consenvoye</title>

  <style>
    :root{
      --txt:#f4f4f4;
      --shadow:0 14px 34px rgba(0,0,0,.40);
      --headerColor1: rgba(212,106,0,.75);
      --headerColor2: rgba(185,88,0,.58);
      --activeTitleBg: rgba(75,130,220,.35);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.54), rgba(0,0,0,.58)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
    }

    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.66) 62%);
      z-index:-1;
    }

    .wrap{
      height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows:auto 1fr;
      gap:10px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:linear-gradient(180deg,var(--headerColor1),var(--headerColor2));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      min-height:46px;
    }

    .topbar .title{
      font-weight:950;
      letter-spacing:.8px;
      text-transform:uppercase;
      font-size:18px;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .btn{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      padding:9px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
    }

    .page{
      min-height:0;
      overflow:auto;
      padding-right:2px;
      padding-bottom:calc(env(safe-area-inset-bottom) + 18px);
    }

    .book{
      position:relative;
      display:grid;
      grid-template-columns:20px 1fr auto;
      min-height:72vh;
      border-radius:24px;
      overflow:visible;
      background:linear-gradient(180deg, rgba(0,0,0,.42), rgba(0,0,0,.28));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .spiral{
      position:relative;
      border-top-left-radius:24px;
      border-bottom-left-radius:24px;
      border-right:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }

    .spiral::before{
      content:"";
      position:absolute;
      top:14px;
      bottom:14px;
      left:50%;
      width:10px;
      transform:translateX(-50%);
      border-radius:999px;
      background:
        radial-gradient(circle, rgba(255,255,255,.78) 0 2px, transparent 3px) center top / 10px 28px repeat-y;
      opacity:.95;
    }

    .content{
      min-width:0;
      overflow:auto;
      padding:20px 18px 20px 16px;
    }

    .content h2{
      margin:0 0 18px;
      padding:8px 12px;
      font-size:21px;
      font-weight:950;
      color:#fff;
      line-height:1.15;
      border-radius:12px;
      background:var(--activeTitleBg);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .content p{
      margin:0 0 18px;
      line-height:1.72;
      color:rgba(255,255,255,.92);
      font-weight:750;
      white-space:pre-wrap;
    }

    .tabs{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:8px;
      padding:12px 0 12px 0;
      margin-right:-18px;
    }

    .tab{
      writing-mode:vertical-rl;
      text-orientation:mixed;
      padding:14px 8px;
      min-height:78px;
      border-top-right-radius:14px;
      border-bottom-right-radius:14px;
      border-top-left-radius:10px;
      border-bottom-left-radius:10px;
      cursor:pointer;
      font-weight:950;
      font-size:13px;
      letter-spacing:.2px;
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-left:none;
      box-shadow:0 10px 24px rgba(0,0,0,.24);
      backdrop-filter:blur(10px);
      transition:transform .15s ease, filter .15s ease;
      user-select:none;
    }

    .tab.active{
      transform:translateX(-10px);
      filter:brightness(1.08);
    }

    .status{
      padding:18px;
      font-weight:900;
      color:rgba(255,255,255,.9);
    }

    @media (max-width: 560px){
      .book{ grid-template-columns:16px 1fr auto; min-height:66vh; }
      .content{ padding:16px 14px 16px 14px; }
      .content h2{ font-size:19px; }
      .tab{ font-size:12px; min-height:70px; padding:12px 7px; }
      .tabs{ margin-right:-12px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">Règlement</div>
      <button class="btn" id="btnBack">Retour</button>
    </div>

    <div class="page">
      <div class="book">
        <div class="spiral"></div>
        <div class="content" id="regContent">
          <div class="status">Chargement...</div>
        </div>
        <div class="tabs" id="tabsWrap"></div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";

    const regContent = document.getElementById("regContent");
    const tabsWrap = document.getElementById("tabsWrap");
    let REGLEMENT_ITEMS = [];

    function jsonp(params){
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const url = new URL(SCRIPT_URL);

        window[callbackName] = function(data){
          cleanup();
          resolve(data);
        };

        function cleanup(){
          try { delete window[callbackName]; } catch(e){}
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.onerror = function(){
          cleanup();
          reject(new Error("Erreur de chargement"));
        };

        url.searchParams.set("callback", callbackName);
        url.searchParams.set("_ts", Date.now());

        Object.keys(params || {}).forEach(k => {
          url.searchParams.set(k, params[k]);
        });

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function escapeHtml(v){
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderContent(item){
      document.documentElement.style.setProperty("--activeTitleBg", item.color || "rgba(75,130,220,.35)");
      regContent.innerHTML = `
        <h2>${escapeHtml(item.label)}</h2>
        <p>${escapeHtml(item.contenu || "").replace(/\n/g, "<br>")}</p>
      `;
    }

    function renderTabs(items){
      tabsWrap.innerHTML = items.map((item, index) => `
        <div
          class="tab ${index === 0 ? "active" : ""}"
          data-key="${escapeHtml(item.key)}"
          style="background:linear-gradient(180deg, ${item.color || "rgba(75,130,220,.42)"}, rgba(255,255,255,.10));"
        >
          ${escapeHtml(item.label)}
        </div>
      `).join("");

      tabsWrap.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          tabsWrap.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          const item = REGLEMENT_ITEMS.find(x => x.key === tab.dataset.key);
          if (item) renderContent(item);
        });
      });
    }

    async function loadReglement(){
      try{
        const r = await jsonp({ view: "reglement_tabs" });

        if(!r || !r.ok){
          regContent.innerHTML = `<div class="status">Erreur de chargement du règlement.</div>`;
          return;
        }

        REGLEMENT_ITEMS = Array.isArray(r.items) ? r.items : [];

        if(!REGLEMENT_ITEMS.length){
          regContent.innerHTML = `<div class="status">Aucun onglet de règlement actif.</div>`;
          tabsWrap.innerHTML = "";
          return;
        }

        renderTabs(REGLEMENT_ITEMS);
        renderContent(REGLEMENT_ITEMS[0]);

      }catch(err){
        regContent.innerHTML = `<div class="status">Erreur de chargement.</div>`;
      }
    }

    document.getElementById("btnBack").addEventListener("click", () => {
      location.replace("informations.html");
    });

    loadReglement();
  </script>
</body>
</html>
