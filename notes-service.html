<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Notes de service — CS Consenvoye</title>
  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --shadow:0 14px 34px rgba(0,0,0,.40);
      --stroke:rgba(255,255,255,.10);
      --headerColor1: rgba(212,106,0,.75);
      --headerColor2: rgba(185,88,0,.58);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }
    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.56)),
        url("background.png") center top/cover no-repeat;
      z-index:-1;
    }

    .page{
      min-height:100dvh;
      padding:
        calc(env(safe-area-inset-top) + 12px)
        14px
        calc(env(safe-area-inset-bottom) + 14px);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-radius:20px;
      background:linear-gradient(180deg,var(--headerColor1),var(--headerColor2));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .title{
      margin:0;
      font-size:18px;
      font-weight:950;
      letter-spacing:.5px;
      text-transform:uppercase;
    }
    .backBtn{
      border:none;
      background:rgba(0,0,0,.18);
      color:#fff;
      padding:10px 14px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .card{
      margin-top:4px;
      padding:18px;
      border-radius:24px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .cardTitle{
      margin:0 0 8px 0;
      font-size:22px;
      font-weight:950;
      line-height:1.05;
    }
    .cardText{
      margin:0;
      color:var(--muted);
      font-size:15px;
      font-weight:700;
      line-height:1.35;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <main class="page">
    <div class="topbar">
      <h1 class="title">Notes de service</h1>
      <button class="backBtn" onclick="location.href='documents.html'">Retour</button>
    </div>

    <section class="card">
      <h2 class="cardTitle">Espace en préparation</h2>
      <p class="cardText">
        Cette page est prête. On branchera ensuite les notes de service depuis Drive.
      </p>
    </section>
  </main>
</body>
</html>
