<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Notes de service — CS Consenvoye</title>
  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --shadow: 0 14px 34px rgba(0,0,0,.40);
      --radius: 22px;
      --stroke: rgba(255,255,255,.10);
      --orange:#d46a00;
      --orange2:#b95800;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
    }
    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.52)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
      transform: translateZ(0);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.64) 62%);
      z-index:-1;
    }

    .wrap{
      height:100vh;
      max-width:980px;
      margin:0 auto;
      padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows:auto 1fr;
      gap:10px;
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.58));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      min-height:46px;
    }
    .topbar .title{
      font-weight:950; letter-spacing:.8px; text-transform:uppercase;
      font-size:18px; margin:0; white-space:nowrap;
    }
    .btn{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color:var(--txt);
      padding: 9px 12px;
      border-radius: 14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .card{
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(0,0,0,.46), rgba(0,0,0,.30));
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
      padding: 18px 16px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap: 8px;
      min-height: 0;
    }
    .cardTitle{
      margin:0;
      font-size:22px;
      font-weight:950;
      line-height:1.05;
    }
    .cardSub{
      margin:0;
      color:var(--muted);
      font-size:15px;
      font-weight:800;
      line-height:1.3;
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <h1 class="title">NOTES DE SERVICE</h1>
      <button class="btn" id="btnBack">Retour</button>
    </div>

    <section class="card">
      <h2 class="cardTitle">Page prête</h2>
      <p class="cardSub">On branchera ensuite cette partie sur Drive pour afficher uniquement les notes de service.</p>
    </section>
  </div>

<script>
  document.getElementById("btnBack").addEventListener("click", ()=>location.href="documents.html");
</script>
</body>
</html>
