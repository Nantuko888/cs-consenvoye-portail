<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Ticket Carburant — CS Consenvoye</title>

  <style>
    :root{
      --bg:#000;
      --txt:#fff;

      --orange:#d46a00;
      --orange2:#b95800;

      --stroke: rgba(255,255,255,.12);
      --shadow: 0 14px 34px rgba(0,0,0,.40);
      --radius: 18px;

      --card: rgba(0,0,0,.50);

      --yellow:#fff200;
      --muted: rgba(255,255,255,.78);

      --ok:#25c46a;
      --bad:#ff3b30;

      --vsav:#2f79ff; /* bleu */
      --ccr:#ff3b30; /* rouge */
      --vtul:#25c46a; /* vert */
      --vtp:#f6a000; /* orange */

      --appH: 100dvh;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: var(--bg);
      color: var(--txt);
      overflow:hidden;
      overscroll-behavior:none;
      height: var(--appH);
    }

    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.72) 62%);
      z-index:-1;
    }

    .wrap{
      height: var(--appH);
      width:min(980px, 100%);
      margin:0 auto;
      padding:
        calc(env(safe-area-inset-top) + 10px)
        12px
        calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
      overflow:hidden;
      min-height:0;
    }

    /* ===== Topbar ===== */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.55));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      min-height: 46px;
    }
    .title{
      margin:0;
      font-weight:950;
      letter-spacing:.6px;
      text-transform: uppercase;
      font-size: clamp(15px, 2.2vw, 18px);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topRight{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 220px;
      justify-content:flex-end;
    }

    .adminPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: var(--yellow);
      font-weight: 950;
      font-size: 12px;
      letter-spacing:.2px;
      visibility: hidden; /* IMPORTANT : évite le décalage */
    }
    .adminPill.show{ visibility: visible; }

    .btn{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color:var(--txt);
      padding: 9px 12px;
      border-radius: 14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      white-space:nowrap;
    }
    .btn:active{ transform: translateY(1px); }

    /* ===== Tabs ===== */
    .tabs{ display:flex; gap:10px; }
    .tab{
      flex:1;
      padding: 10px 12px;
      border-radius: var(--radius);
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.28);
      box-shadow: var(--shadow);
      font-weight:950;
      letter-spacing:.3px;
      cursor:pointer;
      color: rgba(255,255,255,.86);
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active{
      background: linear-gradient(180deg, rgba(212,106,0,.62), rgba(185,88,0,.45));
      color:#fff;
      border-color: rgba(255,255,255,.16);
    }

    /* ===== Card ===== */
    .card{
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.32));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .banner{
      color:#000;
      font-weight: 950;
      text-align:center;
      padding: 10px 10px;
      border-bottom: 2px solid rgba(0,0,0,.25);
      letter-spacing:.8px;
      font-size: clamp(16px, 2.6vw, 20px);
      background: var(--yellow);
    }

    .content{
      padding: 12px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    /* ===== Vehicle “cell” ===== */
    .vehicleCell{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      padding: 12px;
      min-height: 52px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 950;
      letter-spacing:.5px;
      text-transform: uppercase;
      user-select:none;
    }
    .vehicleCell.placeholder{
      color: rgba(255,255,255,.82);
    }

    /* ===== Vehicle buttons ===== */
    .vehGrid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .vehBtn{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
      padding: 12px 10px;
      font-weight: 950;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height: 54px;
      color:#fff;
      text-transform: uppercase;
      letter-spacing:.6px;
    }
    .vehBtn:active{ transform: translateY(1px); }
    .vehBtn.sel{
      outline: 3px solid rgba(255,255,255,.95);
      outline-offset: 2px;
    }

    /* ===== Photo area ===== */
    .photoActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .primaryBtn{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.55));
      color:#fff;
      font-weight: 950;
      padding: 12px 14px;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      flex: 1 1 170px;
      min-height: 48px;
    }
    .primaryBtn:active{ transform: translateY(1px); }
    .primaryBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .ghostBtn{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.22);
      color:#fff;
      font-weight: 950;
      padding: 12px 14px;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      flex: 1 1 140px;
      min-height: 48px;
    }
    .ghostBtn:active{ transform: translateY(1px); }
    .ghostBtn:disabled{ opacity:.55; cursor:not-allowed; }

    .previewWrap{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      padding: 10px;
      display:none;
      flex-direction:column;
      gap:10px;
    }
    .previewWrap.show{ display:flex; }

    .previewImg{
      width:100%;
      max-height: 44vh;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(0,0,0,.25);
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
    }

    .hint{
      font-weight: 850;
      color: var(--muted);
      font-size: 13px;
      line-height:1.25;
    }

    /* ===== History (accordion by month) ===== */
    .monthBlock{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }

    .monthHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 12px 12px;
      cursor:pointer;
      user-select:none;
      background: rgba(37,196,106,.18); /* vert translucide (à ta demande) */
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .monthLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .chev{
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 950;
    }
    .monthName{
      font-weight: 950;
      letter-spacing:.4px;
      text-transform: uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .count{
      font-weight: 950;
      color: rgba(255,255,255,.95);
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      padding: 6px 10px;
      border-radius: 999px;
      white-space:nowrap;
    }

    .monthBody{
      display:none;
      padding: 10px;
      gap:10px;
    }
    .monthBody.open{
      display:flex;
      flex-direction:column;
    }

    .histItem{
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      padding: 10px 10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .histTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .histMain{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .vehChip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width: 70px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      letter-spacing:.4px;
      text-transform: uppercase;
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
      flex:0 0 auto;
    }
    .meta{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .metaLine1{
      font-weight: 950;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .metaLine2{
      font-weight: 850;
      color: var(--muted);
      font-size: 12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .histBtns{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .iconBtn{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: var(--txt);
      padding: 8px 10px;
      border-radius: 14px;
      font-weight: 950;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      min-width: 42px;
    }
    .iconBtn:active{ transform: translateY(1px); }
    .iconBtn:disabled{ opacity:.55; cursor:not-allowed; }

    /* ===== Toast ===== */
    .toast{
      position:fixed;
      left:12px; right:12px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      max-width: 980px;
      margin: 0 auto;
      z-index: 9999;
      display:none;
      pointer-events:none;
    }
    .toast.show{ display:block; }
    .toast .pill{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.62);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      color: rgba(255,255,255,.92);
      font-weight:900;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* ===== Modal preview ===== */
    .modal{
      position:fixed; inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 99999;
    }
    .modal.show{ display:flex; }
    .backdrop{
      position:absolute; inset:0;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(6px);
    }
    .box{
      position:relative;
      width:min(560px, 100%);
      border-radius: 18px;
      background: rgba(10,10,10,.92);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 22px 60px rgba(0,0,0,.65);
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .boxHead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .boxTitle{
      font-weight: 950;
      font-size: 15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    @media (max-width:360px){
      .vehGrid{ grid-template-columns: 1fr; }
      .topRight{ min-width: 200px; }
      .adminPill{ font-size: 11px; }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <h1 class="title">Ticket Carburant</h1>

      <div class="topRight">
        <span class="adminPill" id="adminPill">MODE ADMIN</span>
        <button class="btn" id="btnLock" title="Mode admin" aria-pressed="false">🔒</button>
        <button class="btn" id="btnBack">Retour</button>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Ticket Carburant onglets">
      <button class="tab active" id="tabPhoto" role="tab" aria-selected="true">Photo</button>
      <button class="tab" id="tabHist" role="tab" aria-selected="false">Historique</button>
    </div>

    <!-- PANEL PHOTO -->
    <section class="card" id="panelPhoto" role="tabpanel" aria-labelledby="tabPhoto">
      <div class="banner">TICKET CARBURANT</div>
      <div class="content">

        <div class="vehicleCell placeholder" id="vehicleCell">Sélectionner le véhicule</div>

        <div class="vehGrid" id="vehGrid">
          <button class="vehBtn" data-veh="VSAV" style="background:var(--vsav)">VSAV</button>
          <button class="vehBtn" data-veh="CCR" style="background:var(--ccr)">CCR</button>
          <button class="vehBtn" data-veh="VTUL" style="background:var(--vtul)">VTUL</button>
          <button class="vehBtn" data-veh="VTP" style="background:var(--vtp)">VTP</button>
        </div>

        <div class="photoActions">
          <button class="primaryBtn" id="btnTakePhoto">📷 Prendre une photo</button>
          <button class="ghostBtn" id="btnClear" title="Annuler la sélection">Réinitialiser</button>
        </div>

        <div class="previewWrap" id="previewWrap">
          <div class="hint" id="previewHint">Aperçu avant envoi</div>
          <img class="previewImg" id="previewImg" alt="Aperçu photo" />
          <div class="photoActions">
            <button class="ghostBtn" id="btnRetake">Reprendre</button>
            <button class="primaryBtn" id="btnSend">Envoyer</button>
          </div>
        </div>

        <div class="hint">
          Pour l’instant : <b>envoi simulé</b> (on branchera Drive + Apps Script après).
        </div>

        <!-- input caméra (caché) -->
        <input id="fileInput" type="file" accept="image/*" capture="environment" style="display:none" />
      </div>
    </section>

    <!-- PANEL HISTORY -->
    <section class="card" id="panelHist" role="tabpanel" aria-labelledby="tabHist" style="display:none;">
      <div class="banner">HISTORIQUE</div>
      <div class="content">
        <div class="hint">
          Affichage par mois (replié). Clique un bandeau pour dérouler.
        </div>
        <div id="histRoot"></div>
      </div>
    </section>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="pill" id="toastTxt">—</div>
  </div>

  <!-- Modal photo -->
  <div class="modal" id="modal">
    <div class="backdrop" id="modalClose"></div>
    <div class="box">
      <div class="boxHead">
        <div class="boxTitle" id="modalTitle">Photo</div>
        <button class="btn" id="modalBtnClose">OK</button>
      </div>
      <img class="previewImg" id="modalImg" alt="Photo" />
      <div class="photoActions" id="modalActions" style="display:none;">
        <button class="ghostBtn" id="btnDownload">Télécharger</button>
        <button class="primaryBtn" id="btnShare">Partager</button>
      </div>
      <div class="hint" id="modalHint"></div>
    </div>
  </div>

  <script>
    /* ===== app height Android ===== */
    function setAppHeight(){
      document.documentElement.style.setProperty("--appH", window.innerHeight + "px");
    }
    window.addEventListener("resize", setAppHeight);
    window.addEventListener("orientationchange", setAppHeight);
    setAppHeight();

    /* ===== constants / storage ===== */
    const LS_EMAIL = "cs_portail_email_v1";
    const LS_NAME = "cs_portail_name_v1";
    const LS_ADMIN = "cs_ticket_admin_v1";
    const LS_DATA = "cs_ticket_history_v1";

    const VEH_COLORS = {
      VSAV: getComputedStyle(document.documentElement).getPropertyValue("--vsav").trim(),
      CCR: getComputedStyle(document.documentElement).getPropertyValue("--ccr").trim(),
      VTUL: getComputedStyle(document.documentElement).getPropertyValue("--vtul").trim(),
      VTP: getComputedStyle(document.documentElement).getPropertyValue("--vtp").trim()
    };

    /* ===== helpers ===== */
    const $ = (id)=>document.getElementById(id);

    function toast(msg){
      const t = $("toast");
      $("toastTxt").textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(()=>t.classList.remove("show"), 2000);
    }

    function myEmail(){ return (localStorage.getItem(LS_EMAIL)||"").trim().toLowerCase(); }
    function myName(){
      const n = (localStorage.getItem(LS_NAME)||"").trim();
      if(n) return n;
      const e = myEmail();
      if(!e) return "—";
      const base = e.split("@")[0] || "";
      const first = base.split(/[._-]/)[0] || base;
      return first ? (first.charAt(0).toUpperCase() + first.slice(1)) : "—";
    }

    function fmtDateShort(d){
      // dd/mm/yy hh:mm (court)
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yy = String(d.getFullYear()).slice(-2);
      const hh = String(d.getHours()).padStart(2,"0");
      const mi = String(d.getMinutes()).padStart(2,"0");
      return `${dd}/${mm}/${yy} ${hh}:${mi}`;
    }

    function monthKey(d){
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      return `${y}-${m}`; // ex: 2026-03
    }
    function monthLabel(key){
      const [y,m] = key.split("-");
      const names = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
      return `${names[Number(m)-1]} ${y}`;
    }

    function loadHistory(){
      try{
        const raw = localStorage.getItem(LS_DATA);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      }catch(e){
        return [];
      }
    }
    function saveHistory(arr){
      try{ localStorage.setItem(LS_DATA, JSON.stringify(arr)); }catch(e){}
    }

    /* ===== tabs ===== */
    const tabPhoto = $("tabPhoto");
    const tabHist = $("tabHist");
    const panelPhoto = $("panelPhoto");
    const panelHist = $("panelHist");

    function setTab(which){
      const photo = (which === "photo");
      tabPhoto.classList.toggle("active", photo);
      tabHist.classList.toggle("active", !photo);
      tabPhoto.setAttribute("aria-selected", photo ? "true" : "false");
      tabHist.setAttribute("aria-selected", photo ? "false" : "true");
      panelPhoto.style.display = photo ? "flex" : "none";
      panelHist.style.display = photo ? "none" : "flex";
      if(!photo) renderHistory();
    }
    tabPhoto.addEventListener("click", ()=>setTab("photo"));
    tabHist.addEventListener("click", ()=>setTab("hist"));

    /* ===== back ===== */
    $("btnBack").addEventListener("click", ()=>{
      location.href = "index.html?portal=1";
    });

    /* ===== admin toggle ===== */
    let IS_ADMIN = (localStorage.getItem(LS_ADMIN) === "1");

    function applyAdminUI(){
      $("adminPill").classList.toggle("show", IS_ADMIN);
      $("btnLock").textContent = IS_ADMIN ? "🔓" : "🔒";
      $("btnLock").setAttribute("aria-pressed", IS_ADMIN ? "true" : "false");
    }
    $("btnLock").addEventListener("click", ()=>{
      IS_ADMIN = !IS_ADMIN;
      localStorage.setItem(LS_ADMIN, IS_ADMIN ? "1" : "0");
      applyAdminUI();
      // si la modal est ouverte, on ajuste les actions visibles
      updateModalActions();
    });
    applyAdminUI();

    /* ===== vehicle selection ===== */
    let selectedVeh = "";
    let selectedDataUrl = ""; // preview image (base64)

    const vehicleCell = $("vehicleCell");
    const vehBtns = Array.from(document.querySelectorAll(".vehBtn"));

    function setVehicle(v){
      selectedVeh = v;

      vehBtns.forEach(b=>{
        b.classList.toggle("sel", b.dataset.veh === v);
      });

      if(!v){
        vehicleCell.classList.add("placeholder");
        vehicleCell.style.background = "rgba(0,0,0,.22)";
        vehicleCell.textContent = "Sélectionner le véhicule";
        return;
      }

      vehicleCell.classList.remove("placeholder");
      vehicleCell.style.background = VEH_COLORS[v] || "rgba(255,255,255,.22)";
      vehicleCell.textContent = v;
    }

    vehBtns.forEach(b=>{
      b.addEventListener("click", ()=> setVehicle(b.dataset.veh));
    });

    $("btnClear").addEventListener("click", ()=>{
      setVehicle("");
      clearPreview();
      toast("Réinitialisé");
    });

    /* ===== photo capture ===== */
    const fileInput = $("fileInput");
    const btnTakePhoto = $("btnTakePhoto");
    const previewWrap = $("previewWrap");
    const previewImg = $("previewImg");

    function clearPreview(){
      selectedDataUrl = "";
      previewImg.src = "";
      previewWrap.classList.remove("show");
    }

    function requireVehicle(){
      if(!selectedVeh){
        toast("Choisis d’abord un véhicule");
        return false;
      }
      return true;
    }

    btnTakePhoto.addEventListener("click", ()=>{
      if(!requireVehicle()) return;
      fileInput.value = "";
      fileInput.click();
    });

    fileInput.addEventListener("change", async ()=>{
      const f = fileInput.files && fileInput.files[0];
      if(!f) return;

      // Preview local
      const url = await readAsDataURL(f);
      selectedDataUrl = url;
      previewImg.src = url;
      previewWrap.classList.add("show");
      toast("Aperçu prêt");
    });

    $("btnRetake").addEventListener("click", ()=>{
      if(!requireVehicle()) return;
      fileInput.value = "";
      fileInput.click(); // Reprendre = relancer la caméra
    });

    $("btnSend").addEventListener("click", ()=>{
      if(!selectedVeh){ toast("Sélectionne un véhicule"); return; }
      if(!selectedDataUrl){ toast("Aucune photo"); return; }

      // Simulation : on stocke dans localStorage pour l’historique
      const now = new Date();
      const item = {
        id: "loc_" + Math.random().toString(36).slice(2) + "_" + Date.now(),
        createdAt: now.toISOString(),
        veh: selectedVeh,
        vehColor: VEH_COLORS[selectedVeh] || "",
        agentName: myName(),
        dataUrl: selectedDataUrl
      };

      const list = loadHistory();
      list.push(item); // ordre ancien -> récent
      saveHistory(list);

      clearPreview();
      toast("Envoyé ✔ (simulation)");
    });

    function readAsDataURL(file){
      return new Promise((resolve, reject)=>{
        const r = new FileReader();
        r.onload = ()=> resolve(String(r.result||""));
        r.onerror = ()=> reject(new Error("Lecture impossible"));
        r.readAsDataURL(file);
      });
    }

    /* ===== history render ===== */
    function groupByMonth(items){
      const map = new Map();
      for(const it of items){
        const d = new Date(it.createdAt);
        const key = monthKey(d);
        if(!map.has(key)) map.set(key, []);
        map.get(key).push(it);
      }
      // tri mois croissant
      const keys = Array.from(map.keys()).sort();
      return keys.map(k => ({ key:k, items: map.get(k) }));
    }

    function renderHistory(){
      const root = $("histRoot");
      const items = loadHistory();

      root.innerHTML = "";
      if(!items.length){
        const empty = document.createElement("div");
        empty.className = "monthBlock";
        empty.innerHTML = `
          <div class="monthHeader" style="cursor:default;">
            <div class="monthLeft">
              <div class="chev">•</div>
              <div class="monthName">Aucun envoi pour le moment</div>
            </div>
            <div class="count">0</div>
          </div>
        `;
        root.appendChild(empty);
        return;
      }

      const groups = groupByMonth(items);

      for(const g of groups){
        const block = document.createElement("div");
        block.className = "monthBlock";

        const header = document.createElement("div");
        header.className = "monthHeader";
        header.innerHTML = `
          <div class="monthLeft">
            <div class="chev">▾</div>
            <div class="monthName">${escapeHtml(monthLabel(g.key))}</div>
          </div>
          <div class="count">${g.items.length}</div>
        `;

        const body = document.createElement("div");
        body.className = "monthBody"; // replié par défaut

        // contenu items
        for(const it of g.items){
          const d = new Date(it.createdAt);
          const row = document.createElement("div");
          row.className = "histItem";

          const veh = String(it.veh||"").trim();
          const col = String(it.vehColor||"").trim() || "rgba(255,255,255,.25)";
          const agent = String(it.agentName||"—").trim() || "—";

          row.innerHTML = `
            <div class="histTop">
              <div class="histMain">
                <div class="vehChip" style="background:${escapeHtml(col)}">${escapeHtml(veh || "—")}</div>
                <div class="meta">
                  <div class="metaLine1">${escapeHtml(agent)}</div>
                  <div class="metaLine2">${escapeHtml(fmtDateShort(d))}</div>
                </div>
              </div>

              <div class="histBtns">
                <button class="iconBtn" data-act="view" title="Voir">📷</button>
                <button class="iconBtn" data-act="download" title="Télécharger" style="display:none;">⬇️</button>
                <button class="iconBtn" data-act="share" title="Partager" style="display:none;">📤</button>
              </div>
            </div>
          `;

          // actions
          const btnView = row.querySelector('[data-act="view"]');
          const btnDl = row.querySelector('[data-act="download"]');
          const btnSh = row.querySelector('[data-act="share"]');

          // admin only
          btnDl.style.display = IS_ADMIN ? "inline-flex" : "none";
          btnSh.style.display = IS_ADMIN ? "inline-flex" : "none";

          btnView.addEventListener("click", ()=> openPhotoModal(it));

          btnDl.addEventListener("click", ()=>{
            if(!IS_ADMIN) return;
            downloadDataUrl(it.dataUrl, `ticket_${veh}_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.jpg`);
          });

          btnSh.addEventListener("click", async ()=>{
            if(!IS_ADMIN) return;
            await shareDataUrl(it.dataUrl, `Ticket Carburant — ${veh}`, `${agent} — ${fmtDateShort(d)}`);
          });

          body.appendChild(row);
        }

        let open = false;
        header.addEventListener("click", ()=>{
          open = !open;
          body.classList.toggle("open", open);
          header.querySelector(".chev").textContent = open ? "▴" : "▾";
        });

        block.appendChild(header);
        block.appendChild(body);
        root.appendChild(block);
      }
    }

    function escapeHtml(s){
      return (s==null ? "" : String(s))
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function downloadDataUrl(dataUrl, filename){
      try{
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = filename || "ticket.jpg";
        document.body.appendChild(a);
        a.click();
        a.remove();
        toast("Téléchargement…");
      }catch(e){
        toast("Téléchargement impossible");
      }
    }

    async function shareDataUrl(dataUrl, title, text){
      // Web Share API (mobile)
      try{
        if(!navigator.share){
          toast("Partage non dispo ici");
          return;
        }
        const file = dataUrlToFile(dataUrl, "ticket.jpg");
        const data = { title, text };
        if(file && navigator.canShare && navigator.canShare({ files:[file] })){
          data.files = [file];
        }
        await navigator.share(data);
      }catch(e){
        toast("Partage annulé / impossible");
      }
    }

    function dataUrlToFile(dataUrl, filename){
      try{
        const arr = dataUrl.split(",");
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8 = new Uint8Array(n);
        while(n--) u8[n] = bstr.charCodeAt(n);
        return new File([u8], filename, { type: mime });
      }catch(e){
        return null;
      }
    }

    /* ===== modal photo ===== */
    const modal = $("modal");
    const modalImg = $("modalImg");
    const modalTitle = $("modalTitle");
    const modalHint = $("modalHint");
    const modalActions = $("modalActions");

    $("modalClose").addEventListener("click", closeModal);
    $("modalBtnClose").addEventListener("click", closeModal);

    function updateModalActions(){
      modalActions.style.display = IS_ADMIN ? "flex" : "none";
    }

    function openPhotoModal(item){
      const d = new Date(item.createdAt);
      modalTitle.textContent = `Photo — ${item.veh || "—"}`;
      modalImg.src = item.dataUrl || "";
      modalHint.textContent = `${item.agentName || "—"} — ${fmtDateShort(d)}`;
      updateModalActions();

      // bind buttons (admin only)
      $("btnDownload").onclick = ()=>{
        if(!IS_ADMIN) return;
        downloadDataUrl(item.dataUrl, `ticket_${item.veh || "veh"}_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.jpg`);
      };
      $("btnShare").onclick = async ()=>{
        if(!IS_ADMIN) return;
        await shareDataUrl(item.dataUrl, `Ticket Carburant — ${item.veh || ""}`, `${item.agentName || ""} — ${fmtDateShort(d)}`);
      };

      modal.classList.add("show");
    }
    function closeModal(){
      modal.classList.remove("show");
      modalImg.src = "";
    }

    /* ===== boot ===== */
    // set default
    setVehicle("");

    // si pas de name/email, on laisse (comme tes autres pages : c’est index qui remplit)
    // mais on évite l’email affiché : on dérive un prénom si besoin
  </script>
</body>
</html>
