<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ticket carburant — CS Consenvoye</title>

  <style>
    :root{
      --bg:#0f0f12;
      --panel:#16161b;
      --card:#1d1e25;
      --text:#f2f2f4;
      --muted:#a8a9b3;

      /* Couleur bandeau (comme tes autres pages) */
      --orange:#d97a1f;
      --orange2:#b86416;

      --shadow: 0 10px 28px rgba(0,0,0,.45);
      --radius: 18px;

      /* Véhicules (translucide) */
      --vsav: rgba( 24,120,255,.32);
      --ccr : rgba(255, 60, 60,.32);
      --vtul: rgba( 0,190,110,.32);
      --vtp : rgba(255,160, 0,.32);

      --vsavSolid: rgb( 24,120,255);
      --ccrSolid : rgb(255, 60, 60);
      --vtulSolid: rgb( 0,190,110);
      --vtpSolid : rgb(255,160, 0);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, rgba(255,140,0,.18), transparent 60%),
                  radial-gradient(900px 600px at 20% 10%, rgba(30,144,255,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 12px 28px;
    }

    /* Bandeau haut */
    .topbar{
      background: linear-gradient(180deg, var(--orange), var(--orange2));
      border-radius: 18px;
      padding: 10px 10px;
      box-shadow: var(--shadow);
      display:flex;
      align-items:center;
      gap:10px;
    }
    .titleBlock{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .title{
      font-weight: 900;
      letter-spacing:.6px;
      text-transform: uppercase;
      font-size: 15px;
      line-height: 1.05;
      white-space: normal; /* autorise 2 lignes */
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .subtitle{
      font-size: 12px;
      opacity:.92;
      color: rgba(255,255,255,.92);
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap: wrap;
    }
    .pill{
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.18);
      padding: 4px 8px;
      border-radius: 999px;
      font-size:12px;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .btnIcon{
      border:none;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.18);
      color: white;
      border-radius: 12px;
      padding: 8px 10px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .btnIcon:active{ transform: translateY(1px); }

    .adminBadge{
      display:none;
      background: rgba(255,235,59,.18);
      border: 1px solid rgba(255,235,59,.55);
      color: #ffe96a;
      padding: 6px 10px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 12px;
      white-space:nowrap;
    }
    .adminOn .adminBadge{ display:inline-flex; }

    /* Tabs */
    .tabs{
      display:flex;
      gap:10px;
      margin-top: 12px;
    }
    .tab{
      flex:1;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 800;
      letter-spacing:.3px;
      cursor:pointer;
      text-align:center;
      color: rgba(255,255,255,.9);
    }
    .tab.active{
      background: rgba(0,0,0,.22);
      border-color: rgba(255,255,255,.22);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);
    }

    /* Cards */
    .card{
      margin-top: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHead{
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(0,0,0,.18);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .cardHead h2{
      margin:0;
      font-size: 14px;
      letter-spacing:.5px;
      text-transform:uppercase;
    }
    .cardBody{
      padding: 14px;
    }

    /* Sélection véhicule (cellule) */
    .vehCell{
      width:100%;
      border-radius: 16px;
      padding: 14px 12px;
      text-align:center;
      font-weight: 900;
      letter-spacing:.6px;
      text-transform: uppercase;
      background: rgba(255,255,255,.06);
      border: 1px dashed rgba(255,255,255,.22);
      color: rgba(255,255,255,.88);
      margin-bottom: 12px;
      user-select:none;
    }
    .vehCell .hint{
      display:block;
      margin-top:6px;
      font-weight: 600;
      letter-spacing: 0;
      text-transform:none;
      color: rgba(255,255,255,.7);
      font-size: 12px;
    }

    /* Boutons véhicules (plus petits + discrets) */
    .vehGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .vehBtn{
      border:none;
      border-radius: 14px;
      padding: 10px 10px;
      font-weight: 900;
      letter-spacing:.7px;
      text-transform: uppercase;
      cursor:pointer;
      color: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
    }
    .vehBtn:active{ transform: translateY(1px); }
    .vehBtn.selected{
      outline: 2px solid rgba(255,255,255,.32);
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
    }

    .vehBtn.vsav{ background: var(--vsav); }
    .vehBtn.ccr { background: var(--ccr); }
    .vehBtn.vtul{ background: var(--vtul); }
    .vehBtn.vtp { background: var(--vtp); }

    /* Actions */
    .actions{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top: 6px;
    }
    .btn{
      border:none;
      border-radius: 14px;
      padding: 12px 12px;
      font-weight: 900;
      cursor:pointer;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.92);
    }
    .btn.primary{
      background: rgba(217,122,31,.28);
      border-color: rgba(217,122,31,.55);
    }
    .btn.danger{
      background: rgba(255,70,70,.18);
      border-color: rgba(255,70,70,.35);
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    /* Preview photo */
    .preview{
      margin-top:12px;
      display:none;
      gap:10px;
      flex-direction:column;
    }
    .preview img{
      width:100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
    }
    .preview .row{
      display:flex;
      gap:10px;
    }
    .mini{
      flex:1;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.08);
      font-weight: 900;
      cursor:pointer;
      color: rgba(255,255,255,.92);
    }

    /* Historique (placeholder UI) */
    .month{
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      overflow:hidden;
      margin-bottom: 10px;
      background: rgba(60, 200, 120, .10); /* un peu vert translucide */
    }
    .monthHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 12px 12px;
      cursor:pointer;
      user-select:none;
      background: rgba(0,0,0,.12);
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-weight: 900;
    }
    .monthHead .count{
      opacity:.9;
      font-weight: 800;
      font-size: 12px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.10);
      padding: 4px 8px;
      border-radius: 999px;
    }
    .monthBody{
      display:none;
      padding: 10px 12px 12px;
    }

    .hItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      margin-top: 8px;
    }
    .hLeft{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .hMeta{
      font-size: 12px;
      color: rgba(255,255,255,.78);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hVeh{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .dot{
      width:10px; height:10px;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,.25);
      flex: 0 0 auto;
    }
    .photoIcon{
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.08);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
    }

    /* Toast */
    .toast{
      position: fixed;
      left:50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,255,255,.12);
      padding: 10px 12px;
      border-radius: 14px;
      color: white;
      display:none;
      max-width: 92vw;
      text-align:center;
      box-shadow: var(--shadow);
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div class="wrap" id="root">

    <!-- Bandeau -->
    <div class="topbar" id="topbar">
      <div class="titleBlock">
        <div class="title">TICKET CARBURANT</div>
        <div class="subtitle">
          <span class="pill" id="whoPill">👤 <span id="whoName">Agent</span></span>
          <span class="adminBadge" id="adminBadge">MODE ADMIN</span>
        </div>
      </div>

      <button class="btnIcon" id="btnAdmin" title="Basculer mode admin">🔒</button>
      <button class="btnIcon" id="btnBack" title="Retour">↩ Retour</button>
    </div>

    <!-- Onglets -->
    <div class="tabs">
      <button class="tab active" id="tabTicket">Ticket</button>
      <button class="tab" id="tabHist">Historique</button>
    </div>

    <!-- Vue Ticket -->
    <div class="card" id="viewTicket">
      <div class="cardHead">
        <h2>Prise de photo</h2>
        <span style="font-size:12px;color:rgba(255,255,255,.75)">Pompe carburant</span>
      </div>

      <div class="cardBody">
        <!-- Cellule véhicule -->
        <div class="vehCell" id="vehCell">
          Sélectionner le véhicule
          <span class="hint">Choisis un véhicule ci-dessous</span>
        </div>

        <!-- Boutons véhicules -->
        <div class="vehGrid">
          <button class="vehBtn vsav" data-veh="VSAV">VSAV</button>
          <button class="vehBtn ccr" data-veh="CCR">CCR</button>
          <button class="vehBtn vtul" data-veh="VTUL">VTUL</button>
          <button class="vehBtn vtp" data-veh="VTP">VTP</button>
        </div>

        <div class="actions">
          <button class="btn primary" id="btnTake">📷 Prendre une photo</button>
          <button class="btn danger" id="btnReset">Réinitialiser</button>
        </div>

        <!-- Preview -->
        <div class="preview" id="preview">
          <img id="imgPreview" alt="Aperçu photo" />
          <div class="row">
            <button class="mini" id="btnRetake">Reprendre</button>
            <button class="mini" id="btnSend">Envoyer</button>
          </div>
        </div>

        <input id="fileCam" type="file" accept="image/*" capture="environment" hidden>
      </div>
    </div>

    <!-- Vue Historique -->
    <div class="card" id="viewHist" style="display:none">
      <div class="cardHead">
        <h2>Historique</h2>
        <span style="font-size:12px;color:rgba(255,255,255,.75)">Par mois</span>
      </div>

      <div class="cardBody" id="histContainer">
        <!-- Injecté en JS (démo) -->
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

<script>
  // ====== CONFIG SIMPLE (interface only) ======
  const API_URL = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
  const LS_EMAIL_KEYS = ["cs_portail_email_v1","cs_portail_email","email"];
  const LS_ADMIN = "cs_ticket_admin_v1"; // juste pour UI
  const LS_HISTORY = "cs_ticket_history_demo_v1"; // démo locale

  const VEH = {
    VSAV: { cell:"var(--vsav)", dot:"var(--vsavSolid)" },
    CCR : { cell:"var(--ccr)", dot:"var(--ccrSolid)" },
    VTUL: { cell:"var(--vtul)", dot:"var(--vtulSolid)" },
    VTP : { cell:"var(--vtp)", dot:"var(--vtpSolid)" },
  };

  // ====== UI refs ======
  const root = document.getElementById("root");
  const topbar = document.getElementById("topbar");

  const whoName = document.getElementById("whoName");
  const btnAdmin = document.getElementById("btnAdmin");
  const adminBadge = document.getElementById("adminBadge");
  const btnBack = document.getElementById("btnBack");

  const tabTicket = document.getElementById("tabTicket");
  const tabHist = document.getElementById("tabHist");
  const viewTicket = document.getElementById("viewTicket");
  const viewHist = document.getElementById("viewHist");

  const vehCell = document.getElementById("vehCell");
  const vehBtns = [...document.querySelectorAll(".vehBtn")];
  const btnTake = document.getElementById("btnTake");
  const btnReset = document.getElementById("btnReset");

  const fileCam = document.getElementById("fileCam");
  const preview = document.getElementById("preview");
  const imgPreview = document.getElementById("imgPreview");
  const btnRetake = document.getElementById("btnRetake");
  const btnSend = document.getElementById("btnSend");

  const histContainer = document.getElementById("histContainer");
  const toastEl = document.getElementById("toast");

  // ====== State ======
  let selectedVeh = "";
  let photoDataUrl = "";

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.style.display = "block";
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=> toastEl.style.display="none", 1700);
  }

  function getStoredEmail(){
    for(const k of LS_EMAIL_KEYS){
      const v = (localStorage.getItem(k) || "").trim();
      if(v) return v;
    }
    return "";
  }

  // Prénom simple : "pierre.venante@..." => "Pierre"
  function guessFirstNameFromEmail(email){
    if(!email) return "Agent";
    const left = email.split("@")[0] || "";
    const first = left.split(/[._-]/)[0] || left;
    if(!first) return "Agent";
    return first.charAt(0).toUpperCase() + first.slice(1).toLowerCase();
  }

  function setAdminUI(on){
    if(on){
      root.classList.add("adminOn");
      btnAdmin.textContent = "🔓";
      adminBadge.style.display = "inline-flex";
    }else{
      root.classList.remove("adminOn");
      btnAdmin.textContent = "🔒";
      adminBadge.style.display = "none";
    }
    localStorage.setItem(LS_ADMIN, on ? "1":"0");
  }

  function currentIsAdmin(){
    return (localStorage.getItem(LS_ADMIN) || "0") === "1";
  }

  function setVeh(veh){
    selectedVeh = veh;

    // bouton selected
    vehBtns.forEach(b => b.classList.toggle("selected", b.dataset.veh === veh));

    // cellule
    if(!veh){
      vehCell.style.background = "rgba(255,255,255,.06)";
      vehCell.style.borderStyle = "dashed";
      vehCell.innerHTML = `Sélectionner le véhicule<span class="hint">Choisis un véhicule ci-dessous</span>`;
      return;
    }

    vehCell.style.borderStyle = "solid";
    vehCell.style.background = `linear-gradient(180deg, ${getCssVar(VEH[veh].cell)}, rgba(0,0,0,.10))`;
    vehCell.innerHTML = `${veh}<span class="hint">OK — tu peux prendre la photo</span>`;
  }

  function getCssVar(v){
    // v est "var(--xxx)" => récupère la valeur calculée
    if(!v.startsWith("var(")) return v;
    const name = v.slice(4,-1).trim();
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function resetAll(){
    selectedVeh = "";
    photoDataUrl = "";
    setVeh("");
    preview.style.display = "none";
    imgPreview.src = "";
    btnTake.disabled = false;
    toast("Réinitialisé");
  }

  // ====== Tabs ======
  function showTicket(){
    tabTicket.classList.add("active");
    tabHist.classList.remove("active");
    viewTicket.style.display = "";
    viewHist.style.display = "none";
  }
  function showHist(){
    tabHist.classList.add("active");
    tabTicket.classList.remove("active");
    viewHist.style.display = "";
    viewTicket.style.display = "none";
    renderHistory();
  }

  tabTicket.addEventListener("click", showTicket);
  tabHist.addEventListener("click", showHist);

  // ====== Véhicules ======
  vehBtns.forEach(btn=>{
    btn.addEventListener("click", ()=>{
      setVeh(btn.dataset.veh);
    });
  });

  // ====== Photo ======
  btnTake.addEventListener("click", ()=>{
    if(!selectedVeh){
      toast("Choisis un véhicule d’abord");
      return;
    }
    fileCam.value = "";
    fileCam.click();
  });

  fileCam.addEventListener("change", ()=>{
    const f = fileCam.files && fileCam.files[0];
    if(!f) return;

    const reader = new FileReader();
    reader.onload = ()=>{
      photoDataUrl = String(reader.result || "");
      imgPreview.src = photoDataUrl;
      preview.style.display = "flex";
      toast("Aperçu prêt");
    };
    reader.readAsDataURL(f);
  });

  btnRetake.addEventListener("click", ()=>{
    // reprendre = rouvrir caméra
    fileCam.value = "";
    fileCam.click();
  });

  btnSend.addEventListener("click", ()=>{
    if(!photoDataUrl){
      toast("Pas de photo");
      return;
    }
    // Pour l’instant on simule : on stocke en local pour UI.
    saveDemoHistory();
    toast("Envoyé");
    resetAll();
  });

  btnReset.addEventListener("click", resetAll);

  // ====== Historique (démo locale) ======
  function loadDemoHistory(){
    try{
      const raw = localStorage.getItem(LS_HISTORY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }
  function saveDemoHistory(){
    const arr = loadDemoHistory();
    arr.push({
      ts: Date.now(),
      veh: selectedVeh,
      who: whoName.textContent || "Agent",
      thumb: photoDataUrl
    });
    localStorage.setItem(LS_HISTORY, JSON.stringify(arr));
  }

  function fmtDate(ts){
    const d = new Date(ts);
    // Format court FR : jj/mm/aaaa hh:mm
    const pad = (n)=> String(n).padStart(2,"0");
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function monthKey(ts){
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }
  function monthLabel(key){
    const [y,m] = key.split("-");
    const mo = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"][Number(m)-1] || m;
    return `${mo} ${y}`;
  }

  function renderHistory(){
    const arr = loadDemoHistory();
    if(arr.length === 0){
      histContainer.innerHTML = `<div style="color:rgba(255,255,255,.75);font-size:13px">
        Aucun ticket pour le moment.
      </div>`;
      return;
    }

    // Groupes par mois
    const groups = {};
    arr.forEach(it=>{
      const k = monthKey(it.ts);
      (groups[k] ||= []).push(it);
    });

    // ordre ancien -> récent (comme tu veux)
    const keys = Object.keys(groups).sort();

    histContainer.innerHTML = "";
    keys.forEach(k=>{
      const items = groups[k];
      const box = document.createElement("div");
      box.className = "month";

      const head = document.createElement("div");
      head.className = "monthHead";
      head.innerHTML = `<div>${monthLabel(k)}</div><div class="count">${items.length}</div>`;

      const body = document.createElement("div");
      body.className = "monthBody";

      items.forEach(it=>{
        const row = document.createElement("div");
        row.className = "hItem";

        const left = document.createElement("div");
        left.className = "hLeft";

        const vehLine = document.createElement("div");
        vehLine.className = "hVeh";

        const dot = document.createElement("span");
        dot.className = "dot";
        dot.style.background = getCssVar(VEH[it.veh]?.dot || "rgba(255,255,255,.35)");

        const vehTxt = document.createElement("span");
        vehTxt.textContent = it.veh;

        vehLine.appendChild(dot);
        vehLine.appendChild(vehTxt);

        const meta = document.createElement("div");
        meta.className = "hMeta";
        meta.textContent = `${fmtDate(it.ts)} — ${it.who}`;

        left.appendChild(vehLine);
        left.appendChild(meta);

        const pic = document.createElement("div");
        pic.className = "photoIcon";
        pic.title = "Voir la photo";
        pic.textContent = "🖼️";
        pic.addEventListener("click", ()=>{
          // simple preview via nouvelle fenêtre
          const w = window.open();
          if(w){
            w.document.write(`<img src="${it.thumb}" style="max-width:100%;height:auto"/>`);
          }
        });

        row.appendChild(left);
        row.appendChild(pic);

        body.appendChild(row);
      });

      let open = false;
      head.addEventListener("click", ()=>{
        open = !open;
        body.style.display = open ? "block" : "none";
      });

      box.appendChild(head);
      box.appendChild(body);
      histContainer.appendChild(box);
    });
  }

  // ====== Admin + Retour ======
  btnAdmin.addEventListener("click", ()=>{
    setAdminUI(!currentIsAdmin());
  });

  btnBack.addEventListener("click", ()=>{
    // retour simple vers index.html si présent
    window.location.href = "index.html";
  });

  // ====== Init ======
  (function init(){
    const email = getStoredEmail();
    whoName.textContent = guessFirstNameFromEmail(email);

    // admin UI persistant
    setAdminUI(currentIsAdmin());

    // état initial
    setVeh("");
    showTicket();
  })();
  
  btnSend.addEventListener("click", async function () {

  if(!selectedVeh){
    toast("Sélectionner un véhicule");
    return;
  }

  if(!photoDataUrl){
    toast("Prendre une photo");
    return;
  }

  try{

    const email = getStoredEmail();
    const agent = guessFirstNameFromEmail(email);

    const base64 = photoDataUrl.split(",")[1];

    const response = await fetch(API_URL + "?view=ticket_carburant_upload",{
      method:"POST",
      body: JSON.stringify({
        vehicle: selectedVeh,
        agent: agent,
        image: base64
      })
    });

    const data = await response.json();

    if(data.ok){
      toast("Ticket envoyé");
      resetPhoto();
    }else{
      toast("Erreur envoi");
      console.error(data);
    }

  }catch(err){
    console.error(err);
    toast("Erreur connexion");
  }

});

</script>
</body>
</html>
