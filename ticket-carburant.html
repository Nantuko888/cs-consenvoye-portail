<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Ticket carburant — CS Consenvoye</title>

  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --shadow: 0 14px 34px rgba(0,0,0,.40);
      --radius: 20px;
      --stroke: rgba(255,255,255,.12);

      --orange:#d46a00;
      --orange2:#b95800;
      --yellow:#fff200;

      --cardA: rgba(0,0,0,.54);
      --cardB: rgba(0,0,0,.34);

      --vsav:#2f79ff;
      --ccr:#ff3b30;
      --vtul:#25c46a;
      --vtp:#f6a000;

      --monthBg: rgba(37,196,106,.22); /* vert translucide */
      --monthBd: rgba(37,196,106,.40);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--txt);
      background:#0b0b0b;
      overflow:hidden;
      overscroll-behavior:none;
    }

    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
      transform: translateZ(0);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.72) 62%);
      z-index:-1;
    }

    .wrap{
      height:100dvh;
      max-width:980px;
      margin:0 auto;
      padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows: auto auto 1fr;
      gap:10px;
      min-height:0;
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding: 10px 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(212,106,0,.78), rgba(185,88,0,.58));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      min-height: 46px;
    }
    .title{
      margin:0;
      font-weight:950;
      letter-spacing:.6px;
      text-transform: uppercase;
      font-size: 18px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .topRight{display:flex; align-items:center; gap:10px;}
    .btn{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color:var(--txt);
      padding: 9px 12px;
      border-radius: 14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      white-space:nowrap;
    }
    .btn:active{transform: translateY(1px)}
    .btn[disabled]{opacity:.45; cursor:not-allowed}

    .adminLabel{
      display:none;
      font-weight:950;
      font-size:12px;
      color: var(--yellow);
      letter-spacing:.3px;
      text-transform: uppercase;
    }

    .tabs{
      display:flex; gap:10px;
    }
    .tab{
      flex:1;
      padding: 10px 12px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.28);
      box-shadow: var(--shadow);
      font-weight:950;
      letter-spacing:.3px;
      cursor:pointer;
      color: rgba(255,255,255,.86);
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active{
      background: linear-gradient(180deg, rgba(212,106,0,.62), rgba(185,88,0,.45));
      color:#fff;
      border-color: rgba(255,255,255,.16);
    }
    .tab:active{transform: translateY(1px)}

    .card{
      border-radius: 22px;
      background: linear-gradient(180deg, var(--cardA), var(--cardB));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .banner{
      background: var(--yellow);
      color:#000;
      font-weight: 950;
      text-align:center;
      padding: 10px 10px;
      border-bottom: 2px solid rgba(0,0,0,.22);
      letter-spacing:.8px;
      font-size: 18px;
    }

    .content{
      padding: 12px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-height:0;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding: 10px 12px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
    }
    .label{
      font-weight:950;
      color: rgba(255,255,255,.92);
      letter-spacing:.2px;
    }

    select, input[type="file"]{
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      color: var(--txt);
      font-weight: 900;
      outline:none;
    }

    .vehBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      letter-spacing:.3px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      white-space:nowrap;
    }
    .vehBadge.vsav{ background: color-mix(in srgb, var(--vsav) 35%, transparent); border-color: color-mix(in srgb, var(--vsav) 55%, transparent); }
    .vehBadge.ccr{  background: color-mix(in srgb, var(--ccr) 32%, transparent);  border-color: color-mix(in srgb, var(--ccr) 55%, transparent); }
    .vehBadge.vtul{ background: color-mix(in srgb, var(--vtul) 28%, transparent); border-color: color-mix(in srgb, var(--vtul) 52%, transparent); }
    .vehBadge.vtp{  background: color-mix(in srgb, var(--vtp) 32%, transparent);  border-color: color-mix(in srgb, var(--vtp) 55%, transparent); }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .primary{
      background: linear-gradient(180deg, rgba(212,106,0,.78), rgba(185,88,0,.55));
      border-color: rgba(255,255,255,.16);
    }
    .good{
      background: rgba(37,196,106,.22);
      border-color: rgba(37,196,106,.45);
    }
    .danger{
      background: rgba(255,59,48,.18);
      border-color: rgba(255,59,48,.45);
    }

    .previewWrap{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .preview{
      width:100%;
      display:block;
      max-height: 46vh;
      object-fit: contain;
      background:#000;
    }
    .previewMeta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-top:1px solid rgba(255,255,255,.08);
      color: rgba(255,255,255,.86);
      font-weight: 900;
      font-size: 13px;
      flex-wrap:wrap;
    }

    /* ===== Historique ===== */
    .monthGroup{
      border-radius: 18px;
      border: 1px solid var(--monthBd);
      background: var(--monthBg);
      overflow:hidden;
    }
    .monthHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .monthHead:active{transform: translateY(1px)}
    .monthTitle{
      font-weight: 950;
      letter-spacing:.3px;
      text-transform: uppercase;
      display:flex;
      align-items:center;
      gap:10px;
      color: rgba(255,255,255,.92);
    }
    .countPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width: 34px;
      padding: 5px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      font-weight: 950;
    }
    .chev{
      font-weight: 950;
      opacity:.9;
      width: 34px;
      height: 34px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      flex: 0 0 auto;
    }

    .monthBody{
      display:none;
      padding: 10px 10px 12px;
      border-top: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      gap:10px;
    }
    .monthGroup.open .monthBody{display:flex; flex-direction:column;}
    .monthGroup.open .chev{transform: rotate(180deg);}

    .histRow{
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      padding: 10px 10px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .leftMeta{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      min-width: 0;
    }
    .smallTxt{font-weight: 900; color: rgba(255,255,255,.86);}
    .miniDate{
      font-weight: 950;
      color: rgba(255,255,255,.92);
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
    }
    .who{
      font-weight: 900;
      color: rgba(255,255,255,.86);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 220px;
    }

    .rowBtns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-left:auto;
    }
    .iconBtn{
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      color:var(--txt);
      padding: 8px 10px;
      border-radius: 14px;
      font-weight:950;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      min-width: 42px;
    }
    .iconBtn:active{transform: translateY(1px)}
    .iconBtn[disabled]{opacity:.45; cursor:not-allowed}
    .iconBtn.good{ border-color: rgba(37,196,106,.45); background: rgba(37,196,106,.18); }
    .iconBtn.danger{ border-color: rgba(255,59,48,.45); background: rgba(255,59,48,.14); }

    /* toast */
    .toast{
      position:fixed;
      left:12px; right:12px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      z-index:200;
      display:none;
      max-width: 980px;
      margin: 0 auto;
      pointer-events:none;
    }
    .toast .pill{
      pointer-events:auto;
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.70);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      color: rgba(255,255,255,.92);
      font-weight:950;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* modal */
    .modal{
      position:fixed; inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 99999;
    }
    .modal.show{ display:flex; }
    .modal .backdrop{
      position:absolute; inset:0;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(6px);
    }
    .modal .box{
      position:relative;
      width:min(720px, 100%);
      border-radius: 18px;
      background: rgba(10,10,10,.92);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 22px 60px rgba(0,0,0,.65);
      padding: 14px;
    }
    .modal h3{margin: 6px 6px 10px; font-size: 16px; letter-spacing:.3px;}
    .modalImg{
      width:100%;
      display:block;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background:#000;
      max-height: 72vh;
      object-fit: contain;
    }
    .modal .row{
      display:flex;
      gap:10px;
      margin: 12px 6px 6px;
      flex-wrap:wrap;
    }
    .modal .btn2{
      flex:1;
      min-width: 140px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color:#fff;
      font-weight: 950;
      cursor:pointer;
    }
    .modal .btn2.primary{
      background: linear-gradient(180deg, rgba(212,106,0,.78), rgba(185,88,0,.55));
    }
    .modal .btn2.good{
      background: rgba(37,196,106,.20);
      border-color: rgba(37,196,106,.45);
    }
    .modal .btn2.danger{
      background: rgba(255,59,48,.16);
      border-color: rgba(255,59,48,.45);
    }

    @media (max-width:360px){
      .title{font-size:16px}
      .banner{font-size:16px}
      .who{max-width: 150px;}
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <h1 class="title">TICKET CARBURANT</h1>
      <div class="topRight">
        <span class="adminLabel" id="adminLabel">MODE ADMIN</span>
        <button class="btn" id="btnLock" title="Mode admin" aria-pressed="false">🔒</button>
        <button class="btn" id="btnBack">Retour</button>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Ticket carburant onglets">
      <button class="tab active" id="tabPhoto" role="tab" aria-selected="true">Photo</button>
      <button class="tab" id="tabHist" role="tab" aria-selected="false">Historique</button>
    </div>

    <!-- PHOTO -->
    <section class="card" id="panelPhoto" role="tabpanel" aria-labelledby="tabPhoto">
      <div class="banner">PRISE DE PHOTO — TICKET CARBURANT</div>
      <div class="content">

        <div class="field">
          <div class="label">Véhicule</div>
          <select id="vehSelect">
            <option value="">— Choisir —</option>
            <option value="VSAV">VSAV</option>
            <option value="CCR">CCR</option>
            <option value="VTUL">VTUL</option>
            <option value="VTP">VTP</option>
          </select>
        </div>

        <div class="field">
          <div class="label">Photo de l’écran de la pompe</div>

          <!-- input caméra -->
          <input id="fileInput" type="file" accept="image/*" capture="environment" style="display:none" />

          <div class="actions">
            <button class="btn primary" id="btnTake">📸 Prendre une photo</button>
            <button class="btn" id="btnClear" disabled>↩ Reprendre</button>
            <button class="btn good" id="btnSend" disabled>📤 Envoyer</button>
          </div>

          <div class="previewWrap" id="previewWrap" style="display:none">
            <img id="previewImg" class="preview" alt="Aperçu photo" />
            <div class="previewMeta">
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <span id="previewVehBadge" class="vehBadge">—</span>
                <span class="miniDate" id="previewDate">—</span>
              </div>
              <div class="smallTxt" id="previewWho">—</div>
            </div>
          </div>

          <div style="font-weight:900;color:rgba(255,255,255,.78);font-size:13px;line-height:1.25;">
            Astuce : si tu appuies sur <b>Envoyer</b>, la photo est validée et part dans l’historique.
          </div>
        </div>

      </div>
    </section>

    <!-- HISTORIQUE -->
    <section class="card" id="panelHist" role="tabpanel" aria-labelledby="tabHist" style="display:none;">
      <div class="banner">HISTORIQUE</div>
      <div class="content" id="histContent">
        <!-- mois générés ici -->
      </div>
    </section>
  </div>

  <!-- toast -->
  <div class="toast" id="toast">
    <div class="pill" id="toastPill">✔ Envoyé</div>
  </div>

  <!-- modal -->
  <div class="modal" id="modal">
    <div class="backdrop" id="modalClose"></div>
    <div class="box" id="modalBox"></div>
  </div>

<script>
/* =========================
   CONFIG
   =========================
   - MODE DEMO (localStorage) : ça te donne l’aperçu complet de la page sans rien casser.
   - Quand tu me donnes ton Drive/Apps Script, on branchera l’upload + la liste.
*/
const BACK_URL = "index.html?portal=1";
const LS_EMAIL = "cs_portail_email_v1";
const LS_NAME  = "cs_portail_name_v1";

// 🔧 Pour l’instant : DEMO = true (historique stocké localement)
let DEMO_MODE = true;

// Si tu veux brancher Apps Script plus tard :
// const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const API = ""; // (vide => demo)

/* =========================
   UI helpers
   ========================= */
const $ = (id)=>document.getElementById(id);

const tabPhoto = $("tabPhoto");
const tabHist  = $("tabHist");
const panelPhoto = $("panelPhoto");
const panelHist  = $("panelHist");

function setTab(which){
  const isPhoto = (which === "photo");
  tabPhoto.classList.toggle("active", isPhoto);
  tabHist.classList.toggle("active", !isPhoto);
  tabPhoto.setAttribute("aria-selected", isPhoto ? "true" : "false");
  tabHist.setAttribute("aria-selected", isPhoto ? "false" : "true");
  panelPhoto.style.display = isPhoto ? "flex" : "none";
  panelHist.style.display  = isPhoto ? "none" : "flex";
}

tabPhoto.addEventListener("click", ()=>setTab("photo"));
tabHist.addEventListener("click", ()=>{ setTab("hist"); renderHistory(); });

$("btnBack").addEventListener("click", ()=>location.replace(BACK_URL));

/* =========================
   Admin mode (cadenas)
   ========================= */
let IS_ADMIN = false;

function setAdminUI(on){
  IS_ADMIN = !!on;
  $("adminLabel").style.display = IS_ADMIN ? "inline-block" : "none";
  $("btnLock").textContent = IS_ADMIN ? "🔓" : "🔒";
  $("btnLock").setAttribute("aria-pressed", IS_ADMIN ? "true" : "false");
}

$("btnLock").addEventListener("click", ()=>{
  // Ici : on toggle juste l’affichage (comme demandé).
  // Plus tard on reliera à auth_check (planning).
  setAdminUI(!IS_ADMIN);
  renderHistory(); // refresh boutons admin
});

/* =========================
   Vehicules / couleurs
   ========================= */
const VEH_COL_CLASS = {
  "VSAV":"vsav",
  "CCR":"ccr",
  "VTUL":"vtul",
  "VTP":"vtp"
};

function vehBadgeHtml(veh){
  const v = String(veh||"").toUpperCase().trim();
  const cls = VEH_COL_CLASS[v] || "";
  if(!v) return `<span class="vehBadge">—</span>`;
  return `<span class="vehBadge ${cls}">${escapeHtml(v)}</span>`;
}

function escapeHtml(s){
  return (s==null ? "" : String(s))
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function myEmail(){ return (localStorage.getItem(LS_EMAIL) || "").trim().toLowerCase(); }
function myName(){ return (localStorage.getItem(LS_NAME) || "").trim(); }

function firstNameFromEmail(email){
  const e = String(email||"").trim().toLowerCase();
  if(!e.includes("@")) return "";
  const local = e.split("@")[0] || "";
  const p = local.split(/[._-]/)[0] || local;
  return p ? (p.charAt(0).toUpperCase() + p.slice(1)) : "";
}

function fmtDateShort(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  if(isNaN(dt)) return "—";
  const dd = String(dt.getDate()).padStart(2,"0");
  const mm = String(dt.getMonth()+1).padStart(2,"0");
  return `${dd}/${mm}`;
}
function monthKeyFR(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  if(isNaN(dt)) return "—";
  const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  return `${months[dt.getMonth()]} ${dt.getFullYear()}`;
}

/* =========================
   Toast
   ========================= */
let _toastT = null;
function toast(msg, icon="✔"){
  const t = $("toast");
  $("toastPill").textContent = `${icon} ${msg}`;
  t.style.display = "block";
  clearTimeout(_toastT);
  _toastT = setTimeout(()=>{ t.style.display="none"; }, 2200);
}

/* =========================
   Modal
   ========================= */
const $modal = $("modal");
const $modalBox = $("modalBox");
$("modalClose").addEventListener("click", closeModal);

function openModal(html){
  $modalBox.innerHTML = html;
  $modal.classList.add("show");
}
function closeModal(){
  $modal.classList.remove("show");
  $modalBox.innerHTML = "";
}

/* =========================
   Données (DEMO localStorage)
   ========================= */
const DEMO_KEY = "cs_fuel_demo_history_v1";

function loadDemoHistory(){
  try{
    const raw = localStorage.getItem(DEMO_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  }catch(e){ return []; }
}
function saveDemoHistory(arr){
  try{ localStorage.setItem(DEMO_KEY, JSON.stringify(arr||[])); }catch(e){}
}

/* =========================
   Photo flow
   ========================= */
const vehSelect = $("vehSelect");
const fileInput = $("fileInput");
const btnTake   = $("btnTake");
const btnClear  = $("btnClear");
const btnSend   = $("btnSend");

const previewWrap = $("previewWrap");
const previewImg  = $("previewImg");
const previewVehBadge = $("previewVehBadge");
const previewDate = $("previewDate");
const previewWho  = $("previewWho");

let _photoBlob = null;
let _photoUrl  = "";
let _photoTakenAt = null;

function resetPhoto(){
  _photoBlob = null;
  _photoTakenAt = null;
  if(_photoUrl){ try{ URL.revokeObjectURL(_photoUrl); }catch(e){} }
  _photoUrl = "";
  previewWrap.style.display = "none";
  previewImg.removeAttribute("src");
  btnClear.disabled = true;
  btnSend.disabled = true;
  try{ fileInput.value = ""; }catch(e){}
}

btnTake.addEventListener("click", ()=>{
  const veh = (vehSelect.value || "").trim();
  if(!veh){
    alert("Choisis d’abord un véhicule.");
    return;
  }
  fileInput.click();
});

fileInput.addEventListener("change", ()=>{
  const f = fileInput.files && fileInput.files[0];
  if(!f) return;

async function blobToDataUrl(blob){
  return await new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(String(r.result||""));
    r.onerror = ()=>reject(new Error("Lecture image impossible"));
    r.readAsDataURL(blob);
  });
}

/* =========================
   Historique (mois repliés)
   ========================= */
function renderHistory(){
  const host = $("histContent");
  host.innerHTML = "";

  // Source: DEMO local ou futur API
  let items = [];
  if(!API){
    items = loadDemoHistory();
  }else{
    // plus tard: items = await fetch list
    items = [];
  }

  if(!items.length){
    const empty = document.createElement("div");
    empty.className = "field";
    empty.innerHTML = `<div class="label">Aucun historique pour le moment.</div>
                       <div style="font-weight:900;color:rgba(255,255,255,.78);font-size:13px;">
                         Les mois apparaîtront automatiquement dès qu’il y aura des photos.
                       </div>`;
    host.appendChild(empty);
    return;
  }

  // ordre : du plus ancien au plus récent (top -> bottom)
  items.sort((a,b)=> String(a.takenAt||"").localeCompare(String(b.takenAt||"")));

  // group by month
  const groups = new Map();
  for(const it of items){
    const dt = new Date(it.takenAt);
    const mk = monthKeyFR(dt);
    if(!groups.has(mk)) groups.set(mk, []);
    groups.get(mk).push(it);
  }

  for(const [mk, arr] of groups.entries()){
    const g = document.createElement("div");
    g.className = "monthGroup"; // replié par défaut

    const head = document.createElement("div");
    head.className = "monthHead";
    head.innerHTML = `
      <div class="monthTitle">
        <span>${escapeHtml(mk)}</span>
        <span class="countPill">${arr.length}</span>
      </div>
      <div class="chev">▾</div>
    `;

    const body = document.createElement("div");
    body.className = "monthBody";

    for(const it of arr){
      const dt = new Date(it.takenAt);
      const dshort = fmtDateShort(dt);
      const veh = String(it.veh||"").toUpperCase().trim();
      const who = String(it.who||"").trim() || "Agent";

      const row = document.createElement("div");
      row.className = "histRow";
      row.innerHTML = `
        <div class="leftMeta">
          ${vehBadgeHtml(veh)}
          <span class="miniDate">${escapeHtml(dshort)}</span>
          <span class="who">${escapeHtml(who)}</span>
        </div>
        <div class="rowBtns">
          <button class="iconBtn" data-act="view">👁</button>
          <button class="iconBtn good" data-act="dl" style="display:none">⬇</button>
          <button class="iconBtn" data-act="share" style="display:none">📤</button>
        </div>
      `;

      // Boutons admin uniquement
      const btnDl = row.querySelector('[data-act="dl"]');
      const btnSh = row.querySelector('[data-act="share"]');
      if(IS_ADMIN){
        btnDl.style.display = "inline-block";
        btnSh.style.display = "inline-block";
      }

      row.querySelector('[data-act="view"]').addEventListener("click", ()=>{
        const src = it.dataUrl || "";
        openModal(`
          <h3>${escapeHtml(veh)} — ${escapeHtml(dshort)} — ${escapeHtml(who)}</h3>
          <img class="modalImg" src="${escapeHtml(src)}" alt="Photo ticket carburant">
          <div class="row">
            <button class="btn2 primary" id="mClose">Fermer</button>
          </div>
        `);
        $("mClose").onclick = closeModal;
      });

      if(btnDl){
        btnDl.addEventListener("click", ()=>{
          if(!IS_ADMIN) return;
          const src = it.dataUrl || "";
          if(!src) return;
          const a = document.createElement("a");
          a.href = src;
          a.download = `ticket_${veh}_${dt.toISOString().slice(0,10)}_${who}.jpg`;
          document.body.appendChild(a);
          a.click();
          a.remove();
        });
      }

      if(btnSh){
        btnSh.addEventListener("click", async ()=>{
          if(!IS_ADMIN) return;
          const src = it.dataUrl || "";
          if(!src) return;

          // Web Share si possible
          try{
            if(navigator.share){
              await navigator.share({
                title: "Ticket carburant",
                text: `${veh} — ${dshort} — ${who}`
              });
              toast("Partagé", "📤");
              return;
            }
          }catch(e){}

          // fallback : copie une info (pas de lien en démo)
          try{
            await navigator.clipboard.writeText(`${veh} — ${dshort} — ${who}`);
            toast("Copié", "📋");
          }catch(e){
            alert("Partage non disponible sur cet appareil.");
          }
        });
      }

      body.appendChild(row);
    }

    head.addEventListener("click", ()=>{
      g.classList.toggle("open");
    });

    g.appendChild(head);
    g.appendChild(body);
    host.appendChild(g);
  }
}
