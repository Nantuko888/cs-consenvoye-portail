<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Ticket Carburant — CS Consenvoye</title>

  <style>
    :root{
      --txt:#f4f4f4;
      --muted:rgba(255,255,255,.72);
      --shadow: 0 14px 34px rgba(0,0,0,.40);
      --radius: 22px;
      --stroke: rgba(255,255,255,.10);

      /* ✅ ORANGE comme tes pages */
      --orange:#d46a00;
      --orange2:#b95800;

      --bg:#0b0b0b;

      /* véhicules */
      --vsav:#2f79ff;
      --ccr:#ff3b30;
      --vtul:#25c46a;
      --vtp:#f6a000;

      --yellow:#fff200;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--txt);
      background:var(--bg);
      overflow:hidden;
    }

    .bg{
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url("background.png") center top/cover no-repeat;
      z-index:-2;
      transform: translateZ(0);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at 50% 10%, rgba(255,170,60,.16), rgba(0,0,0,.72) 62%);
      z-index:-1;
    }

    .wrap{
      height:100vh;
      max-width: 980px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 12px);
      display:grid;
      grid-template-rows: auto auto 1fr;
      gap:10px;
      min-height:0;
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding: 10px 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(212,106,0,.78), rgba(185,88,0,.58));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      min-height: 46px;
    }
    .title{
      margin:0;
      font-weight:950;
      letter-spacing:.6px;
      text-transform: uppercase;
      font-size: 18px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .topRight{display:flex; gap:10px; align-items:center;}
    .btn{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color:var(--txt);
      padding: 9px 12px;
      border-radius: 14px;
      font-weight:900;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      white-space:nowrap;
    }
    .btn:active{transform: translateY(1px)}
    .adminTag{
      display:none;
      font-weight:950;
      font-size:12px;
      letter-spacing:.4px;
      color: var(--yellow);
      text-transform: uppercase;
      margin-right:2px;
    }

    .tabs{
      display:flex; gap:10px;
    }
    .tab{
      flex:1;
      padding: 10px 12px;
      border-radius: var(--radius);
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.28);
      box-shadow: var(--shadow);
      font-weight:950;
      letter-spacing:.3px;
      cursor:pointer;
      color: rgba(255,255,255,.86);
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active{
      background: linear-gradient(180deg, rgba(212,106,0,.62), rgba(185,88,0,.45));
      color:#fff;
      border-color: rgba(255,255,255,.16);
    }
    .tab:active{transform: translateY(1px)}

    .card{
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(0,0,0,.52), rgba(0,0,0,.32));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .panel{
      flex:1;
      min-height:0;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      padding:12px;
      display:none;
    }
    .panel.show{display:block;}

    .row{
      border-radius: 18px;
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      padding: 12px;
      margin-bottom: 10px;
    }
    .rowTitle{
      font-weight:950;
      margin:0 0 8px 0;
      letter-spacing:.2px;
    }

    .select{
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      color:#fff;
      font-weight:900;
      outline:none;
    }

    .vehChips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .chip{
      padding: 9px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-weight:950;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .chip.active{outline:2px solid rgba(255,255,255,.30)}

    .chip.vsav{background: rgba(47,121,255,.20); border-color: rgba(47,121,255,.45);}
    .chip.ccr{ background: rgba(255,59,48,.18); border-color: rgba(255,59,48,.45);}
    .chip.vtul{background: rgba(37,196,106,.18); border-color: rgba(37,196,106,.45);}
    .chip.vtp{ background: rgba(246,160,0,.18); border-color: rgba(246,160,0,.45);}

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .primary{
      background: linear-gradient(180deg, rgba(212,106,0,.80), rgba(185,88,0,.62));
      border-color: rgba(255,255,255,.18);
    }
    .ghost{
      background: rgba(255,255,255,.06);
    }
    .danger{
      background: rgba(255,59,48,.18);
      border-color: rgba(255,59,48,.45);
    }
    .btnWide{flex:1; min-width: 130px; text-align:center;}

    .previewWrap{
      display:none;
      margin-top: 12px;
      gap:10px;
    }
    .previewWrap.show{display:flex; flex-direction:column;}
    .previewImg{
      width:100%;
      max-height: 44vh;
      object-fit:contain;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
    }

    /* ===== Historique ===== */
    .monthBlock{
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22);
      margin-bottom: 10px;
    }
    .monthHead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding: 12px 12px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      background: rgba(255,255,255,.06);
    }
    .monthHeadTint{
      background: linear-gradient(180deg, rgba(37,196,106,.18), rgba(0,0,0,.06));
    }
    .monthLeft{
      display:flex; align-items:center; gap:10px;
      min-width:0;
    }
    .monthName{
      font-weight:950;
      letter-spacing:.4px;
      text-transform: uppercase;
      white-space:nowrap;
    }
    .countPill{
      font-weight:950;
      font-size:12px;
      padding: 4px 8px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.9);
    }
    .chev{
      font-weight:950;
      opacity:.9;
    }
    .monthBody{
      display:none;
      padding: 10px 10px 12px;
    }
    .monthBody.show{display:block;}

    .item{
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      padding: 10px;
      display:flex;
      gap:10px;
      align-items:center;
      margin-top: 8px;
    }
    .vehBadge{
      flex:0 0 auto;
      min-width: 64px;
      text-align:center;
      font-weight:950;
      padding: 8px 10px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
    }
    .vehBadge.vsav{background: rgba(47,121,255,.25); border-color: rgba(47,121,255,.50);}
    .vehBadge.ccr{ background: rgba(255,59,48,.22); border-color: rgba(255,59,48,.50);}
    .vehBadge.vtul{background: rgba(37,196,106,.22); border-color: rgba(37,196,106,.50);}
    .vehBadge.vtp{ background: rgba(246,160,0,.22); border-color: rgba(246,160,0,.50);}

    .meta{
      min-width:0;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .metaTop{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .dateTxt{
      font-weight:950;
      opacity:.95;
    }
    .agentTxt{
      font-weight:900;
      color: var(--muted);
    }
    .icons{
      flex:0 0 auto;
      display:flex;
      gap:8px;
      align-items:center;
    }
    .iconBtn{
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color:#fff;
      font-weight:950;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .iconBtn:active{transform: translateY(1px)}
    .iconBtn.adminOnly{display:none;}

    /* status pill */
    .status{
      position:fixed;
      left:12px; right:12px;
      bottom: calc(env(safe-area-inset-bottom) + 12px);
      z-index:80;
      display:none;
      max-width: 980px;
      margin: 0 auto;
      pointer-events:none;
    }
    .status .pill{
      pointer-events:auto;
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.62);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      color: rgba(255,255,255,.92);
      font-weight:900;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .small{font-weight:800; opacity:.85; font-size:13px}

    /* input file hidden */
    #photoInput{ display:none; }

    @media (max-width:360px){
      .title{font-size:16px}
      .item{padding:9px}
      .vehBadge{min-width:60px}
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="topbar">
      <h1 class="title">TICKET CARBURANT</h1>
      <div class="topRight">
        <span class="adminTag" id="adminTag">MODE ADMIN</span>
        <button class="btn" id="btnLock" title="Admin" aria-pressed="false" style="display:none;">🔒</button>
        <button class="btn" id="btnBack">Retour</button>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Ticket carburant onglets">
      <button class="tab active" id="tabPhoto" role="tab" aria-selected="true">Photo</button>
      <button class="tab" id="tabHist" role="tab" aria-selected="false">Historique</button>
    </div>

    <section class="card">
      <!-- PANEL PHOTO -->
      <div class="panel show" id="panelPhoto" role="tabpanel" aria-labelledby="tabPhoto">
        <div class="row">
          <div class="rowTitle">Véhicule</div>

          <select class="select" id="vehicleSelect">
            <option value="">— Choisir un véhicule —</option>
            <option value="VSAV">VSAV</option>
            <option value="CCR">CCR</option>
            <option value="VTUL">VTUL</option>
            <option value="VTP">VTP</option>
          </select>

          <div class="vehChips" aria-label="Raccourcis véhicules">
            <div class="chip vsav" data-v="VSAV">VSAV</div>
            <div class="chip ccr"  data-v="CCR">CCR</div>
            <div class="chip vtul" data-v="VTUL">VTUL</div>
            <div class="chip vtp"  data-v="VTP">VTP</div>
          </div>

          <div class="actions">
            <button class="btn primary btnWide" id="btnTake">📷 Prendre une photo</button>
          </div>

          <input id="photoInput" type="file" accept="image/*" capture="environment" />
          <div class="previewWrap" id="previewWrap">
            <img class="previewImg" id="previewImg" alt="Aperçu photo" />
            <div class="actions">
              <button class="btn ghost btnWide" id="btnRetake">Reprendre</button>
              <button class="btn primary btnWide" id="btnSend">Envoyer</button>
            </div>
          </div>
        </div>
      </div>

      <!-- PANEL HIST -->
      <div class="panel" id="panelHist" role="tabpanel" aria-labelledby="tabHist">
        <div id="histWrap"></div>
      </div>
    </section>
  </div>

  <div class="status" id="status">
    <div class="pill">
      <span id="statusIcon">⏳</span>
      <div>
        <div id="statusTxt">Chargement…</div>
        <div class="small" id="statusSub">—</div>
      </div>
    </div>
  </div>

<script>
/* =======================
   CONFIG
   ======================= */
const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
const BACK_URL = "index.html?portal=1";
const LS_EMAIL = "cs_portail_email_v1";
const LS_NAME  = "cs_portail_name_v1";

/* couleurs véhicule */
const VEH_COL = {
  "VSAV": "vsav",
  "CCR":  "ccr",
  "VTUL": "vtul",
  "VTP":  "vtp",
};

/* =======================
   DOM helpers
   ======================= */
const $ = (id)=>document.getElementById(id);
const statusEl = $("status");
const statusTxt = $("statusTxt");
const statusSub = $("statusSub");
const statusIcon = $("statusIcon");

function showStatus(txt, sub, icon="⏳"){
  statusIcon.textContent = icon;
  statusTxt.textContent = txt || "";
  statusSub.textContent = sub || "";
  statusEl.style.display = "block";
}
function hideStatus(){ statusEl.style.display = "none"; }

function myEmail(){ return (localStorage.getItem(LS_EMAIL)||"").trim().toLowerCase(); }
function myName(){ return (localStorage.getItem(LS_NAME)||"").trim(); }
function firstNameFromEmail(email){
  const s = String(email||"").trim().toLowerCase();
  if(!s.includes("@")) return "";
  let p = s.split("@")[0] || "";
  p = p.split(/[._-]/)[0] || p;
  if(!p) return "";
  return p.charAt(0).toUpperCase() + p.slice(1);
}
function myFirstName(){
  const n = myName();
  if(n) return n.split(/\s+/)[0].trim();
  return firstNameFromEmail(myEmail());
}

function escapeHtml(s){
  return (s==null ? "" : String(s))
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

/* =======================
   JSONP
   ======================= */
function jsonp(url, cbName, timeoutMs=20000){
  return new Promise((resolve, reject)=>{
    const s = document.createElement("script");
    const cleanup = ()=>{
      s.remove();
      try{ delete window[cbName]; }catch(e){ window[cbName]=undefined; }
    };
    const t = setTimeout(()=>{ cleanup(); reject(new Error("Timeout JSONP")); }, timeoutMs);

    window[cbName] = (data)=>{ clearTimeout(t); cleanup(); resolve(data); };

    s.src = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
    s.onerror = ()=>{ clearTimeout(t); cleanup(); reject(new Error("Erreur JSONP")); };
    document.head.appendChild(s);
  });
}
async function apiCall(view, params={}){
  const cb = "cb_" + Math.random().toString(36).slice(2);
  const qs = new URLSearchParams({ view, callback: cb, nocache:"1" });
  Object.entries(params).forEach(([k,v])=> qs.set(k, String(v)));
  return await jsonp(`${API}?${qs.toString()}`, cb, 25000);
}

/* =======================
   Rôle admin
   ======================= */
let IS_ADMIN = false;
let ADMIN_MODE = false;

async function loadMyRole_(){
  const email = myEmail();
  if(!email){ IS_ADMIN=false; return; }
  try{
    const r = await apiCall("auth_check", { email });
    IS_ADMIN = !!(r && r.ok===true && String(r.role||"").toLowerCase()==="admin");
  }catch(e){
    IS_ADMIN = false;
  }
}

function setAdminMode(on){
  ADMIN_MODE = !!on;
  $("adminTag").style.display = ADMIN_MODE ? "inline-block" : "none";
  const lockBtn = $("btnLock");
  lockBtn.textContent = ADMIN_MODE ? "🔓" : "🔒";
  lockBtn.setAttribute("aria-pressed", ADMIN_MODE ? "true":"false");

  // boutons admin only dans l'historique
  document.querySelectorAll(".iconBtn.adminOnly").forEach(b=>{
    b.style.display = ADMIN_MODE ? "flex" : "none";
  });
}

/* =======================
   Tabs
   ======================= */
const tabPhoto = $("tabPhoto");
const tabHist  = $("tabHist");
const panelPhoto = $("panelPhoto");
const panelHist  = $("panelHist");

function setTab(which){
  const isPhoto = (which==="photo");
  tabPhoto.classList.toggle("active", isPhoto);
  tabHist.classList.toggle("active", !isPhoto);
  tabPhoto.setAttribute("aria-selected", isPhoto ? "true":"false");
  tabHist.setAttribute("aria-selected", isPhoto ? "false":"true");
  panelPhoto.classList.toggle("show", isPhoto);
  panelHist.classList.toggle("show", !isPhoto);
}
tabPhoto.addEventListener("click", ()=>setTab("photo"));
tabHist.addEventListener("click", ()=>{ setTab("hist"); refreshHistory(); });

/* =======================
   Véhicule select + chips
   ======================= */
const vehicleSelect = $("vehicleSelect");
function setVehicle(v){
  vehicleSelect.value = v || "";
  document.querySelectorAll(".chip").forEach(ch=>{
    ch.classList.toggle("active", ch.dataset.v === vehicleSelect.value);
  });
}
document.querySelectorAll(".chip").forEach(ch=>{
  ch.addEventListener("click", ()=>setVehicle(ch.dataset.v));
});
vehicleSelect.addEventListener("change", ()=>setVehicle(vehicleSelect.value));

/* =======================
   Photo capture / preview
   ======================= */
const photoInput = $("photoInput");
const previewWrap = $("previewWrap");
const previewImg = $("previewImg");
let _imageDataUrl = ""; // base64 dataURL

function resetPreview(){
  _imageDataUrl = "";
  previewImg.src = "";
  previewWrap.classList.remove("show");
}

$("btnTake").addEventListener("click", ()=>{
  if(!vehicleSelect.value){
    alert("Choisis d’abord un véhicule.");
    return;
  }
  photoInput.click();
});

photoInput.addEventListener("change", async ()=>{
  const file = photoInput.files && photoInput.files[0];
  if(!file) return;

  // lecture file -> dataURL
  showStatus("Préparation…", "Création de l’aperçu", "🖼");
  try{
    const dataUrl = await new Promise((resolve, reject)=>{
      const r = new FileReader();
      r.onload = ()=>resolve(String(r.result||""));
      r.onerror = ()=>reject(new Error("Lecture impossible"));
      r.readAsDataURL(file);
    });

    _imageDataUrl = dataUrl;
    previewImg.src = dataUrl;
    previewWrap.classList.add("show");
    hideStatus();
  }catch(e){
    hideStatus();
    alert("Impossible de lire la photo.");
  }
});

$("btnRetake").addEventListener("click", ()=>{
  // “Reprendre” = on reset et on ré-ouvre caméra
  resetPreview();
  photoInput.value = "";
  setTimeout(()=>photoInput.click(), 50);
});

$("btnSend").addEventListener("click", async ()=>{
  if(!vehicleSelect.value){
    alert("Choisis un véhicule.");
    return;
  }
  if(!_imageDataUrl){
    alert("Aucune photo.");
    return;
  }
  const email = myEmail();
  if(!email){
    alert("Email non détecté (connexion). Reviens au portail.");
    return;
  }

  const vehicle = vehicleSelect.value;
  const name = myFirstName() || "—";

  showStatus("Envoi…", "Upload sur Drive", "⬆️");
  try{
    const r = await apiCall("fuel_upload", {
      email,
      name,
      vehicle,
      image: _imageDataUrl
    });

    if(!r || r.ok !== true){
      throw new Error(r?.error || "Erreur upload");
    }

    showStatus("Envoyé ✔", "Photo enregistrée", "✅");
    setTimeout(hideStatus, 1200);

    // reset UI
    resetPreview();
    photoInput.value = "";

    // refresh historique
    await refreshHistory();

    alert("Envoyé ✔");
  }catch(e){
    showStatus("Erreur", String(e.message||e), "⚠️");
    setTimeout(hideStatus, 2500);
    alert("Erreur : " + String(e.message||e));
  }
});

/* =======================
   Historique
   ======================= */
const histWrap = $("histWrap");
let _histLoadedOnce = false;

function fmtShortDate(iso){
  // iso: "2026-03-05T..."
  const d = new Date(String(iso||""));
  if(isNaN(d)) return String(iso||"");
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${dd}/${mm} ${hh}:${mi}`;
}

function monthKey(iso){
  const d = new Date(String(iso||""));
  if(isNaN(d)) return "—";
  const y = d.getFullYear();
  const m = d.getMonth(); // 0-11
  const monthsFR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  return `${monthsFR[m]} ${y}`;
}

function buildHistoryUI(rows){
  histWrap.innerHTML = "";

  if(!rows || !rows.length){
    const empty = document.createElement("div");
    empty.className = "row";
    empty.innerHTML = `<div style="font-weight:900;opacity:.9">Aucune photo pour le moment.</div>`;
    histWrap.appendChild(empty);
    return;
  }

  // group by month (ordre ancien -> récent comme tu veux : haut ancien bas récent)
  const groups = new Map();
  for(const r of rows){
    const k = monthKey(r.createdAt);
    if(!groups.has(k)) groups.set(k, []);
    groups.get(k).push(r);
  }

  for(const [k, arr] of groups.entries()){
    const block = document.createElement("div");
    block.className = "monthBlock";

    const head = document.createElement("div");
    head.className = "monthHead monthHeadTint";
    head.innerHTML = `
      <div class="monthLeft">
        <div class="monthName">${escapeHtml(k)}</div>
        <div class="countPill">${arr.length}</div>
      </div>
      <div class="chev">▾</div>
    `;

    const body = document.createElement("div");
    body.className = "monthBody"; // ✅ replié par défaut

    head.addEventListener("click", ()=>{
      const open = body.classList.toggle("show");
      head.querySelector(".chev").textContent = open ? "▴" : "▾";
    });

    // items
    for(const r of arr){
      const v = String(r.vehicle||"").trim().toUpperCase();
      const vehClass = VEH_COL[v] || "";
      const date = fmtShortDate(r.createdAt);
      const agent = String(r.name||"").trim() || firstNameFromEmail(r.email);

      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <div class="vehBadge ${vehClass}">${escapeHtml(v||"—")}</div>
        <div class="meta">
          <div class="metaTop">
            <div class="dateTxt">${escapeHtml(date)}</div>
            <div class="agentTxt">— ${escapeHtml(agent||"—")}</div>
          </div>
        </div>
        <div class="icons">
          <button class="iconBtn" title="Voir">📷</button>
          <button class="iconBtn adminOnly" title="Télécharger">⬇️</button>
          <button class="iconBtn adminOnly" title="Partager">🔗</button>
        </div>
      `;

      const btnView = item.querySelectorAll(".iconBtn")[0];
      const btnDl   = item.querySelectorAll(".iconBtn")[1];
      const btnShare= item.querySelectorAll(".iconBtn")[2];

      btnView.addEventListener("click", ()=>{
        // simple preview : ouvre un nouvel onglet sur l'URL "view"
        if(r.viewUrl) window.open(r.viewUrl, "_blank", "noopener");
        else alert("Aucun lien photo.");
      });

      // admin only
      btnDl.classList.add("adminOnly");
      btnShare.classList.add("adminOnly");

      btnDl.addEventListener("click", ()=>{
        if(!ADMIN_MODE) return;
        if(r.downloadUrl) window.open(r.downloadUrl, "_blank", "noopener");
        else alert("Aucun lien téléchargement.");
      });

      btnShare.addEventListener("click", async ()=>{
        if(!ADMIN_MODE) return;
        const link = r.viewUrl || r.downloadUrl || "";
        if(!link){ alert("Aucun lien."); return; }

        try{
          if(navigator.share){
            await navigator.share({ title:"Ticket Carburant", text:`${v} • ${date} • ${agent}`, url: link });
          }else{
            await navigator.clipboard.writeText(link);
            alert("Lien copié ✔");
          }
        }catch(e){
          // fallback clipboard
          try{
            await navigator.clipboard.writeText(link);
            alert("Lien copié ✔");
          }catch(_){
            prompt("Copie le lien :", link);
          }
        }
      });

      body.appendChild(item);
    }

    block.appendChild(head);
    block.appendChild(body);
    histWrap.appendChild(block);
  }

  // appliquer admin mode visibility
  document.querySelectorAll(".iconBtn.adminOnly").forEach(b=>{
    b.style.display = ADMIN_MODE ? "flex" : "none";
  });
}

async function refreshHistory(){
  const email = myEmail();
  if(!email){
    buildHistoryUI([]);
    return;
  }

  if(!_histLoadedOnce){
    showStatus("Chargement…", "Récupération de l’historique", "⏳");
  }

  try{
    const r = await apiCall("fuel_list", { email }); // email utile surtout si un jour tu filtres
    if(!r || r.ok !== true) throw new Error(r?.error || "Erreur list");

    // rows déjà dans l'ordre ancien -> récent (on le garantit côté Apps Script)
    buildHistoryUI(Array.isArray(r.rows) ? r.rows : []);
    hideStatus();
    _histLoadedOnce = true;
  }catch(e){
    hideStatus();
    // garde un message discret, mais pas un gros “synchro”
    showStatus("Erreur", "Historique indisponible", "⚠️");
    setTimeout(hideStatus, 2000);
  }
}
