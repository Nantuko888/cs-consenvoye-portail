<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Équipes — CS Consenvoye</title>

  <style>
  :root{
    --txt:#f4f4f4;
    --muted:#cfcfcf;
    --shadow: 0 14px 34px rgba(0,0,0,.38);
    --radius: 22px;

    --blue: #2f7bd3;
    --orange: #d98910;
    --gold: #ffb15a;
    --green: #2fa86b;
  }

  *{box-sizing:border-box}
  html, body{height:100%}

  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color:var(--txt);
    background:#0b0b0b;
    overflow-x:hidden;
  }

  /* Fond figé */
  .bg{
    position:fixed;
    inset:0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.55)),
      url("background.png") center top/cover no-repeat;
    z-index:-2;
    transform: translateZ(0);
  }

  .bg::after{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle at 50% 10%, rgba(255,170,60,.18), rgba(0,0,0,.62) 62%);
    z-index:-1;
  }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 14px 40px;
    position: relative;
    z-index: 1;
  }

  /* ===== BANDEAU HAUT ===== */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;

    margin: 10px 0 10px;
    padding: 10px 12px;
    min-height: 46px;

    border-radius: 18px;
    background: linear-gradient(180deg, rgba(212,106,0,.75), rgba(185,88,0,.58));
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  h1{
    margin:0;
    font-size:18px;
    font-weight:950;
    letter-spacing:.8px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    flex: 1 1 auto;
    min-width: 0;
  }

  .actions{
    display:flex;
    gap:10px;
    flex: 0 0 auto;
    align-items:center;
  }

  .btn{
    border:1px solid rgba(255,255,255,.18);
    background: rgba(0,0,0,.18);
    color:var(--txt);
    padding: 9px 12px;
    border-radius: 14px;
    font-weight:900;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .btn:active{transform: translateY(1px)}
  .btn.secondary{ border-color: rgba(255,170,60,.35); }

  .syncPill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(0,0,0,.28);
    border: 1px solid rgba(255,255,255,.14);
    color: rgba(255,255,255,.92);
    font-weight: 950;
    font-size: 12px;
    letter-spacing: .2px;
    box-shadow: 0 10px 26px rgba(0,0,0,.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display:none;
  }

  /* ===== CARTE GENERALE ===== */
  .card{
    border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(0,0,0,.50), rgba(0,0,0,.34));
    border:1px solid rgba(255,255,255,.10);
    box-shadow: var(--shadow);
    overflow:hidden;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* ===== CHEF DE CENTRE ===== */
  .chief{
    margin: 12px 12px 14px;
    padding: 16px 18px;
    text-align:center;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(47,168,107,.26), rgba(47,168,107,.12));
    border:1px solid rgba(120,255,190,.22);
    box-shadow: 0 14px 30px rgba(0,0,0,.24);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .chief .label{
    font-weight:950;
    letter-spacing:.9px;
    text-transform: uppercase;
    color: #caffde;
    margin-bottom: 6px;
    text-shadow: 0 10px 22px rgba(0,0,0,.6);
    font-size: 13px;
  }

  .chief .name{
    font-size: 24px;
    font-weight: 950;
    text-shadow: 0 10px 22px rgba(0,0,0,.6);
    word-break: break-word;
    color: #fff;
  }

  /* ===== LIGNE EQUIPE 1 / EQUIPE 2 ===== */
  .team-row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: stretch;
    margin: 0 12px 14px;
  }

  .team-pick{
    padding: 16px 16px 14px;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
    display:flex;
    flex-direction:column;
    gap:10px;
    justify-content:center;
    border-radius: 20px;
    box-shadow: 0 14px 28px rgba(0,0,0,.22);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .team-pick .title{
    font-size: 20px;
    font-weight: 950;
    letter-spacing: .8px;
    text-transform: uppercase;
    display:flex;
    align-items:center;
    justify-content:space-between;
    line-height:1.1;
  }

  .pill{
    min-width: 34px;
    height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-weight:950;
    border:1px solid rgba(255,255,255,.20);
    background: rgba(0,0,0,.25);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }

  .team-pick .sub{
    color: rgba(255,255,255,.82);
    font-weight:700;
    font-size: 13px;
    line-height:1.25;
  }

  .team1-pick{
    border:1px solid rgba(47,123,211,.55);
    background: linear-gradient(180deg, rgba(47,123,211,.18), rgba(47,123,211,.08));
  }

  .team1-pick .title{ color: #d7e9ff; }

  .team1-pick .accent{
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(47,123,211,1), rgba(47,123,211,.45));
  }

  .team2-pick{
    border:1px solid rgba(217,137,16,.55);
    background: linear-gradient(180deg, rgba(217,137,16,.18), rgba(217,137,16,.08));
  }

  .team2-pick .title{ color: #ffe5c2; }

  .team2-pick .accent{
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(217,137,16,1), rgba(217,137,16,.45));
  }

  /* ===== OVERLAY ===== */
  .overlay{
    position: fixed;
    inset: 0;
    z-index: 50;
    display:none;
    background: rgba(0,0,0,.10);
    padding:
      calc(env(safe-area-inset-top) + 92px)
      12px
      calc(env(safe-area-inset-bottom) + 12px);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .overlay.is-open{ display:block; }

  .panel{
    height: 100%;
    max-width: 980px;
    margin: 0 auto;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding: 10px 12px;
    min-height: 46px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .panel-head .panel-title{
    margin:0;
    font-size:18px;
    font-weight:950;
    letter-spacing:.8px;
    text-transform: uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    flex: 1 1 auto;
    min-width: 0;
  }

  .close{
    border:1px solid rgba(255,255,255,.18);
    background: rgba(0,0,0,.18);
    color:var(--txt);
    padding: 9px 12px;
    border-radius: 14px;
    font-weight:900;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    flex: 0 0 auto;
  }

  .close:active{transform: translateY(1px)}

  .panel-body{
    flex:1;
    overflow:auto;
    padding: 14px;
    background: rgba(0,0,0,.22);
    border-radius: 20px;
    border:1px solid rgba(255,255,255,.10);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .table-head, .row{
    display:grid;
    grid-template-columns: 1fr 1.3fr 1fr;
    gap:10px;
    padding: 12px 14px;
    border-radius: 18px;
    border:1px solid rgba(255,255,255,.10);
  }

  .table-head{
    background: rgba(0,0,0,.38);
    font-weight:950;
    letter-spacing:.8px;
    text-transform:uppercase;
    color: var(--gold);
    margin-bottom:10px;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  .row{
    background: rgba(0,0,0,.28);
    border-color: rgba(255,255,255,.08);
    margin-bottom: 10px;
  }

  .muted{
    color: var(--muted);
    font-style: italic;
    margin:0;
    padding: 6px 2px;
  }

  .status{
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 14px;
    border:1px dashed rgba(255,170,60,.35);
    background: rgba(0,0,0,.25);
    color:#ffd19a;
    display:none;
  }

  .panel.team1 .panel-head{
    background: linear-gradient(180deg, rgba(47,123,211,.52), rgba(47,123,211,.30));
  }

  .panel.team2 .panel-head{
    background: linear-gradient(180deg, rgba(217,137,16,.52), rgba(217,137,16,.30));
  }

  @media (max-width: 360px){
    .team-pick .title{ font-size:18px; }
    .team-pick{ padding: 14px 14px 12px; }
  }
</style>

</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <header>
      <h1>Équipes</h1>
      <div class="actions">
        <span class="syncPill" id="syncPill">Synchronisation…</span>
        <button class="btn secondary" id="btnBack">Retour</button>
      </div>
    </header>

    <section class="card chief">
      <div class="label">Chef de centre</div>
      <div class="name" id="chiefName">—</div>
    </section>

    <div class="team-row">
      <section class="card team-pick team1-pick" id="pickTeam1" role="button" aria-label="Ouvrir Équipe 1">
        <div class="title">Équipe 1 <span class="pill" id="count1">0</span></div>
        <div class="sub">Appuie pour afficher en pleine page</div>
        <div class="accent"></div>
      </section>

      <section class="card team-pick team2-pick" id="pickTeam2" role="button" aria-label="Ouvrir Équipe 2">
        <div class="title">Équipe 2 <span class="pill" id="count2">0</span></div>
        <div class="sub">Appuie pour afficher en pleine page</div>
        <div class="accent"></div>
      </section>
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="panel card" id="panel">
      <div class="panel-head" id="panelHead">
        <div class="panel-title" id="panelTitle">—</div>
        <button class="close" id="btnClose">Fermer</button>
      </div>

      <div class="panel-body">
        <div class="table-head">
          <div>Fonction</div><div>Nom</div><div>Comp</div>
        </div>
        <div id="panelRows"></div>
        <p class="muted" id="panelEmpty" style="display:none;">Aucun nom pour le moment.</p>
      </div>
    </div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzPHCDdW7wkFCVkMOL_2srZmdnjZ1QKmToUFtqIZBPjSUNtOwM-Ac7ua0w9dhCv3oI/exec";
  const BACK_URL = "index.html";

  const CACHE_KEY = "cs_equipes_cache_v2";
  const CACHE_MAX_AGE_MS = 24 * 60 * 60 * 1000;

  const $status = document.getElementById("status");
  const $chiefName = document.getElementById("chiefName");
  const $count1 = document.getElementById("count1");
  const $count2 = document.getElementById("count2");
  const $syncPill = document.getElementById("syncPill");

  const $overlay = document.getElementById("overlay");
  const $panel = document.getElementById("panel");
  const $panelTitle = document.getElementById("panelTitle");
  const $panelRows = document.getElementById("panelRows");
  const $panelEmpty = document.getElementById("panelEmpty");

  document.getElementById("btnBack").addEventListener("click", () => location.href = BACK_URL);
  document.getElementById("btnClose").addEventListener("click", closeOverlay);
  $overlay.addEventListener("click", (e) => { if(e.target === $overlay) closeOverlay(); });

  document.getElementById("pickTeam1").addEventListener("click", () => openTeam(1));
  document.getElementById("pickTeam2").addEventListener("click", () => openTeam(2));

  let TEAMS_CACHE = { "1": [], "2": [] };

  function setStatus(msg, show=true){
    $status.textContent = msg || "";
    $status.style.display = show ? "block" : "none";
  }

  function setSync(on, text){
    if(!$syncPill) return;
    if(on){
      $syncPill.textContent = text || "Synchronisation…";
      $syncPill.style.display = "inline-flex";
    }else{
      $syncPill.style.display = "none";
    }
  }

  function saveCache(payload){
    try{
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        savedAt: Date.now(),
        payload
      }));
    }catch(e){}
  }

  function loadCache(){
    try{
      const raw = localStorage.getItem(CACHE_KEY);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      if(!obj || !obj.payload) return null;
      if(obj.savedAt && (Date.now() - obj.savedAt) > CACHE_MAX_AGE_MS) return null;
      return obj.payload;
    }catch(e){
      return null;
    }
  }

  function applyEquipesData_(data){
    const chef = data?.chef || "—";
    const teams = data?.teams || { "1": [], "2": [] };

    TEAMS_CACHE = {
      "1": Array.isArray(teams["1"]) ? teams["1"] : [],
      "2": Array.isArray(teams["2"]) ? teams["2"] : []
    };

    $chiefName.textContent = chef;
    $count1.textContent = String(TEAMS_CACHE["1"].length);
    $count2.textContent = String(TEAMS_CACHE["2"].length);
  }

  function escapeHtml(s){
    return (s==null ? "" : String(s))
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function jsonp(url, cbName){
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      const cleanup = () => {
        script.remove();
        try { delete window[cbName]; } catch(e){ window[cbName] = undefined; }
      };
      const timer = setTimeout(() => { cleanup(); reject(new Error("Timeout JSONP")); }, 12000);
      window[cbName] = (data) => { clearTimeout(timer); cleanup(); resolve(data); };
      script.src = url;
      script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error("Erreur JSONP")); };
      document.head.appendChild(script);
    });
  }

  async function fetchChef_(){
    const cb = "cb_org_" + Math.random().toString(36).slice(2);
    const url = `${API}?view=org&callback=${cb}`;
    const data = await jsonp(url, cb);
    if(!data || data.ok === false) throw new Error(data?.error || "Réponse org invalide");
    return data?.direction?.chef || "—";
  }

  async function fetchEquipes_(){
    const cb = "cb_eq_" + Math.random().toString(36).slice(2);
    const url = `${API}?view=equipes&callback=${cb}`;
    const data = await jsonp(url, cb);
    if(!data || data.ok === false) throw new Error(data?.error || "Réponse équipes invalide");

    const teams = data.teams || data.equipes || {};
    return {
      "1": Array.isArray(teams["1"] || teams[1]) ? (teams["1"] || teams[1]) : [],
      "2": Array.isArray(teams["2"] || teams[2]) ? (teams["2"] || teams[2]) : []
    };
  }

  async function loadAll(){
    const cached = loadCache();

    if(cached?.chef || cached?.teams){
      applyEquipesData_(cached);
      setSync(true, "Synchronisation…");
    }else{
      setSync(true, "Chargement…");
      setStatus("Chargement…", true);
    }

    try{
      const [chef, teams] = await Promise.all([fetchChef_(), fetchEquipes_()]);

      const fresh = { chef, teams };
      applyEquipesData_(fresh);
      saveCache(fresh);

      setStatus("", false);
      setSync(false);
    }catch(err){
      console.error(err);

      if(cached?.chef || cached?.teams){
        setSync(false);
        setStatus("", false);
        return;
      }

      setSync(false);
      setStatus("Erreur de chargement (API).", true);
    }
  }

  function openTeam(n){
    const teamKey = String(n);
    const title = (n === 1) ? "Équipe 1" : "Équipe 2";

    $panel.classList.remove("team1","team2");
    $panel.classList.add(n === 1 ? "team1" : "team2");

    $panelTitle.textContent = title;

    const arr = TEAMS_CACHE[teamKey] || [];
    $panelRows.innerHTML = "";
    if(!arr.length){
      $panelEmpty.style.display = "block";
    }else{
      $panelEmpty.style.display = "none";
      for(const r of arr){
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div>${escapeHtml(r.fonction || "—")}</div>
          <div>${escapeHtml(r.nom || "—")}</div>
          <div>${escapeHtml(r.competences || r.comp || "—")}</div>
        `;
        $panelRows.appendChild(row);
      }
    }

    $overlay.classList.add("is-open");
    $overlay.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closeOverlay(){
    $overlay.classList.remove("is-open");
    $overlay.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  loadAll();
</script>
</body>
</html>
